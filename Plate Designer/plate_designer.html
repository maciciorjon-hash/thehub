<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Plate Designer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f5f8;--surface:#ffffff;--surface2:#f0f1f5;--surface3:#e4e6ee;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--accent:#0079b9;--accent2:#00c896;--text:#1a1d2e;--text2:#5a5f7a;--text3:#9ca0b8;--sans:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;}
[data-theme="dark"]{--bg:#0d0f14;--surface:#13161e;--surface2:#1c2030;--surface3:#252a3a;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#e8eaf2;--text2:#8b90a8;--text3:#4e5368;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;}
header{border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;gap:14px;background:var(--surface);height:58px;flex-shrink:0;}
.logo{width:32px;height:32px;border-radius:7px;background:#0079b9;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:20px;font-weight:700;color:#fff;flex-shrink:0;}
.app-name{font-size:15px;font-weight:600;letter-spacing:-0.2px;}
.app-sub{font-size:11px;color:var(--text2);}
.theme-btn{margin-left:auto;padding:0 14px;height:30px;border:1px solid var(--border2);border-radius:20px;background:none;color:var(--text2);font-family:var(--sans);font-size:12px;cursor:pointer;transition:background .15s,color .15s;}
.theme-btn:hover{background:var(--surface2);color:var(--text);}
.btn{padding:7px 14px;border-radius:7px;border:none;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{opacity:.88;}
.btn-sec{background:var(--surface3);color:var(--text);border:1px solid var(--border2);}
.btn-sec:hover{background:var(--surface2);}

/* TOP BAR */
.top-bar{display:flex;align-items:center;gap:6px;padding:7px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.tb-sep{width:1px;height:22px;background:var(--border2);flex-shrink:0;margin:0 2px;}
.fmt-pill{padding:4px 11px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--text2);font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.fmt-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.type-btn{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:6px;border:1.5px solid transparent;background:none;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:all .15s;font-family:var(--sans);}
.type-btn .type-sw{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
.type-btn.active{border-color:var(--accent);background:var(--surface2);color:var(--text);}
.type-btn:hover{background:var(--surface2);}
.custom-form{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.custom-form input[type="text"]{flex:1;min-width:70px;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;padding:4px 7px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;}
.custom-form input[type="color"]{width:26px;height:26px;border:1px solid var(--border2);border-radius:4px;cursor:pointer;padding:1px;background:var(--surface2);}

/* PLATE AREA */
.plate-scroll-area{flex:1;overflow:auto;padding:18px 24px 140px;display:flex;flex-direction:column;gap:14px;user-select:none;align-items:center;}
.plate-wrap{display:flex;flex-direction:column;gap:0;}
.col-labels-row{display:flex;}
.col-lbl-spacer{flex-shrink:0;}
.col-lbl-cell{text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;}
.col-num{font-size:9px;font-family:var(--mono);color:var(--text3);font-weight:600;cursor:pointer;line-height:1.4;transition:color .1s;}
.col-num:hover{color:var(--accent);}
.col-ann{font-size:8px;color:var(--text2);border:none;background:transparent;text-align:center;outline:none;padding:0;font-family:var(--sans);}
.col-ann:focus{border-bottom:1px solid var(--accent);}
.plate-row{display:flex;align-items:center;}
.row-label{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;padding-right:5px;}
.row-letter{font-size:9px;font-family:var(--mono);color:var(--text3);font-weight:600;line-height:1.4;cursor:pointer;transition:color .1s;}
.row-letter:hover{color:var(--accent);}
.row-ann{font-size:8px;color:var(--text2);border:none;background:transparent;text-align:right;outline:none;padding:0;width:56px;font-family:var(--sans);}
.row-ann:focus{border-bottom:1px solid var(--accent);}
.wells-row{display:flex;}
.well{cursor:pointer;border:1.5px solid transparent;position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:filter .08s,transform .06s;}
.well:hover{filter:brightness(1.12);transform:scale(1.08);}
.well.empty-well{background:var(--surface3);border-color:var(--border2);}
.well.selected{outline:2.5px solid var(--accent);outline-offset:-2px;z-index:2;}
.well .wlbl{font-family:var(--mono);color:#fff;text-shadow:0 0 3px rgba(0,0,0,.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none;line-height:1.2;text-align:center;}
.plate-legend{display:flex;gap:12px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);}
.leg-sw{width:12px;height:12px;border-radius:3px;flex-shrink:0;}

/* RUBBER BAND */
#rubber-band{position:fixed;border:1.5px dashed var(--accent);background:rgba(0,121,185,.06);pointer-events:none;display:none;z-index:1000;}

/* FLOATING SELECTION PANEL */
.sel-panel{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--surface);border-top:1px solid var(--border2);padding:12px 20px;transform:translateY(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);box-shadow:0 -6px 30px rgba(0,0,0,.12);}
.sel-panel.open{transform:translateY(0);}
.sel-panel-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.sel-count{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;min-width:80px;}
.assign-btns{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.assign-btn{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:6px;border:1.5px solid var(--border);background:none;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);font-family:var(--sans);transition:all .12s;}
.assign-btn .assign-sw{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.assign-btn:hover{background:var(--surface2);border-color:var(--border2);color:var(--text);}
.assign-btn.active-assign{border-color:var(--accent);background:var(--surface2);color:var(--text);}
.sp-sep{width:1px;height:26px;background:var(--border2);flex-shrink:0;margin:0 2px;}
.sp-label-wrap{display:flex;align-items:center;gap:6px;}
.sp-label-wrap label{font-size:11px;color:var(--text3);white-space:nowrap;}
.sp-input{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:4px 9px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;width:120px;}
.sp-input:focus{border-color:var(--accent);}
.dil-wrap{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.dil-fields{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.dil-fields label{font-size:11px;color:var(--text3);white-space:nowrap;}
.dil-fields input{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;width:78px;}
.dil-fields input:focus{border-color:var(--accent);}
.dil-fields select{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:4px 6px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;}
.sel-panel-close{margin-left:auto;padding:4px 9px;border-radius:6px;border:1px solid var(--border2);background:none;color:var(--text3);font-size:12px;cursor:pointer;flex-shrink:0;}
.sel-panel-close:hover{background:var(--surface2);color:var(--text);}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px;}
</style>
</head>
<body>
<header>
  <div class="logo">P</div>
  <div>
    <div class="app-name">Plate Designer</div>
    <div class="app-sub">Visual plate layout · 6 to 384-well · PNG export</div>
  </div>
  <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">☾ Dark</button>
</header>

<div class="top-bar" id="top-bar">
  <div id="fmt-pills" style="display:flex;gap:4px;"></div>
  <div class="tb-sep"></div>
  <div id="type-palette" style="display:flex;gap:3px;flex-wrap:wrap;align-items:center;"></div>
  <div class="tb-sep"></div>
  <button class="btn btn-sec" onclick="showCustomTypeForm()" id="btn-add-custom" style="font-size:11px;padding:5px 10px;">+ Custom</button>
  <div id="custom-type-form" style="display:none;" class="custom-form">
    <input type="text" id="custom-name" placeholder="Name" maxlength="20">
    <input type="color" id="custom-color" value="#ff5722">
    <button class="btn btn-primary" onclick="addCustomType()" style="padding:4px 10px;">Add</button>
    <button class="btn btn-sec" onclick="hideCustomTypeForm()" style="padding:4px 8px;">✕</button>
  </div>
  <div style="margin-left:auto;display:flex;gap:6px;">
    <button class="btn btn-sec" onclick="clearPlate()" style="font-size:11px;padding:5px 10px;">Clear plate</button>
    <button class="btn btn-primary" onclick="exportPNG()" style="font-size:11px;padding:5px 12px;">⬇ Export PNG</button>
  </div>
</div>

<div class="plate-scroll-area" id="plate-scroll-area">
  <div class="plate-wrap" id="plate-wrap"></div>
  <div class="plate-legend" id="plate-legend"></div>
</div>

<!-- FLOATING SELECTION PANEL -->
<div class="sel-panel" id="sel-panel">
  <div class="sel-panel-row">
    <span class="sel-count" id="sel-count">0 wells</span>
    <div class="assign-btns" id="assign-btns"></div>
    <div class="sp-sep"></div>
    <div class="sp-label-wrap">
      <label>Label:</label>
      <input class="sp-input" type="text" id="sp-lbl-input" placeholder="e.g. DMSO" oninput="applyWellLabel(this.value)">
    </div>
    <div class="sp-sep" id="dil-sep" style="display:none;"></div>
    <div class="dil-wrap" id="dil-wrap" style="display:none;">
      <div class="dil-fields">
        <label>Start conc:</label>
        <input type="number" id="dil-start" step="any" placeholder="10000">
        <select id="dil-unit"><option>nM</option><option>µM</option><option>mM</option></select>
        <label>Fold:</label>
        <input type="number" id="dil-factor" value="3" step="any" min="1.001" style="width:52px;">
        <button class="btn btn-primary" id="dil-btn" onclick="applyDilution('row')" style="font-size:11px;padding:4px 10px;">Apply →</button>
      </div>
    </div>
    <button class="sel-panel-close" onclick="clearSelection()">✕ Deselect</button>
  </div>
</div>

<div id="rubber-band"></div>

<script>
// ─── Theme ────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.getElementById('theme-btn').textContent = next === 'dark' ? '☀ Light' : '☾ Dark';
  try { localStorage.setItem('pd_dark', next === 'dark' ? 'true' : 'false'); } catch(e) {}
}
(function(){
  try {
    if (localStorage.getItem('pd_dark') === 'true') {
      document.documentElement.setAttribute('data-theme','dark');
      document.getElementById('theme-btn').textContent = '☀ Light';
    }
  } catch(e) {}
})();

// ─── Constants ────────────────────────────────────────────────────────────────
const FORMATS = {
  '6':  {rows:2,  cols:3,  wellPx:64, radius:'50%', gap:6},
  '12': {rows:3,  cols:4,  wellPx:46, radius:'50%', gap:5},
  '24': {rows:4,  cols:6,  wellPx:34, radius:'50%', gap:4},
  '48': {rows:6,  cols:8,  wellPx:26, radius:'50%', gap:3},
  '96': {rows:8,  cols:12, wellPx:20, radius:'50%', gap:3},
  '384':{rows:16, cols:24, wellPx:12, radius:'3px', gap:2},
};
const ROWS_ALL = 'ABCDEFGHIJKLMNOP'.split('');
const WELL_TYPES = [
  {id:'cells',   name:'Cells',        color:'#66bb6a'},
  {id:'treat',   name:'Treatment',    color:'#42a5f5'},
  {id:'posctrl', name:'Pos. Control', color:'#ef5350'},
  {id:'negctrl', name:'Neg. Control', color:'#ffa726'},
  {id:'blank',   name:'Blank/Media',  color:'#78909c'},
  {id:'dmso',    name:'DMSO',         color:'#ab47bc'},
];

// ─── State ────────────────────────────────────────────────────────────────────
let currentFormat = '96';
let activeTypeId = 'treat';
let wellState = {};
let selection = new Set();
let lastClickedWell = null;
let rowAnnotations = {}, colAnnotations = {};
let customTypes = [];
let _mouseDown = false, _dragMode = null, _dragMoved = false;
let _mouseDownPos = null, _paintOnWell = null, _rbStart = null;

function allTypes() { return [...WELL_TYPES, ...customTypes]; }
function typeById(id) { return allTypes().find(t => t.id === id); }
function wellRowCol(id) {
  const m = id.match(/^([A-P])(\d+)$/);
  return m ? {row:m[1], col:parseInt(m[2])} : null;
}

// ─── Top bar init ─────────────────────────────────────────────────────────────
function buildTopBar() {
  const fp = document.getElementById('fmt-pills');
  fp.innerHTML = '';
  Object.keys(FORMATS).forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'fmt-pill' + (f === currentFormat ? ' active' : '');
    btn.textContent = f + '-well';
    btn.onclick = () => setFormat(f);
    fp.appendChild(btn);
  });
  renderTypePalette();
}

function renderTypePalette() {
  const tp = document.getElementById('type-palette');
  tp.innerHTML = '';
  allTypes().forEach(type => {
    const btn = document.createElement('button');
    btn.className = 'type-btn' + (type.id === activeTypeId ? ' active' : '');
    btn.dataset.typeId = type.id;
    btn.onclick = () => setActiveType(type.id);
    const sw = document.createElement('span');
    sw.className = 'type-sw';
    sw.style.background = type.color;
    btn.appendChild(sw);
    btn.appendChild(document.createTextNode(type.name));
    tp.appendChild(btn);
  });
}

function setActiveType(id) {
  activeTypeId = id;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.typeId === id));
  document.querySelectorAll('.assign-btn[data-type-id]').forEach(b => b.classList.toggle('active-assign', b.dataset.typeId === id));
}

function setFormat(f) {
  if (f === currentFormat && !Object.keys(wellState).length) return;
  if (Object.keys(wellState).length > 0 && !confirm('Changing format clears all well assignments. Continue?')) return;
  currentFormat = f;
  wellState = {}; selection.clear(); rowAnnotations = {}; colAnnotations = {}; lastClickedWell = null;
  document.querySelectorAll('.fmt-pill').forEach(b => b.classList.toggle('active', b.textContent === f + '-well'));
  buildPlate(); updateSelPanel(); renderLegend();
}

// ─── Plate ────────────────────────────────────────────────────────────────────
function calcWellPx() {
  const avail = (document.getElementById('plate-scroll-area').clientWidth || 800) - 120;
  const MAX = {'6':90,'12':68,'24':52,'48':38,'96':28,'384':16};
  const px = Math.floor(avail / FORMATS[currentFormat].cols);
  return Math.max(12, Math.min(px, MAX[currentFormat]));
}

function buildPlate() {
  FORMATS[currentFormat].wellPx = calcWellPx();
  const fmt = FORMATS[currentFormat];
  const rows = ROWS_ALL.slice(0, fmt.rows);
  const wrap = document.getElementById('plate-wrap');
  wrap.innerHTML = '';
  const rowLabelW = 72;

  // Col labels row
  const colRow = document.createElement('div');
  colRow.className = 'col-labels-row';
  const spc = document.createElement('div');
  spc.className = 'col-lbl-spacer';
  spc.style.width = rowLabelW + 'px';
  colRow.appendChild(spc);
  for (let c = 1; c <= fmt.cols; c++) {
    const cell = document.createElement('div');
    cell.className = 'col-lbl-cell';
    cell.style.width = (fmt.wellPx + fmt.gap) + 'px';
    const numSp = document.createElement('span');
    numSp.className = 'col-num';
    numSp.textContent = c;
    numSp.title = 'Select column ' + c;
    numSp.onclick = () => selectColumn(c);
    const ann = document.createElement('input');
    ann.className = 'col-ann';
    ann.style.width = fmt.wellPx + 'px';
    ann.placeholder = '—';
    ann.value = colAnnotations[String(c)] || '';
    ann.oninput = e => { colAnnotations[String(c)] = e.target.value; };
    cell.appendChild(numSp);
    cell.appendChild(ann);
    colRow.appendChild(cell);
  }
  wrap.appendChild(colRow);

  // Plate rows
  rows.forEach(rowLetter => {
    const plateRow = document.createElement('div');
    plateRow.className = 'plate-row';
    plateRow.style.marginBottom = fmt.gap + 'px';

    const rowLbl = document.createElement('div');
    rowLbl.className = 'row-label';
    rowLbl.style.width = rowLabelW + 'px';
    const ls = document.createElement('span');
    ls.className = 'row-letter';
    ls.textContent = rowLetter;
    ls.title = 'Select row ' + rowLetter;
    ls.onclick = () => selectRow(rowLetter);
    const ann = document.createElement('input');
    ann.className = 'row-ann';
    ann.placeholder = '—';
    ann.value = rowAnnotations[rowLetter] || '';
    ann.oninput = e => { rowAnnotations[rowLetter] = e.target.value; };
    rowLbl.appendChild(ls);
    rowLbl.appendChild(ann);
    plateRow.appendChild(rowLbl);

    const wellsRow = document.createElement('div');
    wellsRow.className = 'wells-row';
    for (let c = 1; c <= fmt.cols; c++) {
      const wellId = rowLetter + c;
      const el = document.createElement('div');
      el.className = 'well empty-well';
      el.dataset.id = wellId;
      el.style.cssText = `width:${fmt.wellPx}px;height:${fmt.wellPx}px;border-radius:${fmt.radius};margin-right:${fmt.gap}px;`;
      const lbl = document.createElement('span');
      lbl.className = 'wlbl';
      lbl.style.fontSize = Math.max(7, Math.floor(fmt.wellPx * 0.33)) + 'px';
      lbl.style.display = fmt.wellPx >= 16 ? '' : 'none';
      lbl.style.maxWidth = (fmt.wellPx - 3) + 'px';
      el.appendChild(lbl);
      if (fmt.wellPx <= 12) el.title = wellId;
      wellsRow.appendChild(el);
    }
    plateRow.appendChild(wellsRow);
    wrap.appendChild(plateRow);
  });

  renderWells();
}

function renderWells() {
  document.querySelectorAll('.well').forEach(el => {
    const id = el.dataset.id;
    const ws = wellState[id];
    const t = ws ? typeById(ws.typeId) : null;
    const lbl = el.querySelector('.wlbl');
    if (t) {
      el.style.background = t.color;
      el.classList.remove('empty-well');
      el.style.borderColor = 'transparent';
      if (lbl) lbl.textContent = ws.label || '';
      if (FORMATS[currentFormat].wellPx <= 12) el.title = id + (ws.label ? ': '+ws.label : '') + ' — ' + t.name;
    } else {
      el.style.background = '';
      el.classList.add('empty-well');
      el.style.borderColor = '';
      if (lbl) lbl.textContent = '';
      if (FORMATS[currentFormat].wellPx <= 12) el.title = id;
    }
    el.classList.toggle('selected', selection.has(id));
  });
}

// ─── Selection ────────────────────────────────────────────────────────────────
function selectRow(letter) {
  const fmt = FORMATS[currentFormat];
  selection.clear();
  for (let c = 1; c <= fmt.cols; c++) selection.add(letter + c);
  renderWells(); updateSelPanel();
}

function selectColumn(col) {
  const rows = ROWS_ALL.slice(0, FORMATS[currentFormat].rows);
  selection.clear();
  rows.forEach(r => selection.add(r + col));
  renderWells(); updateSelPanel();
}

function clearSelection() { selection.clear(); renderWells(); updateSelPanel(); }

function clearPlate() {
  if (!Object.keys(wellState).length) return;
  wellState = {}; renderWells(); renderLegend(); updateSelPanel();
}

// ─── Mouse events ─────────────────────────────────────────────────────────────
document.getElementById('plate-scroll-area').addEventListener('mousedown', function(e) {
  if (e.button !== 0) return;
  _mouseDown = true; _dragMoved = false;
  _mouseDownPos = {x:e.clientX, y:e.clientY};
  const well = e.target.closest('.well');
  if (well) {
    _dragMode = 'paint';
    _paintOnWell = well.dataset.id;
  } else {
    _dragMode = 'rubber';
    _rbStart = {x:e.clientX, y:e.clientY};
  }
  e.preventDefault();
});

document.addEventListener('mousemove', function(e) {
  if (!_mouseDown) return;
  const dx = e.clientX - _mouseDownPos.x, dy = e.clientY - _mouseDownPos.y;
  if (!_dragMoved && dx*dx+dy*dy > 9) _dragMoved = true;
  if (!_dragMoved) return;
  if (_dragMode === 'paint') {
    const el = document.elementFromPoint(e.clientX, e.clientY);
    const well = el?.closest?.('.well');
    if (well) {
      wellState[well.dataset.id] = {typeId:activeTypeId, label:wellState[well.dataset.id]?.label||''};
      renderWells(); renderLegend();
    }
  } else if (_dragMode === 'rubber' && _rbStart) {
    const rb = document.getElementById('rubber-band');
    const x1=Math.min(_rbStart.x,e.clientX), y1=Math.min(_rbStart.y,e.clientY);
    rb.style.cssText = `display:block;left:${x1}px;top:${y1}px;width:${Math.abs(e.clientX-_rbStart.x)}px;height:${Math.abs(e.clientY-_rbStart.y)}px;`;
  }
});

document.addEventListener('mouseup', function(e) {
  if (!_mouseDown) return;
  _mouseDown = false;
  document.getElementById('rubber-band').style.display = 'none';
  if (_dragMode === 'paint' && !_dragMoved) {
    handleWellClick(e, _paintOnWell);
  } else if (_dragMode === 'rubber' && _dragMoved && _rbStart) {
    const x1=Math.min(_rbStart.x,e.clientX), y1=Math.min(_rbStart.y,e.clientY);
    const x2=Math.max(_rbStart.x,e.clientX), y2=Math.max(_rbStart.y,e.clientY);
    if (!e.ctrlKey && !e.metaKey) selection.clear();
    document.querySelectorAll('.well').forEach(el => {
      const r = el.getBoundingClientRect();
      const cx=r.left+r.width/2, cy=r.top+r.height/2;
      if (cx>=x1&&cx<=x2&&cy>=y1&&cy<=y2) selection.add(el.dataset.id);
    });
    renderWells(); updateSelPanel();
  }
  _dragMode=null; _paintOnWell=null; _rbStart=null;
});

function handleWellClick(e, wellId) {
  if (e.ctrlKey||e.metaKey) {
    if (selection.has(wellId)) selection.delete(wellId);
    else { selection.add(wellId); lastClickedWell=wellId; }
  } else if (e.shiftKey && lastClickedWell) {
    const rc1=wellRowCol(lastClickedWell), rc2=wellRowCol(wellId);
    if (rc1&&rc2) {
      const rows=ROWS_ALL.slice(0,FORMATS[currentFormat].rows);
      const r1=Math.min(rows.indexOf(rc1.row),rows.indexOf(rc2.row));
      const r2=Math.max(rows.indexOf(rc1.row),rows.indexOf(rc2.row));
      const c1=Math.min(rc1.col,rc2.col), c2=Math.max(rc1.col,rc2.col);
      for (let ri=r1;ri<=r2;ri++) for (let ci=c1;ci<=c2;ci++) selection.add(rows[ri]+ci);
    }
  } else {
    if (selection.size === 1 && selection.has(wellId)) {
      selection.clear(); lastClickedWell = null;
    } else {
      selection.clear(); selection.add(wellId); lastClickedWell = wellId;
    }
  }
  renderWells(); updateSelPanel();
}

// ─── Floating selection panel ─────────────────────────────────────────────────
function updateSelPanel() {
  const panel = document.getElementById('sel-panel');
  if (!selection.size) {
    panel.classList.remove('open');
    return;
  }
  panel.classList.add('open');

  const selArr = Array.from(selection);
  const prs = selArr.map(id=>wellRowCol(id)).filter(Boolean);
  const sameRow = prs.length>1 && prs.every(p=>p.row===prs[0].row);
  const sameCol = prs.length>1 && prs.every(p=>p.col===prs[0].col);
  const labels = selArr.map(id=>wellState[id]?.label||'');
  const allSameLabel = labels.every(l=>l===labels[0]);

  document.getElementById('sel-count').textContent = selection.size + ' well' + (selection.size>1?'s':'') + ' selected';

  const ab = document.getElementById('assign-btns');
  ab.innerHTML = '';
  allTypes().forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'assign-btn' + (t.id===activeTypeId?' active-assign':'');
    btn.dataset.typeId = t.id;
    btn.onclick = () => assignSelectionType(t.id);
    const sw = document.createElement('span');
    sw.className = 'assign-sw';
    sw.style.background = t.color;
    btn.appendChild(sw);
    btn.appendChild(document.createTextNode(t.name));
    ab.appendChild(btn);
  });
  const clrBtn = document.createElement('button');
  clrBtn.className = 'assign-btn';
  clrBtn.style.color = 'var(--text3)';
  clrBtn.onclick = clearSelectionType;
  clrBtn.innerHTML = '<span class="assign-sw" style="background:var(--surface3);border:1px solid var(--border2)"></span>Clear';
  ab.appendChild(clrBtn);

  const lblInput = document.getElementById('sp-lbl-input');
  lblInput.placeholder = allSameLabel ? 'e.g. DMSO' : 'Mixed…';
  lblInput.value = allSameLabel ? labels[0] : '';

  const showDil = (sameRow||sameCol) && selArr.length>=2;
  document.getElementById('dil-sep').style.display = showDil ? '' : 'none';
  document.getElementById('dil-wrap').style.display = showDil ? '' : 'none';
  if (showDil) {
    const btn = document.getElementById('dil-btn');
    if (sameRow) { btn.textContent='Apply →'; btn.onclick=()=>applyDilution('row'); }
    else { btn.textContent='Apply ↓'; btn.onclick=()=>applyDilution('col'); }
  }
}

function assignSelectionType(typeId) {
  setActiveType(typeId);
  selection.forEach(id => { wellState[id] = {typeId, label:wellState[id]?.label||''}; });
  renderWells(); renderLegend(); updateSelPanel();
}

function clearSelectionType() {
  selection.forEach(id => delete wellState[id]);
  renderWells(); renderLegend(); updateSelPanel();
}

function applyWellLabel(val) {
  selection.forEach(id => {
    if (!wellState[id]) wellState[id] = {typeId:activeTypeId, label:val};
    else wellState[id].label = val;
  });
  renderWells();
}

function applyDilution(dir) {
  const start = parseFloat(document.getElementById('dil-start').value);
  const factor = parseFloat(document.getElementById('dil-factor').value);
  const unit = document.getElementById('dil-unit').value;
  if (isNaN(start)||isNaN(factor)||factor<=1) { alert('Enter valid start concentration and fold factor > 1.'); return; }
  const rows = ROWS_ALL.slice(0, FORMATS[currentFormat].rows);
  const selArr = Array.from(selection).filter(id=>wellRowCol(id));
  if (dir==='row') selArr.sort((a,b)=>wellRowCol(a).col-wellRowCol(b).col);
  else selArr.sort((a,b)=>rows.indexOf(wellRowCol(a).row)-rows.indexOf(wellRowCol(b).row));
  let conc = start;
  selArr.forEach(id => {
    const lbl = fmtConc(conc, unit);
    if (!wellState[id]) wellState[id]={typeId:activeTypeId,label:lbl};
    else wellState[id].label=lbl;
    conc/=factor;
  });
  renderWells(); renderLegend(); updateSelPanel();
}

function fmtConc(val, unit) {
  if (val>=1000) return parseFloat((val/1000).toPrecision(3))+(unit==='nM'?'µM':unit==='µM'?'mM':'M');
  if (val<1&&val>0) return parseFloat(val.toPrecision(2))+unit;
  return parseFloat(val.toPrecision(3))+unit;
}

// ─── Custom types ─────────────────────────────────────────────────────────────
function showCustomTypeForm() {
  document.getElementById('custom-type-form').style.display='flex';
  document.getElementById('btn-add-custom').style.display='none';
}
function hideCustomTypeForm() {
  document.getElementById('custom-type-form').style.display='none';
  document.getElementById('btn-add-custom').style.display='';
}
function addCustomType() {
  const name = document.getElementById('custom-name').value.trim();
  const color = document.getElementById('custom-color').value;
  if (!name) { alert('Enter a type name.'); return; }
  customTypes.push({id:'custom_'+Date.now(), name, color});
  hideCustomTypeForm();
  document.getElementById('custom-name').value='';
  renderTypePalette(); renderLegend(); updateSelPanel();
}

// ─── Legend ───────────────────────────────────────────────────────────────────
function renderLegend() {
  const legend = document.getElementById('plate-legend');
  const usedIds = new Set(Object.values(wellState).map(ws=>ws.typeId));
  const usedTypes = allTypes().filter(t=>usedIds.has(t.id));
  legend.innerHTML = usedTypes.map(t=>`<div class="leg-item"><div class="leg-sw" style="background:${t.color}"></div>${esc(t.name)}</div>`).join('');
}

// ─── PNG export ───────────────────────────────────────────────────────────────
async function exportPNG() {
  await document.fonts.ready;
  const fmt = FORMATS[currentFormat];
  const rows = ROWS_ALL.slice(0, fmt.rows);
  const WELL = {'6':160,'12':110,'24':75,'48':52,'96':36,'384':20}[currentFormat];
  const GAP = 4, MGBT = 20, MGLR = 50, ROWLW = 76, COLLH = 52, LEGH = 44;
  const plateW = fmt.cols*(WELL+GAP)-GAP;
  const plateH = fmt.rows*(WELL+GAP)-GAP;
  const cW = MGLR+ROWLW+plateW+MGLR;
  const cH = MGBT+30+COLLH+plateH+MGBT+LEGH;
  const canvas = document.createElement('canvas');
  canvas.width = cW; canvas.height = cH;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
  ctx.fillStyle='#f4f5f8'; ctx.fillRect(0,0,cW,cH);
  ctx.fillStyle='#1a1d2e'; ctx.textAlign='left';
  ctx.font='bold 13px "IBM Plex Sans",Arial,sans-serif';
  ctx.fillText(currentFormat+'-well plate layout  ·  '+new Date().toLocaleDateString(), MGLR, MGBT+18);
  const ox=MGLR+ROWLW, oy=MGBT+30+COLLH;
  for (let c=1;c<=fmt.cols;c++) {
    const cx=ox+(c-1)*(WELL+GAP)+WELL/2;
    ctx.fillStyle='#5a5f7a'; ctx.textAlign='center';
    ctx.font='bold '+Math.max(9,Math.min(13,WELL/3))+'px "IBM Plex Mono",monospace';
    ctx.fillText(c, cx, oy-30);
    const ann=colAnnotations[String(c)]||'';
    if (ann) { ctx.fillStyle='#9ca0b8'; ctx.font='9px "IBM Plex Sans",Arial,sans-serif'; ctx.fillText(ann.length>12?ann.slice(0,12)+'…':ann, cx, oy-14); }
  }
  for (let ri=0;ri<fmt.rows;ri++) {
    const rl=rows[ri], cy=oy+ri*(WELL+GAP)+WELL/2;
    ctx.fillStyle='#5a5f7a'; ctx.textAlign='right';
    ctx.font='bold '+Math.max(9,Math.min(13,WELL/3))+'px "IBM Plex Mono",monospace';
    ctx.fillText(rl, ox-10, cy+4);
    const ann=rowAnnotations[rl]||'';
    if (ann) { ctx.fillStyle='#9ca0b8'; ctx.font='9px "IBM Plex Sans",Arial,sans-serif'; ctx.textAlign='right'; ctx.fillText(ann.length>12?ann.slice(0,12)+'…':ann, ox-26, cy+4); }
  }
  for (let ri=0;ri<fmt.rows;ri++) {
    for (let c=1;c<=fmt.cols;c++) {
      const id=rows[ri]+c, wx=ox+(c-1)*(WELL+GAP), wy=oy+ri*(WELL+GAP);
      const ws=wellState[id], t=ws?typeById(ws.typeId):null;
      ctx.save();
      ctx.fillStyle = t?t.color:'#e4e6ee';
      if (currentFormat==='384') {
        ctx.beginPath(); ctx.roundRect(wx,wy,WELL,WELL,2); ctx.fill();
        if (!t) { ctx.strokeStyle='#c4c8d0'; ctx.lineWidth=0.5; ctx.stroke(); }
      } else {
        ctx.beginPath(); ctx.arc(wx+WELL/2,wy+WELL/2,WELL/2,0,2*Math.PI); ctx.fill();
        if (!t) { ctx.strokeStyle='#c4c8d0'; ctx.lineWidth=0.7; ctx.stroke(); }
      }
      if (ws?.label && WELL>=22) {
        const fs=Math.min(11,WELL/4.5);
        ctx.fillStyle='rgba(255,255,255,0.92)'; ctx.font=fs+'px "IBM Plex Mono",monospace'; ctx.textAlign='center';
        const maxChars=Math.floor(WELL/6.5);
        ctx.fillText(ws.label.length>maxChars?ws.label.slice(0,maxChars)+'…':ws.label, wx+WELL/2, wy+WELL/2+fs*0.38);
      }
      ctx.restore();
    }
  }
  const usedIds=new Set(Object.values(wellState).map(ws=>ws.typeId));
  const usedTypes=allTypes().filter(t=>usedIds.has(t.id));
  const ly=oy+plateH+18; let lx=ox;
  usedTypes.forEach(t => {
    ctx.fillStyle=t.color; ctx.fillRect(lx,ly,13,13);
    ctx.fillStyle='#5a5f7a'; ctx.font='11px "IBM Plex Sans",Arial,sans-serif'; ctx.textAlign='left';
    ctx.fillText(t.name, lx+17, ly+10);
    lx+=ctx.measureText(t.name).width+36;
  });
  canvas.toBlob(blob=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download='plate_layout.png'; a.click();
  },'image/png');
}

// ─── Util ─────────────────────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

buildTopBar();
buildPlate();
let _resizeTimer = null;
window.addEventListener('resize', function() {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(buildPlate, 150);
});
