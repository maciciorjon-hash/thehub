<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Plasmids</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f4f5f8;--surface:#ffffff;--surface2:#f0f1f5;--surface3:#e4e6ee;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);
  --text:#1a1d2e;--text2:#5a5f7a;--text3:#9ca0b8;
  --accent:#6d7bd0;--accent-dim:rgba(109,123,208,0.13);
  --danger:#c04040;--good:#2d9462;--warn:#c47818;
  --sans:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
  --shadow-xs:0 1px 4px rgba(0,0,0,.04);--shadow-sm:0 2px 8px rgba(0,0,0,.06);
  --shadow-md:0 6px 24px rgba(0,0,0,.09);--shadow-lg:0 16px 48px rgba(0,0,0,.14);
}
[data-theme="dark"]{
  --bg:#0d0f14;--surface:#13161e;--surface2:#1c2030;--surface3:#252a3a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8eaf2;--text2:#8b90a8;--text3:#4e5368;
  --accent:#8b96e0;--accent-dim:rgba(139,150,224,0.16);
  --danger:#f08a84;--good:#6ddca8;--warn:#f0b060;
  --shadow-xs:0 1px 4px rgba(0,0,0,.30);--shadow-sm:0 2px 8px rgba(0,0,0,.40);
  --shadow-md:0 6px 24px rgba(0,0,0,.50);--shadow-lg:0 16px 48px rgba(0,0,0,.55);
}
input::placeholder,textarea::placeholder{color:var(--text3);opacity:1;}
html,body{height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;}

header{border-bottom:1px solid var(--border);padding:0 22px;display:flex;align-items:center;gap:13px;background:var(--surface);min-height:56px;flex-shrink:0;}
.logo{width:32px;height:32px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo svg{width:20px;height:20px;}
.app-name{font-size:15px;font-weight:600;letter-spacing:-0.2px;}
.app-sub{font-size:11px;color:var(--text2);}
@media(max-width:560px){.app-sub{display:none;}}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.hdr-btn{background:none;border:1px solid var(--border2);color:var(--text2);border-radius:8px;padding:6px 12px;font-family:var(--sans);font-size:12px;cursor:pointer;transition:background .15s,color .15s;display:inline-flex;align-items:center;gap:6px;}
.hdr-btn:hover{background:var(--surface2);color:var(--text);}
.hdr-btn svg{width:14px;height:14px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .3s;}
.sync-dot.ok{background:var(--good);}

.body{flex:1;display:flex;min-height:0;}
/* list */
.pane-list{width:300px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;}
.list-hd{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:9px;}
.list-top{display:flex;align-items:center;justify-content:space-between;}
.list-top .t{font-size:13px;font-weight:700;}
.list-new{background:var(--accent);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;}
.list-search{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:7px 11px;font-family:var(--sans);font-size:12.5px;color:var(--text);outline:none;}
.list-search:focus{border-color:var(--accent);}
.list-scroll{flex:1;overflow-y:auto;}
.pl-item{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;display:flex;align-items:center;gap:11px;}
.pl-item:hover{background:var(--surface2);}
.pl-item.active{background:var(--accent-dim);}
.pl-thumb{width:34px;height:34px;border-radius:7px;background:var(--surface3);flex-shrink:0;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;color:var(--text3);}
.pl-thumb svg{width:18px;height:18px;}
.pl-meta{flex:1;min-width:0;}
.pl-code{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:500;}
.pl-name{font-size:12.5px;color:var(--text);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pl-stat{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.pl-stat.idea{background:var(--text3);}
.pl-stat.cloning{background:#5075b5;}
.pl-stat.sequencing{background:var(--warn);}
.pl-stat.verified{background:var(--good);}
.pl-stat.failed{background:var(--danger);}
.list-empty{padding:34px 20px;text-align:center;color:var(--text3);font-size:12.5px;line-height:1.6;}

/* editor */
.pane-ed{flex:1;overflow-y:auto;min-width:0;background:var(--bg);}
.ed-wrap{max-width:900px;margin:0 auto;padding:24px 30px 80px;}
.ed-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);text-align:center;padding:40px;}
.ed-empty svg{width:44px;height:44px;opacity:.5;margin-bottom:14px;}
.ed-empty .t{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.ed-cols{display:grid;grid-template-columns:1.15fr .85fr;gap:20px;align-items:start;}
@media(max-width:860px){.ed-cols{grid-template-columns:1fr;}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow-xs);margin-bottom:16px;}
.pl-code-in{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--accent);background:none;border:none;outline:none;width:100%;letter-spacing:.5px;}
.pl-name-in{font-size:20px;font-weight:700;letter-spacing:-.3px;color:var(--text);border:none;background:none;outline:none;width:100%;padding:4px 0 2px;font-family:var(--sans);}
.fields{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px 15px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.fld{display:flex;flex-direction:column;gap:4px;}
.fld.full{grid-column:1/-1;}
.fld label{font-size:9.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);}
.fld input,.fld select,.fld textarea{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:7px 9px;font-family:var(--sans);font-size:12.5px;color:var(--text);outline:none;}
.fld textarea{resize:vertical;min-height:46px;line-height:1.5;}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--accent);}
.del-btn{background:none;border:1px solid var(--border2);color:var(--danger);border-radius:8px;padding:7px 13px;font-family:var(--sans);font-size:12px;cursor:pointer;margin-top:6px;}
.del-btn:hover{background:rgba(192,64,64,.1);}

/* map */
.map-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow-xs);}
.map-hd{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);margin-bottom:11px;}
.map-drop{border:1.5px dashed var(--border2);border-radius:11px;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);cursor:pointer;text-align:center;padding:20px;transition:border-color .15s,background .15s;overflow:hidden;}
.map-drop:hover{border-color:var(--accent);color:var(--accent);}
.map-drop.has-img{border-style:solid;padding:0;cursor:zoom-in;background:var(--surface2);}
.map-drop svg{width:34px;height:34px;margin-bottom:9px;opacity:.6;}
.map-drop img{width:100%;height:100%;object-fit:contain;display:block;}
.map-actions{display:flex;gap:8px;margin-top:10px;}
.map-actions button{flex:1;background:none;border:1px solid var(--border2);color:var(--text2);border-radius:8px;padding:7px;font-family:var(--sans);font-size:11.5px;cursor:pointer;}
.map-actions button:hover{background:var(--surface2);color:var(--text);}
.map-hint{font-size:10.5px;color:var(--text3);margin-top:9px;line-height:1.5;}

/* lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:none;align-items:center;justify-content:center;padding:30px;cursor:zoom-out;}
.lightbox.open{display:flex;}
.lightbox img{max-width:100%;max-height:100%;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.5);}

.status-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px;}
.pill-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.pill{font-size:11px;background:var(--accent-dim);color:var(--accent);padding:3px 9px;border-radius:20px;font-weight:500;}
</style>
</head>
<body>

<header>
  <div class="logo"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="8.5" stroke="white" stroke-width="1.7"/><circle cx="12" cy="3.5" r="1.8" fill="white"/><circle cx="20.5" cy="12" r="1.8" fill="white"/><path d="M12 8v3l2 1.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg></div>
  <div>
    <div class="app-name">Plasmids</div>
    <div class="app-sub">Your plasmid database &amp; maps</div>
  </div>
  <div class="hdr-right">
    <span class="sync-dot" id="sync-dot" title="Sync status"></span>
    <button class="hdr-btn" onclick="exportCSV()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 001 1h4"/><path d="M17 21H7a2 2 0 01-2-2V5a2 2 0 012-2h7l5 5v11a2 2 0 01-2 2z"/><path d="M9 13h6M9 17h4"/></svg>Export CSV</button>
  </div>
</header>

<div class="body">
  <div class="pane-list">
    <div class="list-hd">
      <div class="list-top"><span class="t">Plasmids</span><button class="list-new" onclick="newPlasmid()">+ New</button></div>
      <input class="list-search" id="search" placeholder="Search code, name, insert…" autocomplete="off" oninput="renderList()">
    </div>
    <div class="list-scroll" id="list"></div>
  </div>
  <div class="pane-ed" id="editor"></div>
</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')"><img id="lightbox-img" alt="Plasmid map"></div>
<input type="file" id="map-file" accept="image/*" style="display:none" onchange="onMapFile(this)">

<script>
(function(){ var t='light'; try{ t=localStorage.getItem('hub_theme')||'light'; }catch(e){} document.documentElement.setAttribute('data-theme',t); })();
window.addEventListener('message', function(e){
  if(e.data==='setTheme:dark') document.documentElement.setAttribute('data-theme','dark');
  if(e.data==='setTheme:light') document.documentElement.setAttribute('data-theme','light');
  if(e.data && e.data.type==='switchTab' && e.data.item){ _openByCode(e.data.item); }
});
// Deep-link from other dHUB apps (e.g. Labbook): open the plasmid matching a pJM code
function _openByCode(code, _retry){ code=String(code||'').trim(); if(!code) return;
  var hit=Object.keys(DATA.plasmids).filter(function(k){ return (DATA.plasmids[k].code||'').toLowerCase()===code.toLowerCase(); })[0];
  if(hit){ selectP(hit); return; }
  var s=el('search'); if(s){ s.value=code; renderList(); }
  if(!_retry){ setTimeout(function(){ _openByCode(code,1); }, 900); } // retry after Firebase adopt
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function el(id){ return document.getElementById(id); }
function uid(){ return 'pl'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// ── Store (localStorage + Firebase /journal/plasmids via parent) ────────────
var DATA;
try{ DATA=JSON.parse(localStorage.getItem('hub_plasmids')||'null'); }catch(e){}
if(!DATA||typeof DATA!=='object') DATA={plasmids:{},updated:Date.now()};
DATA.plasmids=DATA.plasmids||{};
var _fbRef=null,_adopting=false,_syncT=null;
function fb(){ if(_fbRef!==null) return _fbRef; try{ _fbRef=(window.parent&&window.parent.firebase)?window.parent.firebase.database().ref('journal/plasmids'):undefined; }catch(e){ _fbRef=undefined; } return _fbRef; }
function setSync(ok){ var d=el('sync-dot'); if(d) d.classList.toggle('ok',ok); }
function saveLocal(){
  try{ localStorage.setItem('hub_plasmids', JSON.stringify(DATA)); }
  catch(e){ // quota: drop images from the local cache, keep metadata (images stay in Firebase)
    try{ var lite={plasmids:{},updated:DATA.updated}; Object.keys(DATA.plasmids).forEach(function(k){ var p=Object.assign({},DATA.plasmids[k]); delete p.mapImage; lite.plasmids[k]=p; }); localStorage.setItem('hub_plasmids', JSON.stringify(lite)); }catch(e2){}
  }
}
function save(){
  DATA.updated=Date.now(); saveLocal();
  if(_adopting) return;
  setSync(false); clearTimeout(_syncT);
  _syncT=setTimeout(function(){ var r=fb(); if(r){ try{ r.set(DATA).then(function(){setSync(true);}).catch(function(){}); }catch(e){} } }, 1200);
}
function initSync(){
  var r=fb(); if(!r) return;
  try{ r.once('value').then(function(s){ var v=s.val();
    if(v&&typeof v==='object'&&(v.updated||0)>(DATA.updated||0)){ _adopting=true; DATA={plasmids:v.plasmids||{},updated:v.updated}; saveLocal(); _adopting=false; renderAll(); }
    setSync(true);
  }).catch(function(){}); }catch(e){}
}

// ── State ───────────────────────────────────────────────────────────────────
var SEL=null;
var STATUSES=[['idea','Idea / planned'],['cloning','Cloning'],['sequencing','Sequencing'],['verified','Verified'],['failed','Failed']];

function nextCode(){
  var max=0;
  Object.keys(DATA.plasmids).forEach(function(k){
    var m=(DATA.plasmids[k].code||'').match(/pJM0*(\d+)/i);
    if(m){ var n=parseInt(m[1],10); if(n>max) max=n; }
  });
  return 'pJM'+('0'+(max+1)).slice(-2);
}
function newPlasmid(){
  var p={id:uid(),code:nextCode(),name:'',backbone:'',insert:'',resistance:'Amp',tags:'',poi:'',source:'Cloned in-house',status:'idea',seq:'',notes:'',mapImage:'',mapName:'',created:Date.now(),updated:Date.now()};
  DATA.plasmids[p.id]=p; save(); SEL=p.id; renderAll();
  setTimeout(function(){ var n=document.querySelector('.pl-name-in'); if(n) n.focus(); },30);
}
function delPlasmid(id){
  var p=DATA.plasmids[id];
  if(p && (p.name||p.insert||p.mapImage) && !confirm('Delete '+(p.code||'this plasmid')+'?')) return;
  delete DATA.plasmids[id]; if(SEL===id) SEL=null; save(); renderAll();
}
function _cur(){ return SEL?DATA.plasmids[SEL]:null; }
function setF(f,v){ var p=_cur(); if(!p) return; p[f]=v; p.updated=Date.now(); save(); if(f==='code'||f==='name'||f==='status'||f==='insert') renderList(); }

// ── Render list ─────────────────────────────────────────────────────────────
function renderList(){
  var q=(el('search').value||'').trim().toLowerCase();
  var items=Object.keys(DATA.plasmids).map(function(k){return DATA.plasmids[k];})
    .filter(function(p){ if(!q) return true; return ((p.code||'')+' '+(p.name||'')+' '+(p.insert||'')+' '+(p.tags||'')+' '+(p.poi||'')).toLowerCase().indexOf(q)>=0; })
    .sort(function(a,b){ return (a.code||'').localeCompare(b.code||'', undefined, {numeric:true}); });
  var host=el('list');
  if(!items.length){ host.innerHTML='<div class="list-empty">'+(Object.keys(DATA.plasmids).length?'No matches.':'No plasmids yet.<br>Add one with <b>+ New</b>.')+'</div>'; return; }
  host.innerHTML=items.map(function(p){
    var thumb=p.mapImage?('style="background-image:url('+p.mapImage.replace(/"/g,'')+')"'):'';
    var ico=p.mapImage?'':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="8"/></svg>';
    return '<div class="pl-item'+(SEL===p.id?' active':'')+'" onclick="selectP(\''+p.id+'\')"><div class="pl-thumb" '+thumb+'>'+ico+'</div><div class="pl-meta"><div class="pl-code">'+esc(p.code||'—')+'</div><div class="pl-name">'+esc(p.name||'Untitled')+'</div></div><span class="pl-stat '+(p.status||'idea')+'" title="'+esc(p.status||'')+'"></span></div>';
  }).join('');
}
function selectP(id){ SEL=id; renderAll(); }

// ── Render editor ───────────────────────────────────────────────────────────
function renderEditor(){
  var host=el('editor'); var p=_cur();
  if(!p){ host.innerHTML='<div class="ed-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="3.5" r="1.8" fill="currentColor" stroke="none"/><circle cx="20.5" cy="12" r="1.8" fill="currentColor" stroke="none"/></svg><div class="t">No plasmid selected</div><div>Pick one from the list, or add a new plasmid.</div></div>'; return; }
  var statusOpts=STATUSES.map(function(s){return '<option value="'+s[0]+'"'+(s[0]===p.status?' selected':'')+'>'+s[1]+'</option>';}).join('');
  var info=
    '<div class="card">'
      +'<input class="pl-code-in" value="'+esc(p.code||'')+'" spellcheck="false" onchange="setF(\'code\',this.value)">'
      +'<input class="pl-name-in" value="'+esc(p.name||'')+'" placeholder="Plasmid name / description" onchange="setF(\'name\',this.value)">'
      +'<div class="fields">'
        +'<div class="fld"><label>Backbone / vector</label><input value="'+esc(p.backbone||'')+'" placeholder="pRK5, PX458…" onchange="setF(\'backbone\',this.value)"></div>'
        +'<div class="fld"><label>Insert</label><input value="'+esc(p.insert||'')+'" placeholder="DCAF15-NL…" onchange="setF(\'insert\',this.value)"></div>'
        +'<div class="fld"><label>Resistance</label><input value="'+esc(p.resistance||'')+'" placeholder="Amp" onchange="setF(\'resistance\',this.value)"></div>'
        +'<div class="fld"><label>Tags</label><input value="'+esc(p.tags||'')+'" placeholder="HiBiT, HA, Tet-On" onchange="setF(\'tags\',this.value)"></div>'
        +'<div class="fld"><label>POI / target</label><input value="'+esc(p.poi||'')+'" placeholder="DCAF15" onchange="setF(\'poi\',this.value)"></div>'
        +'<div class="fld"><label>Status</label><select onchange="setF(\'status\',this.value)">'+statusOpts+'</select></div>'
        +'<div class="fld"><label>Source</label><input value="'+esc(p.source||'')+'" placeholder="Cloned in-house / gift / Addgene" onchange="setF(\'source\',this.value)"></div>'
        +'<div class="fld full"><label>Sequencing</label><input value="'+esc(p.seq||'')+'" placeholder="Sanger + Plasmidsaurus OK; 1 N deletion in…" onchange="setF(\'seq\',this.value)"></div>'
        +'<div class="fld full"><label>Notes</label><textarea onchange="setF(\'notes\',this.value)" placeholder="Anything worth remembering…">'+esc(p.notes||'')+'</textarea></div>'
      +'</div>'
      +'<button class="del-btn" onclick="delPlasmid(\''+p.id+'\')">Delete plasmid</button>'
    +'</div>';
  var map=
    '<div class="map-card"><div class="map-hd">Plasmid map</div>'
      +'<div class="map-drop'+(p.mapImage?' has-img':'')+'" onclick="'+(p.mapImage?'openLightbox()':'pickMap()')+'">'
        +(p.mapImage?('<img src="'+esc(p.mapImage)+'" alt="map">'):'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 15l5-5 4 4 3-3 6 6"/><circle cx="8.5" cy="8.5" r="1.5"/></svg><div>Click to upload a SnapGene map</div>')
      +'</div>'
      +'<div class="map-actions"><button onclick="pickMap()">'+(p.mapImage?'Replace':'Upload')+'</button>'+(p.mapImage?'<button onclick="removeMap()">Remove</button>':'')+'</div>'
      +'<div class="map-hint">Export your map from SnapGene as PNG/SVG and drop it here. Stored in your notebook DB (compressed).</div>'
    +'</div>';
  host.innerHTML='<div class="ed-wrap"><div class="ed-cols"><div>'+info+'</div><div>'+map+'</div></div></div>';
}

// ── Map image upload (client-side compression) ──────────────────────────────
function pickMap(){ el('map-file').value=''; el('map-file').click(); }
function onMapFile(inp){
  var f=inp.files&&inp.files[0]; if(!f) return;
  var p=_cur(); if(!p) return;
  compressImage(f, function(dataUri, name){
    if(!dataUri){ alert('Could not read that image.'); return; }
    p.mapImage=dataUri; p.mapName=name||f.name||''; p.updated=Date.now(); save(); renderAll();
  });
}
function removeMap(){ var p=_cur(); if(!p) return; p.mapImage=''; p.mapName=''; save(); renderAll(); }
function compressImage(file, cb){
  var img=new Image(), url=URL.createObjectURL(file);
  img.onload=function(){
    var max=1600, w=img.width, h=img.height;
    if(w>max||h>max){ var s=Math.min(max/w,max/h); w=Math.round(w*s); h=Math.round(h*s); }
    var c=document.createElement('canvas'); c.width=w; c.height=h;
    var ctx=c.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    var out; try{ out=c.toDataURL('image/png'); if(out.length>900000) out=c.toDataURL('image/jpeg',0.9); }catch(e){ out=null; }
    cb(out, file.name);
  };
  img.onerror=function(){ URL.revokeObjectURL(url); cb(null); };
  img.src=url;
}
function openLightbox(){ var p=_cur(); if(!p||!p.mapImage) return; el('lightbox-img').src=p.mapImage; el('lightbox').classList.add('open'); }

// ── CSV export ──────────────────────────────────────────────────────────────
function exportCSV(){
  var cols=['code','name','backbone','insert','resistance','tags','poi','status','source','seq','notes'];
  var rows=[cols.join(',')];
  Object.keys(DATA.plasmids).map(function(k){return DATA.plasmids[k];})
    .sort(function(a,b){ return (a.code||'').localeCompare(b.code||'', undefined, {numeric:true}); })
    .forEach(function(p){ rows.push(cols.map(function(c){ var v=(p[c]==null?'':String(p[c])).replace(/"/g,'""'); return /[",\n]/.test(v)?('"'+v+'"'):v; }).join(',')); });
  var blob=new Blob([rows.join('\n')],{type:'text/csv'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='plasmids.csv'; a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); },1000);
}

function renderAll(){ renderList(); renderEditor(); }
renderAll();
initSync();
