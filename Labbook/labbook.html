<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Labbook</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f4f5f8;--surface:#ffffff;--surface2:#f0f1f5;--surface3:#e4e6ee;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);
  --text:#1a1d2e;--text2:#5a5f7a;--text3:#9ca0b8;
  --accent:#4f9d8f;--accent-dim:rgba(79,157,143,0.13);
  --warn:#c47818;--danger:#c04040;--good:#2d9462;
  --sans:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
  --shadow-xs:0 1px 4px rgba(0,0,0,.04);--shadow-sm:0 2px 8px rgba(0,0,0,.06);
  --shadow-md:0 6px 24px rgba(0,0,0,.09);--shadow-lg:0 16px 48px rgba(0,0,0,.14);
  --glass:rgba(255,255,255,0.66);--glass-solid:rgba(255,255,255,0.9);--glass-brd:rgba(255,255,255,0.7);
  --glass-hi:inset 0 1px 0 rgba(255,255,255,.7);--glass-shadow:0 10px 30px -12px rgba(32,44,84,.26);
  --r2:12px;--r3:16px;--ease:cubic-bezier(.2,.8,.3,1);
}
[data-theme="dark"]{
  --bg:#0d0f14;--surface:#13161e;--surface2:#1c2030;--surface3:#252a3a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8eaf2;--text2:#8b90a8;--text3:#4e5368;
  --accent:#5cb3a3;--accent-dim:rgba(92,179,163,0.16);
  --warn:#f0b060;--danger:#f08a84;--good:#6ddca8;
  --shadow-xs:0 1px 4px rgba(0,0,0,.30);--shadow-sm:0 2px 8px rgba(0,0,0,.40);
  --shadow-md:0 6px 24px rgba(0,0,0,.50);--shadow-lg:0 16px 48px rgba(0,0,0,.55);
  --glass:rgba(28,32,46,0.62);--glass-solid:rgba(22,26,38,0.92);--glass-brd:rgba(255,255,255,0.1);
  --glass-hi:inset 0 1px 0 rgba(255,255,255,.07);--glass-shadow:0 12px 36px -12px rgba(0,0,0,.6);
}
input::placeholder,textarea::placeholder{color:var(--text3);opacity:1;}
html,body{height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;position:relative;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
  background:radial-gradient(50% 45% at 6% 4%,var(--accent-dim),transparent 70%),radial-gradient(46% 44% at 96% 96%,var(--accent-dim),transparent 70%);}
[data-theme="dark"] body::before{opacity:.7;}
body>*{position:relative;z-index:1;}
.pane{transition:width .26s var(--ease);}
body.lb-rz .pane{transition:none;}

header{border-bottom:1px solid var(--border);padding:0 18px;display:flex;align-items:center;gap:12px;background:var(--surface);min-height:48px;flex-shrink:0;}
.logo{width:28px;height:28px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo svg{width:17px;height:17px;}
.app-name{font-size:14px;font-weight:600;letter-spacing:-0.2px;}
.app-sub{font-size:11px;color:var(--text2);}
@media(max-width:760px){.app-sub{display:none;}}

.hdr-btn{background:none;border:1px solid var(--border2);color:var(--text2);border-radius:8px;padding:5px 10px;font-family:var(--sans);font-size:12px;cursor:pointer;transition:background .15s,color .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.hdr-btn:hover{background:var(--surface2);color:var(--text);}
.hdr-btn svg{width:14px;height:14px;}
.status-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);padding:3px 9px;border-radius:20px;background:var(--surface2);white-space:nowrap;}
.status-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .3s;flex-shrink:0;}
.status-pill.online{color:var(--good);}
.status-pill.online .dot{background:var(--good);}
.status-pill.saving .dot{background:var(--warn);}
.status-pill.offline{color:var(--warn);}
.status-pill.offline .dot{background:var(--warn);}

/* ── Ribbon ─────────────────────────────────────────────────────────────── */
#ribbon{display:flex;align-items:center;gap:5px;padding:5px 12px;background:var(--glass);-webkit-backdrop-filter:blur(16px) saturate(1.5);backdrop-filter:blur(16px) saturate(1.5);border-bottom:1px solid var(--glass-brd);flex-shrink:0;overflow-x:auto;min-height:42px;}
.rb-core,.rb-move-zone{display:flex;align-items:center;gap:2px;flex-wrap:nowrap;}
.rb-move-zone{min-width:12px;min-height:29px;border-radius:8px;}
.rb-move-zone.drop{outline:2px dashed var(--accent);outline-offset:2px;}
.rb-spacer{flex:1;min-width:8px;}
.rb-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.tb{width:29px;height:29px;border:none;background:none;border-radius:7px;color:var(--text2);cursor:pointer;font-size:13.5px;display:inline-flex;align-items:center;justify-content:center;transition:background .12s,color .12s;font-family:var(--sans);flex-shrink:0;}
.tb:hover{background:var(--surface2);color:var(--text);}
.tb.active{background:var(--accent-dim);color:var(--accent);}
.tb b,.tb i,.tb u,.tb s{pointer-events:none;}
.tb svg{width:15px;height:15px;pointer-events:none;}
.tb .sb{font-size:12px;font-weight:600;}
.tb .sb sub{font-size:8px;vertical-align:-3px;}
.tb .sb sup{font-size:8px;vertical-align:5px;}
.tb-sep{width:1px;height:20px;background:var(--border2);margin:0 4px;flex-shrink:0;}
.tb-sel{height:29px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);border-radius:7px;font-family:var(--sans);font-size:12px;padding:0 6px;cursor:pointer;outline:none;flex-shrink:0;}
.tb-sel:focus{border-color:var(--accent);}
.tb-color{position:relative;}
.tb-swatch{position:fixed;z-index:60;background:var(--surface);border:1px solid var(--border2);border-radius:10px;box-shadow:var(--shadow-md);padding:9px;display:none;width:184px;}
.tb-color.open .tb-swatch{display:block;}
.tb-swatch .sw-lbl{font-size:9.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text3);margin:0 0 7px 2px;}
.tb-swatch .sw-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.tb-swatch .sw{width:22px;height:22px;border-radius:6px;cursor:pointer;border:1px solid var(--border2);box-shadow:inset 0 0 0 1px rgba(255,255,255,.25);transition:transform .1s;}
.tb-swatch .sw:hover{transform:scale(1.12);}
.tb-swatch .sw-none{grid-column:1/-1;margin-top:7px;font-size:11px;color:var(--text2);border:1px dashed var(--border2);border-radius:7px;padding:5px;text-align:center;cursor:pointer;}
.tb-swatch .sw-none:hover{color:var(--text);border-color:var(--accent);}

/* ── Movable panels ─────────────────────────────────────────────────────── */
.panel{flex-shrink:0;}
.rb-move-zone .panel{display:flex;align-items:center;gap:2px;}
.rb-move-zone .panel-h{display:none;}
.rb-move-zone .panel::before{content:'';width:1px;height:20px;background:var(--border2);margin:0 4px;}
#rightdock .panel{width:100%;margin-bottom:10px;background:var(--surface);border:1px solid var(--border);border-radius:9px;}
#rightdock .panel-h{display:flex;align-items:center;gap:5px;padding:5px 8px;font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text3);cursor:grab;border-bottom:1px solid var(--border);}
#rightdock .panel-h .pdrag{color:var(--text3);font-size:11px;letter-spacing:-2px;}
#rightdock .panel-h .ptitle{flex:1;}
.panel-swap{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:1px 4px;border-radius:5px;}
.panel-swap:hover{color:var(--accent);background:var(--surface3);}
#rightdock .panel-body{display:flex;flex-direction:column;align-items:stretch;gap:5px;padding:8px;}

.body{flex:1;display:flex;min-height:0;position:relative;}
.pane-sec{width:210px;flex-shrink:0;background:var(--surface);overflow-y:auto;padding:10px 9px;}
.pane-lbl{font-size:9.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--text3);margin:10px 8px 6px;}
.sec-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:9px;cursor:pointer;font-size:13px;color:var(--text2);transition:background .12s;position:relative;}
.sec-item:hover{background:var(--surface2);color:var(--text);}
.sec-item.active{background:var(--accent-dim);color:var(--accent);font-weight:600;}
.sec-item .dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;background:var(--accent);}
.sec-item .del{margin-left:auto;opacity:.4;color:var(--text3);font-size:15px;line-height:1;padding:2px 4px;border-radius:5px;cursor:pointer;}
.sec-item:hover .del{opacity:.8;}
.sec-item .del:hover{color:var(--danger);opacity:1;background:var(--surface3);}
.add-row{display:flex;gap:6px;margin:8px 8px 4px;}
.add-row input{flex:1;min-width:0;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:6px 9px;font-family:var(--sans);font-size:12px;color:var(--text);outline:none;}
.add-row input:focus{border-color:var(--accent);}
.add-row button{background:var(--accent);border:none;color:#fff;border-radius:8px;width:30px;font-size:15px;cursor:pointer;flex-shrink:0;}
.proj-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:9px;cursor:pointer;font-size:13px;color:var(--text);font-weight:600;transition:background .12s;}
.proj-row:hover{background:var(--surface2);}
.proj-row .chev{font-size:10px;color:var(--text3);transition:transform .15s;display:inline-block;width:9px;text-align:center;flex-shrink:0;}
.proj-row .chev.open{transform:rotate(90deg);}
.proj-row .pcolor{width:9px;height:9px;border-radius:3px;flex-shrink:0;}
.proj-row .proj-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.proj-row .del{opacity:.4;color:var(--text3);font-size:15px;line-height:1;padding:2px 4px;border-radius:5px;cursor:pointer;}
.proj-row:hover .del{opacity:.8;}
.proj-row .del:hover{color:var(--danger);opacity:1;background:var(--surface3);}
.sec-item.sub{margin-left:15px;padding-left:12px;font-size:12.5px;border-left:1px solid var(--border);border-radius:0 9px 9px 0;}
.sec-item.sub .dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
.sec-item.sub.active .dot{background:var(--accent);}
.add-row.sub{margin-left:19px;}

.splitter{width:6px;flex-shrink:0;cursor:col-resize;background:var(--border);opacity:.5;transition:opacity .15s,background .15s;}
.splitter:hover,.splitter.drag{opacity:1;background:var(--accent);}
.pane-sec,.pane-pages{border-right:1px solid var(--border);}
.pane.collapsed{width:34px!important;padding:0;overflow:hidden;}
.rail{display:none;flex-direction:column;align-items:center;padding-top:12px;height:100%;}
.pane.collapsed .rail{display:flex;}
.pane.collapsed .pane-inner{display:none;}
.rail-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:5px;border-radius:6px;writing-mode:vertical-rl;font-size:11px;letter-spacing:.5px;}
.rail-btn:hover{color:var(--accent);background:var(--surface2);}
.collapse-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:5px;margin-left:auto;}
.collapse-btn:hover{color:var(--accent);background:var(--surface2);}

.pane-pages{width:280px;flex-shrink:0;background:var(--surface);overflow-y:auto;display:flex;flex-direction:column;}
.pages-hd{padding:11px 13px 9px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:2;}
.pages-hd .t{font-size:13px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pages-new{background:var(--accent);border:none;color:#fff;border-radius:8px;padding:6px 11px;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.icon-btn{background:none;border:1px solid var(--border2);color:var(--text2);border-radius:7px;width:28px;height:28px;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.icon-btn:hover{color:var(--accent);border-color:var(--accent);}
.pages-filter.on{padding:8px 13px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.filter-chip{font-size:11px;padding:2px 9px;border-radius:20px;background:var(--accent-dim);color:var(--accent);font-weight:600;display:inline-flex;gap:5px;align-items:center;}
.filter-chip .x{cursor:pointer;}
.grp-lbl{font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);padding:11px 14px 4px;}
.page-item{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.page-item:hover{background:var(--surface2);}
.page-item.active{background:var(--accent-dim);}
.page-code{font-family:var(--mono);font-size:11px;color:var(--accent);font-weight:500;}
.page-title{font-size:13px;font-weight:600;margin-top:3px;color:var(--text);line-height:1.35;}
.page-meta{font-size:10.5px;color:var(--text3);margin-top:4px;font-family:var(--mono);display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.page-kind{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);}
.pg-status{padding:1px 7px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;font-size:8.5px;}
.pg-status.planned{background:var(--surface3);color:var(--text2);}
.pg-status.ongoing{background:rgba(94,135,197,.16);color:#5075b5;}
.pg-status.done{background:rgba(45,148,98,.15);color:var(--good);}
.pages-empty{padding:36px 20px;text-align:center;color:var(--text3);font-size:12.5px;line-height:1.6;}

.pane-ed{flex:1;overflow-y:auto;min-width:0;background:var(--bg);}
.ed-wrap{width:min(1060px,100%);margin:0 auto;padding:22px 32px 90px;}
@media(max-width:900px){.ed-wrap{padding:18px 20px 80px;}}
.ed-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);text-align:center;padding:40px;}
.ed-empty svg{width:44px;height:44px;opacity:.5;margin-bottom:14px;}
.ed-empty .t{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px;}

#rightdock{width:250px;flex-shrink:0;border-left:1px solid var(--glass-brd);background:var(--glass);-webkit-backdrop-filter:blur(16px) saturate(1.4);backdrop-filter:blur(16px) saturate(1.4);overflow-y:auto;padding:12px;}
#rightdock.hidden{display:none;}
.dock-empty{color:var(--text3);font-size:11.5px;text-align:center;padding:14px 8px;line-height:1.5;}
.dock-btn{display:flex;align-items:center;gap:8px;padding:6px 8px;border:none;background:none;color:var(--text2);border-radius:7px;font-size:12px;cursor:pointer;font-family:var(--sans);text-align:left;}
.dock-btn:hover{background:var(--surface2);color:var(--text);}
.dock-btn svg{width:15px;height:15px;flex-shrink:0;}
.outline-item{font-size:12px;color:var(--text2);padding:5px 8px;border-radius:6px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.outline-item:hover{background:var(--surface2);color:var(--text);}
.tagchip-btn{font-size:11.5px;padding:3px 9px;border-radius:20px;background:var(--accent-dim);color:var(--accent);font-weight:600;cursor:pointer;border:none;}
.meta-line{font-size:11.5px;color:var(--text2);display:flex;justify-content:space-between;gap:8px;padding:3px 0;}
.meta-line b{color:var(--text);font-weight:600;}

/* Experiment header */
.exh{background:var(--glass);-webkit-backdrop-filter:blur(12px) saturate(1.4);backdrop-filter:blur(12px) saturate(1.4);border:1px solid var(--glass-brd);border-radius:var(--r3);padding:16px 20px;margin-bottom:16px;box-shadow:var(--glass-shadow),var(--glass-hi);position:relative;}
.exh-top{display:flex;align-items:center;gap:8px;}
.exh-code{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--accent);background:none;border:none;outline:none;flex:1;padding:0;letter-spacing:.5px;}
.exh-acts{display:flex;gap:5px;}
.exh-act{background:none;border:1px solid var(--border2);color:var(--text2);border-radius:7px;width:30px;height:28px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
.exh-act:hover{color:var(--accent);border-color:var(--accent);}
.exh-act.danger:hover{color:var(--danger);border-color:var(--danger);}
.exh-act svg{width:15px;height:15px;}
.exh-title{font-size:23px;font-weight:700;letter-spacing:-.4px;color:var(--text);border:none;background:none;outline:none;width:100%;padding:4px 0 2px;font-family:var(--sans);}
.exh-title.code-big{font-family:var(--mono);color:var(--text);font-size:24px;}
.exh-fields{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px 16px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.exh-fld{display:flex;flex-direction:column;gap:4px;}
.exh-fld label{font-size:9.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);}
.exh-fld input,.exh-fld select{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:6px 9px;font-family:var(--sans);font-size:12.5px;color:var(--text);outline:none;}
.exh-fld input:focus,.exh-fld select:focus{border-color:var(--accent);}
.exh-chips{display:flex;flex-wrap:wrap;gap:5px;}
.exh-chips:empty{display:none;}
.exh-chip{font-size:11px;font-weight:600;background:var(--surface3);color:var(--text2);border-radius:6px;padding:2px 8px;cursor:pointer;white-space:nowrap;}
.exh-chip[data-kind="plasmid"]{color:#6d7bd0;background:rgba(109,123,208,.14);}
.exh-chip[data-kind="cell"]{color:#4f9d8f;background:rgba(79,157,143,.14);}
.exh-chip:hover{filter:brightness(1.08);}

.blk{background:var(--glass);-webkit-backdrop-filter:blur(12px) saturate(1.4);backdrop-filter:blur(12px) saturate(1.4);border:1px solid var(--glass-brd);border-radius:var(--r2);margin-bottom:12px;box-shadow:var(--glass-shadow),var(--glass-hi);overflow:hidden;transition:box-shadow .2s var(--ease),transform .18s var(--ease);}
.blk:hover{box-shadow:var(--glass-shadow),0 4px 12px -4px rgba(32,44,84,.18),var(--glass-hi);}
.blk-hd{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--surface2);border-bottom:1px solid var(--border);}
.blk-day{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);border-radius:5px;padding:2px 6px;flex-shrink:0;}
.blk-date{font-family:var(--mono);font-size:12px;color:var(--text);background:none;border:1px solid var(--border2);border-radius:6px;padding:3px 8px;outline:none;}
.blk-date:focus{border-color:var(--accent);}
.blk-title{font-size:12.5px;font-weight:600;color:var(--text2);border:none;background:none;outline:none;flex:1;font-family:var(--sans);}
.blk-del{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:3px 6px;border-radius:6px;}
.blk-del:hover{color:var(--danger);background:var(--surface3);}
.rt{padding:12px 16px;font-size:13.5px;line-height:1.7;color:var(--text);outline:none;min-height:40px;}
.rt:focus{background:var(--surface);}
.rt p{margin:0 0 6px;}
.rt ul,.rt ol{margin:0 0 6px 22px;}
.rt li{margin:2px 0;}
.rt h1{font-size:20px;font-weight:700;margin:10px 0 6px;}
.rt h2{font-size:17px;font-weight:700;margin:9px 0 5px;}
.rt h3{font-size:15px;font-weight:700;margin:8px 0 5px;}
.rt blockquote{border-left:3px solid var(--border2);margin:6px 0;padding:2px 12px;color:var(--text2);}
.rt pre{background:var(--surface2);border-radius:8px;padding:10px 12px;font-family:var(--mono);font-size:12.5px;overflow-x:auto;margin:6px 0;}
.rt table{border-collapse:collapse;margin:8px 0;min-width:220px;}
.rt td,.rt th{border:1px solid var(--border2);padding:6px 10px;min-width:48px;vertical-align:top;}
.rt th{background:var(--surface2);font-weight:700;text-align:left;}
.rt hr{border:none;border-top:1px solid var(--border2);margin:12px 0;}
.rt sub{vertical-align:sub;font-size:.75em;line-height:0;}
.rt sup{vertical-align:super;font-size:.75em;line-height:0;}
.rt a.lb-link{color:var(--accent);font-weight:600;cursor:pointer;text-decoration:none;border-bottom:1px dashed var(--accent);}
.rt a.lb-link.proto{color:#a56983;border-bottom-color:#a56983;}
.rt a.lb-link.plasmid{color:#6d7bd0;border-bottom-color:#6d7bd0;}
.rt a.lb-url{color:var(--accent2);text-decoration:underline;cursor:pointer;}
.rt img.lb-att{max-width:100%;height:auto;border-radius:8px;margin:6px 0;display:block;box-shadow:var(--shadow-xs);border:1px solid var(--border);}
.rt img.lb-att.att-missing{min-width:120px;min-height:70px;border:1px dashed var(--border2);background:var(--surface2);}
.rt .lb-proto-hd{margin:8px 0 2px;}
.rt .lb-tag{color:#5e72c4;background:rgba(94,114,196,.14);border-radius:5px;padding:0 5px;font-weight:600;font-size:12.5px;}
.rt .lb-ab{color:#c47818;background:rgba(196,120,24,.13);border-radius:5px;padding:0 5px;font-weight:600;font-size:12.5px;cursor:pointer;}
.rt .lb-todo{display:flex;align-items:flex-start;gap:8px;margin:3px 0;}
.rt .lb-box{width:15px;height:15px;border:1.6px solid var(--border2);border-radius:4px;flex-shrink:0;margin-top:2px;cursor:pointer;}
.rt .lb-todo.done .lb-box{background:var(--accent);border-color:var(--accent);}
.rt .lb-todo.done{opacity:.6;text-decoration:line-through;}
/* Checklist = real list, checkbox drawn on the marker */
.rt ul.lb-check{list-style:none;margin:2px 0 6px 4px;padding-left:0;}
.rt ul.lb-check ul{list-style:none;margin:2px 0 2px 10px;padding-left:0;}
.rt ul.lb-check li{position:relative;list-style:none;padding-left:26px;margin:3px 0;}
.rt ul.lb-check li::before{content:'';position:absolute;left:0;top:2px;width:15px;height:15px;border:1.6px solid var(--border2);border-radius:4px;background:var(--surface);cursor:pointer;}
.rt ul.lb-check li.done::before{background:var(--accent);border-color:var(--accent);}
.rt ul.lb-check li.done::after{content:'';position:absolute;left:5px;top:4px;width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);pointer-events:none;}
.rt ul.lb-check li.done{opacity:.62;text-decoration:line-through;}
.add-blk{width:100%;border:1.5px dashed var(--border2);background:none;color:var(--text3);border-radius:11px;padding:11px;font-family:var(--sans);font-size:12.5px;cursor:pointer;transition:color .15s,border-color .15s;}
.add-blk:hover{color:var(--accent);border-color:var(--accent);}
/* Experiment free canvas + collapsible dated sections */
.exp-canvas{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow-xs);min-height:180px;margin:6px 0 14px;}
.rt[data-ph]:empty::before{content:attr(data-ph);color:var(--text3);pointer-events:none;}
.exp-dated{margin-top:2px;}
.exp-dated>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);padding:6px 4px;user-select:none;}
.exp-dated>summary::-webkit-details-marker{display:none;}
.exp-dated>summary::before{content:'\25B8';font-size:12px;transition:transform .15s;}
.exp-dated[open]>summary::before{transform:rotate(90deg);}
.exp-dated-n{background:var(--surface3);color:var(--text2);border-radius:20px;padding:1px 8px;font-size:10px;letter-spacing:0;}
.exp-dated-body{margin-top:6px;}

.nb-body,.pg-body{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow-xs);min-height:200px;}
.nb-free{margin-bottom:14px;}
.day-from-lbl{font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin:0 4px 8px;}
.day-exp{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;box-shadow:var(--shadow-xs);overflow:hidden;}
.day-exp-hd{display:flex;align-items:center;gap:9px;padding:9px 13px;background:var(--surface2);border-bottom:1px solid var(--border);}
.day-exp-hd .pdot{width:9px;height:9px;border-radius:3px;flex-shrink:0;}
.dfx-code{font-family:var(--mono);color:var(--accent);font-weight:600;font-size:12px;}
.dfx-title{color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;}
.dfx-open{background:none;border:1px solid var(--border2);color:var(--text2);border-radius:6px;font-size:11px;padding:3px 8px;cursor:pointer;}
.dfx-open:hover{color:var(--accent);border-color:var(--accent);}
.dfx-blk{border-top:1px solid var(--border);}
.dfx-blk:first-child{border-top:none;}
.dfx-blk-t{font-size:11px;font-weight:600;color:var(--text3);padding:8px 16px 0;cursor:pointer;}
.dfx-blk-t:hover{color:var(--accent);}
.dfx-blk-link{opacity:.55;font-size:10px;}
.dfx-proj{font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px;}
.dfx-sep{color:var(--text3);font-size:11px;}
.dfx-code.dfx-codelink{cursor:pointer;text-decoration:none;border-bottom:1px dashed var(--accent);}
.dfx-code.dfx-codelink:hover{filter:brightness(1.12);}

/* Ongoing overview */
.ov-proj{margin-bottom:18px;}
.ov-proj-hd{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:700;margin-bottom:8px;}
.ov-proj-hd .pdot{width:11px;height:11px;border-radius:3px;}
.ov-card{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-left-width:3px;border-radius:10px;padding:10px 14px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow-xs);}
.ov-card:hover{background:var(--surface2);}
.ov-card .c{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:600;}
.ov-card .t{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ov-card .d{font-size:11px;color:var(--text3);font-family:var(--mono);}

/* Antibody DB */
.ab-wrap{max-width:820px;margin:0 auto;padding:22px 26px 60px;}
.ab-hd{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.ab-hd .t{font-size:20px;font-weight:700;flex:1;}
.ab-search{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 11px;font-size:13px;color:var(--text);outline:none;width:200px;}
.ab-row{display:grid;grid-template-columns:1.4fr 1fr .9fr .9fr auto;gap:10px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:8px;box-shadow:var(--shadow-xs);}
.ab-row .abn{font-weight:600;color:var(--warn);}
.ab-row input{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:6px 8px;font-size:12.5px;color:var(--text);outline:none;font-family:var(--sans);width:100%;}
.ab-row input:focus{border-color:var(--accent);}
.ab-used{font-size:10.5px;color:var(--text3);grid-column:1/-1;font-family:var(--mono);}
.ab-used a{color:var(--accent);cursor:pointer;}
.ab-del{background:none;border:1px solid var(--border2);color:var(--text3);border-radius:7px;width:28px;height:28px;cursor:pointer;}
.ab-del:hover{color:var(--danger);border-color:var(--danger);}
.ab-form{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:18px;box-shadow:var(--shadow-xs);}
.ab-form-hd{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
.ab-form-grid{display:grid;grid-template-columns:1.4fr 1fr .9fr .9fr 1fr auto;gap:9px;align-items:center;}
.ab-form-grid input{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;font-size:12.5px;color:var(--text);outline:none;font-family:var(--sans);width:100%;}
.ab-form-grid input:focus{border-color:var(--accent);}
.ab-form-grid .btn{white-space:nowrap;}
.ab-list-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin:2px 4px 10px;}
@media(max-width:680px){.ab-form-grid{grid-template-columns:1fr 1fr;}.ab-form-grid .btn{grid-column:1/-1;}.ab-row{grid-template-columns:1fr 1fr;}}

/* Modal */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-back.open{display:flex;}
.modal-back{-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);}
.modal{background:var(--glass-solid);-webkit-backdrop-filter:blur(24px) saturate(1.6);backdrop-filter:blur(24px) saturate(1.6);border:1px solid var(--glass-brd);border-radius:var(--r3);width:100%;max-width:460px;padding:22px;box-shadow:var(--glass-shadow),var(--glass-hi);max-height:88vh;overflow-y:auto;}
.modal.wide{max-width:660px;}
.modal-t{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.mrow{display:flex;flex-direction:column;gap:5px;margin-bottom:13px;}
.mrow label{font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--text3);}
.mrow input,.mrow select{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 11px;font-family:var(--sans);font-size:13px;color:var(--text);outline:none;}
.mrow input:focus,.mrow select:focus{border-color:var(--accent);}
.mcode{font-family:var(--mono);font-size:13px;color:var(--accent);background:var(--accent-dim);border-radius:8px;padding:8px 11px;letter-spacing:.5px;}
.modal-act{display:flex;gap:9px;margin-top:18px;align-items:center;}
.btn{background:var(--accent);border:none;color:#fff;border-radius:9px;padding:9px 18px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;}
.btn:hover{filter:brightness(1.06);}
.btn.ghost{background:none;border:1px solid var(--border2);color:var(--text2);font-weight:500;}
.btn.ghost:hover{background:var(--surface2);color:var(--text);}
.btn.sm{padding:6px 11px;font-size:12px;border-radius:8px;}
.btn.danger{background:var(--danger);}
.grow{flex:1;}
/* Custom dialogs (confirm / prompt / picker) */
.dlg-msg{font-size:13px;color:var(--text2);line-height:1.6;}
.dlg-search{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 11px;font-size:13px;color:var(--text);outline:none;margin-bottom:10px;font-family:var(--sans);}
.dlg-search:focus{border-color:var(--accent);}
.dlg-list{max-height:44vh;overflow:auto;display:flex;flex-direction:column;gap:3px;}
.dlg-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);}
.dlg-item:hover,.dlg-item.sel{background:var(--surface2);color:var(--text);}
.dlg-item .ic{width:20px;height:20px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;}
.dlg-item .l{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dlg-item .s{font-size:11px;color:var(--text3);font-family:var(--mono);}
.dlg-empty{padding:20px;text-align:center;color:var(--text3);font-size:12.5px;}
/* Preset editor redesign */
.ps-blk{border:1px solid var(--border2);border-radius:11px;margin-bottom:11px;background:var(--surface);overflow:hidden;}
.ps-blk-hd{display:flex;gap:8px;align-items:center;padding:8px 10px;background:var(--surface2);border-bottom:1px solid var(--border);}
.ps-blk-hd .ps-day{width:120px!important;flex-shrink:0;}
.ps-blk-hd .ps-day input{width:44px;text-align:center;}
.ps-day-lbl{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text3);}
.ps-blk-hd .ps-title{flex:1;background:none;border:none;font-size:13px;font-weight:600;color:var(--text);outline:none;font-family:var(--sans);}
.ps-move{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 5px;}
.ps-move:hover{color:var(--accent);}
.ps-rt{padding:10px 12px;font-size:13px;line-height:1.6;outline:none;min-height:44px;}

/* Popups */
.pop{position:fixed;z-index:200;background:var(--glass-solid);-webkit-backdrop-filter:blur(20px) saturate(1.6);backdrop-filter:blur(20px) saturate(1.6);border:1px solid var(--glass-brd);border-radius:var(--r2);box-shadow:var(--glass-shadow),var(--glass-hi);padding:5px;max-height:300px;overflow:auto;width:250px;display:none;}
.pop.open{display:block;}
.pop-item{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:12.5px;color:var(--text2);}
.pop-item.sel,.pop-item:hover{background:var(--surface2);color:var(--text);}
.pop-item.danger:hover{color:var(--danger);}
.pop-item .ic{width:18px;height:18px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;}
.pop-item .sub{font-size:10.5px;color:var(--text3);margin-left:auto;font-family:var(--mono);}
.pop-sep{height:1px;background:var(--border);margin:4px 0;}

/* Table size picker + table toolbar */
#tbl-grid{position:fixed;z-index:200;background:var(--surface);border:1px solid var(--border2);border-radius:10px;box-shadow:var(--shadow-md);padding:10px;display:none;}
#tbl-grid.open{display:block;}
.tg-grid{display:grid;grid-template-columns:repeat(8,17px);grid-auto-rows:17px;gap:3px;}
.tg-cell{border:1px solid var(--border2);border-radius:3px;background:var(--surface2);cursor:pointer;}
.tg-cell.on{background:var(--accent);border-color:var(--accent);}
.tg-label{margin-top:8px;font-size:11px;color:var(--text2);text-align:center;font-family:var(--mono);}
#tbl-tools{position:fixed;z-index:150;display:none;gap:1px;background:var(--glass-solid);-webkit-backdrop-filter:blur(18px) saturate(1.6);backdrop-filter:blur(18px) saturate(1.6);border:1px solid var(--glass-brd);border-radius:var(--r2);box-shadow:var(--glass-shadow),var(--glass-hi);padding:3px;}
#tbl-tools.open{display:flex;align-items:center;}
#tbl-tools button{border:none;background:none;color:var(--text2);border-radius:6px;padding:4px 7px;font-size:11.5px;cursor:pointer;font-family:var(--sans);display:inline-flex;align-items:center;gap:3px;white-space:nowrap;}
#tbl-tools button:hover{background:var(--surface2);color:var(--text);}
#tbl-tools button.danger:hover{color:var(--danger);}
#tbl-tools .sep{width:1px;align-self:stretch;background:var(--border2);margin:2px 3px;}

/* Cmd+K spotlight */
#spot-back{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-start;justify-content:center;padding-top:14vh;}
#spot-back.open{display:flex;}
#spot{width:100%;max-width:560px;background:var(--surface);border:1px solid var(--border2);border-radius:14px;box-shadow:var(--shadow-lg);overflow:hidden;}
#spot input{width:100%;border:none;background:none;padding:16px 18px;font-size:16px;color:var(--text);outline:none;font-family:var(--sans);border-bottom:1px solid var(--border);}
#spot-res{max-height:56vh;overflow-y:auto;padding:6px;}
.spot-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;cursor:pointer;color:var(--text2);}
.spot-item.sel,.spot-item:hover{background:var(--surface2);color:var(--text);}
.spot-item .ic{width:22px;height:22px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;}
.spot-item .m{flex:1;overflow:hidden;}
.spot-item .m .a{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.spot-item .m .b{font-size:11px;color:var(--text3);}
.spot-item .k{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;}
.spot-empty{padding:26px;text-align:center;color:var(--text3);font-size:13px;}

@media print{ body>*{display:none!important;} #print-root{display:block!important;position:static;} }
#print-root{display:none;color:#111;background:#fff;font-family:'IBM Plex Sans',sans-serif;}

/* ── Mobile ─────────────────────────────────────────────────────────────── */
@media(max-width:760px){
  header{padding:0 12px;min-height:44px;}
  #ribbon{padding:4px 8px;gap:3px;}
  #rightdock{position:fixed;right:0;top:0;bottom:0;z-index:40;width:82%;max-width:300px;box-shadow:var(--shadow-lg);}
  .pane-sec{width:180px;}
  .pane-pages{width:210px;}
  .ed-wrap{padding:16px 14px 80px;}
  .tb{width:32px;height:32px;}
  .hdr-btn{padding:7px 10px;}
  .exh-title{font-size:20px;}
  .status-pill #lb-status-txt{display:none;}
}
@media(max-width:520px){
  .pane-sec:not(.collapsed){width:150px;}
  .pane-pages:not(.collapsed){width:170px;}
}
</style>
</head>
<body>

<header>
  <div class="logo"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 4.5A2.5 2.5 0 017.5 2H19v16H7.5A2.5 2.5 0 005 20.5v-16z" stroke="white" stroke-width="1.7" stroke-linejoin="round"/><path d="M5 20.5A2.5 2.5 0 017.5 18H19v4H7.5A2.5 2.5 0 015 19.5" stroke="white" stroke-width="1.7"/><path d="M9 7h7M9 10.5h7" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg></div>
  <div>
    <div class="app-name">Labbook</div>
    <div class="app-sub">Your electronic lab notebook</div>
  </div>
</header>

<div id="ribbon"></div>

<div class="body">
  <div class="pane pane-sec" id="pane-sec-wrap"><div class="rail"><button class="rail-btn" onclick="toggleCollapse('sec')">SECTIONS &rsaquo;</button></div><div class="pane-inner" id="pane-sec"></div></div>
  <div class="splitter" id="split-sec" onmousedown="startResize(event,'sec')" ondblclick="resetPane('sec')"></div>
  <div class="pane pane-pages" id="pane-pages-wrap"><div class="rail"><button class="rail-btn" onclick="toggleCollapse('pages')">PAGES &rsaquo;</button></div><div class="pane-inner" id="pane-pages" style="flex:1;display:flex;flex-direction:column;min-height:0;"></div></div>
  <div class="splitter" id="split-pages" onmousedown="startResize(event,'pages')" ondblclick="resetPane('pages')"></div>
  <div class="pane-ed" id="pane-ed"></div>
  <div id="rightdock"></div>
</div>

<!-- New experiment modal -->
<div class="modal-back" id="new-modal">
  <div class="modal">
    <div class="modal-t">New experiment</div>
    <div class="mrow"><label>Preset / type</label><select id="nm-type" onchange="nmUpdateCode()"></select></div>
    <div class="mrow"><label>Code prefix (optional)</label><input id="nm-poi" placeholder="e.g. SM" autocomplete="off" oninput="nmUpdateCode()"></div>
    <div class="mrow"><label>Start date</label><input id="nm-date" type="date" oninput="nmUpdateCode()"></div>
    <div class="mrow"><label>Title / plan (optional)</label><input id="nm-title" placeholder="Short description" autocomplete="off"></div>
    <div class="mrow"><label>Code (auto — editable)</label><input id="nm-code" class="mcode" autocomplete="off" spellcheck="false"></div>
    <div class="modal-act"><button class="btn ghost sm" onclick="openPresetEditor()">Edit presets…</button><span class="grow"></span><button class="btn ghost" onclick="closeNew()">Cancel</button><button class="btn" onclick="createExperiment()">Create</button></div>
  </div>
</div>

<!-- Preset editor -->
<div class="modal-back" id="preset-modal">
  <div class="modal wide">
    <div class="modal-t">Experiment presets<span class="grow"></span><select id="pe-type" class="tb-sel" onchange="peRender()"></select></div>
    <div class="mrow"><label>Default title</label><input id="pe-title"></div>
    <div id="pe-body"></div>
    <div class="modal-act"><button class="btn ghost sm" onclick="peAddBlock()">+ Add day-block</button><span class="grow"></span><button class="btn ghost" onclick="closePresetEditor()">Close</button><button class="btn" onclick="peSave()">Save preset</button></div>
  </div>
</div>

<!-- Cmd+K spotlight -->
<div id="spot-back" onclick="if(event.target.id==='spot-back')closeSpot()">
  <div id="spot"><input id="spot-in" type="text" placeholder="Search experiments, pages, tags, antibodies, folders…" autocomplete="off" oninput="spotRender()"><div id="spot-res"></div></div>
</div>

<div class="pop" id="acpop"></div>
<div class="pop" id="ctxmenu"></div>
<div class="pop" id="addmenu"></div>
<div id="tbl-grid"></div>
<div id="tbl-tools">
  <button onmousedown="event.preventDefault();tblAddRow(-1)" title="Insert row above">▤&#8593;</button>
  <button onmousedown="event.preventDefault();tblAddRow(1)" title="Insert row below">▤&#8595;</button>
  <button onmousedown="event.preventDefault();tblAddCol(-1)" title="Insert column left">&#8592;▤</button>
  <button onmousedown="event.preventDefault();tblAddCol(1)" title="Insert column right">▤&#8594;</button>
  <span class="sep"></span>
  <button onmousedown="event.preventDefault();tblDelRow()" title="Delete row">&#8722;row</button>
  <button onmousedown="event.preventDefault();tblDelCol()" title="Delete column">&#8722;col</button>

var PROJ_COLORS=['#4f9d8f','#5e72c4','#c47818','#c04040','#7c6fd4','#2d9462','#a56983','#d17a4a','#0079b9','#8d6e63'];

  HB:{title:'HiBiT: seed → overnight → compound → lytic read',blocks:[

    {d:1,title:'Compound addition + HiBiT Lytic',html:'<p><b>Compound addition (Echo)</b></p><p><b>HiBiT Lytic</b>: 15 µL/well (1:2 reagent:cell) · shake 300 rpm × 1 min · RT 10 min</p><p><b>Read</b>: PHERAstar · 0.2 s/well</p>'},

// ── Store ──
var LB={ data:null };
function lbBlank(){ return {projects:[],generalSections:[],experiments:{},pages:{},notebook:{},tags:[],presets:{},antibodies:{},attachments:{},_seeded:false,updated:0}; }
try{ LB.data=JSON.parse(localStorage.getItem('hub_labbook')||'null'); }catch(e){}
if(!LB.data||typeof LB.data!=='object') LB.data=lbBlank();
['projects','generalSections','experiments','pages','notebook','tags','presets','antibodies','attachments'].forEach(function(k){ if(!LB.data[k]) LB.data[k]=(k==='projects'||k==='generalSections'||k==='tags')?[]:{}; });
LB.data.projects.forEach(function(p,i){ p.sections=p.sections||[]; if(!p.color) p.color=PROJ_COLORS[i%PROJ_COLORS.length]; });
Object.keys(LB.data.experiments).forEach(function(k){ var e=LB.data.experiments[k];
  if(e.projectId && !e.sectionId){ var p=LB.data.projects.filter(function(x){return x.id===e.projectId;})[0];
    if(p){ var u=(p.sections||[]).filter(function(s){return s.name==='Unclassified';})[0];
      if(!u){ u={id:uid(),name:'Unclassified',created:Date.now()}; p.sections.push(u); } e.sectionId=u.id; } } });
// presets seed / refresh (adds RTX for existing users)
EXP_TYPES.forEach(function(t){ if(!LB.data.presets[t.id]){ var s=PRESET_SEED[t.id]||PRESET_SEED.EXP; LB.data.presets[t.id]={name:t.name,title:s.title,blocks:s.blocks.map(function(b){return {dayOffset:b.d,title:b.title,html:b.html};})}; } });

var SEED_GENERAL=[{name:'Notes',kind:'notes'},{name:'Papers I read',kind:'notes'},{name:'Antibodies',kind:'antibodies'},{name:'Bio Safety Committee',kind:'notes'},{name:'Seminars',kind:'seminars'}];
var SEED_PROJECTS=[
  {name:'Multivalent Chemistry',sections:['Meetings','TCIPs','Degradation','Kinetic Degradation','RIPTACs','CRISPR','NanoBRET Biosensor']},
  {name:'LRRC58',sections:['Information','TurboID']},{name:'RTag',sections:['Meetings','Information','Cloning']},
  {name:'SPARK NS',sections:['Meetings','Information','NanoBRET']},{name:'SMARCA Glues',sections:['HiBiT Degradation Screens']},
  {name:'Eisai',sections:['Degradation','Viability','Kinetic Degradation','Proteomics','Cell Lines']},
  {name:'EXTRA',sections:['Meetings','EUROPIN Summer School','Silvia Stay']},{name:'USC Projects',sections:['Marie Curie','USC PROTAC evaluation']}
];
function maybeSeed(){
  if(LB.data._seeded){ // ensure an Antibodies section exists for already-seeded books
    if(!LB.data.generalSections.some(function(s){return s.kind==='antibodies';})) LB.data.generalSections.splice(2,0,{id:uid(),name:'Antibodies',kind:'antibodies',created:Date.now()});
    return false;
  }
  if(LB.data.projects.length||Object.keys(LB.data.experiments).length||LB.data.generalSections.length||Object.keys(LB.data.pages).length){ LB.data._seeded=true; return false; }
  SEED_GENERAL.forEach(function(g){ LB.data.generalSections.push({id:uid(),name:g.name,kind:g.kind,created:Date.now()}); });
  SEED_PROJECTS.forEach(function(sp,i){ var p={id:uid(),name:sp.name,created:Date.now(),color:PROJ_COLORS[i%PROJ_COLORS.length],sections:[]};
    sp.sections.forEach(function(sn){ p.sections.push({id:uid(),name:sn,created:Date.now()}); }); LB.data.projects.push(p); });
  LB.data._seeded=true; return true;
}
function projById(id){ return LB.data.projects.filter(function(p){return p.id===id;})[0]; }
function projColor(id){ var p=projById(id); return p?(p.color||'#4f9d8f'):'#9ca0b8'; }

var _lbFbRef=null;
function lbFb(){ if(_lbFbRef!==null) return _lbFbRef; try{ if(window.parent && window.parent.firebase){ _lbFbRef=window.parent.firebase.database().ref('journal/labbook'); } else _lbFbRef=undefined; }catch(e){ _lbFbRef=undefined; } return _lbFbRef; }
var _syncT=null,_adopting=false,_synced=true;
function setSync(ok){ _synced=ok; updateStatus(); }
function updateStatus(){ var p=el('lb-status'); if(!p) return; var txt=el('lb-status-txt'); var on=navigator.onLine;
  p.classList.remove('online','offline','saving');
  if(!on){ p.classList.add('offline'); if(txt) txt.textContent='Offline'; p.title='Offline — changes saved locally'; }
  else if(_synced){ p.classList.add('online'); if(txt) txt.textContent='Saved ✓'; p.title='Saved and synced'; }
  else { p.classList.add('saving'); if(txt) txt.textContent='Saving…'; p.title='Saving changes…'; }
}
var _lsT=null,_lsDirty=false;
function _flushLocal(){ if(!_lsDirty) return; _lsDirty=false; clearTimeout(_lsT); _lsT=null; try{ localStorage.setItem('hub_labbook', JSON.stringify(LB.data)); }catch(e){} }
function save(){
  if(_adopting) return;
  LB.data.updated=Date.now();
  // Coalesce the (potentially large) full-tree stringify: a burst of save() calls from a
  // multi-step structural op serialises once. Keystrokes already arrive via queueSave (600ms).
  _lsDirty=true; clearTimeout(_lsT); _lsT=setTimeout(_flushLocal,150);
  setSync(false); clearTimeout(_syncT);
  _syncT=setTimeout(function(){ _flushLocal(); var r=lbFb(); if(r){ try{ r.set(LB.data).then(function(){setSync(true);}).catch(function(){setSync(true);}); }catch(e){ setSync(true); } } else { setSync(true); } }, 1200);
}
// Never lose a pending local write if the tab is hidden/closed before the 150ms flush.
window.addEventListener('pagehide',_flushLocal);
document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='hidden') _flushLocal(); });
function lbInitSync(){
  var r=lbFb(); if(!r) return;
  try{ r.once('value').then(function(s){
    var v=s.val();
    var remoteHas = v && ((v.projects||[]).length || Object.keys(v.experiments||{}).length || (v.generalSections||[]).length || Object.keys(v.pages||{}).length || Object.keys(v.notebook||{}).length);
    if(v && typeof v==='object' && remoteHas && (v.updated||0) > (LB.data.updated||0)){
      _adopting=true;
      LB.data={projects:v.projects||[],generalSections:v.generalSections||[],experiments:v.experiments||{},pages:v.pages||{},notebook:v.notebook||{},tags:v.tags||[],presets:v.presets||LB.data.presets,antibodies:v.antibodies||{},attachments:v.attachments||{},_seeded:(v._seeded===undefined?true:v._seeded),updated:v.updated||Date.now()};
      LB.data.projects.forEach(function(p,i){ p.sections=p.sections||[]; if(!p.color) p.color=PROJ_COLORS[i%PROJ_COLORS.length]; });
      EXP_TYPES.forEach(function(t){ if(!LB.data.presets[t.id]){ var sd=PRESET_SEED[t.id]||PRESET_SEED.EXP; LB.data.presets[t.id]={name:t.name,title:sd.title,blocks:sd.blocks.map(function(b){return {dayOffset:b.d,title:b.title,html:b.html};})}; } });
      try{ localStorage.setItem('hub_labbook',JSON.stringify(LB.data)); }catch(e){}
      _adopting=false; maybeSeed(); renderAll();
    }
    setSync(true);
  }).catch(function(){}); }catch(e){}
}

// ── Layout ──
var LAYOUT;
(function(){ var d={wSec:210,wPages:280,colSec:false,colPages:false,dockOpen:true,daysDesc:true,panels:{insert:'ribbon',outline:'dock',tags:'dock',meta:'dock'}};
  try{ var s=JSON.parse(localStorage.getItem('lb_layout')||'null'); if(s&&typeof s==='object'){ d.wSec=s.wSec||d.wSec; d.wPages=s.wPages||d.wPages; d.colSec=!!s.colSec; d.colPages=!!s.colPages; d.dockOpen=s.dockOpen!==false; d.daysDesc=s.daysDesc!==false; if(s.panels) d.panels=Object.assign(d.panels,s.panels); } }catch(e){}
  LAYOUT=d; })();
function saveLayout(){ try{ localStorage.setItem('lb_layout',JSON.stringify(LAYOUT)); }catch(e){} }
function applyLayout(){
  var sw=el('pane-sec-wrap'), pw=el('pane-pages-wrap');
  sw.classList.toggle('collapsed',LAYOUT.colSec); pw.classList.toggle('collapsed',LAYOUT.colPages);
  if(!LAYOUT.colSec) sw.style.width=LAYOUT.wSec+'px';
  if(!LAYOUT.colPages) pw.style.width=LAYOUT.wPages+'px';
  el('split-sec').style.display=LAYOUT.colSec?'none':''; el('split-pages').style.display=LAYOUT.colPages?'none':'';
  el('rightdock').classList.toggle('hidden',!LAYOUT.dockOpen);
}
function toggleCollapse(which){ if(which==='sec') LAYOUT.colSec=!LAYOUT.colSec; else LAYOUT.colPages=!LAYOUT.colPages; saveLayout(); applyLayout(); }
function resetPane(which){ if(which==='sec') LAYOUT.wSec=210; else LAYOUT.wPages=280; saveLayout(); applyLayout(); }
var _rz=null;
function startResize(ev,which){ ev.preventDefault(); _rz={which:which,x:ev.clientX,w:(which==='sec'?LAYOUT.wSec:LAYOUT.wPages)}; el('split-'+which).classList.add('drag'); document.body.classList.add('lb-rz'); document.body.style.cursor='col-resize'; document.body.style.userSelect='none'; }
var _rzRaf=0;
document.addEventListener('mousemove',function(ev){ if(!_rz) return; var dx=ev.clientX-_rz.x; var nw=Math.max(120,Math.min(560,_rz.w+dx)); if(_rz.which==='sec') LAYOUT.wSec=nw; else LAYOUT.wPages=nw; if(_rzRaf) return; _rzRaf=requestAnimationFrame(function(){ _rzRaf=0; applyLayout(); }); });
document.addEventListener('mouseup',function(){ if(!_rz) return; el('split-'+_rz.which).classList.remove('drag'); document.body.classList.remove('lb-rz'); document.body.style.cursor=''; document.body.style.userSelect=''; _rz=null; saveLayout(); });
function toggleDock(){ LAYOUT.dockOpen=!LAYOUT.dockOpen; saveLayout(); applyLayout(); renderPanels(); }

// ── Selection ──
var SEL={ node:{kind:'notebook'}, page:null };
var EXPANDED={}, TAGFILTER=null;
function nodeEq(a,b){ return !!a&&!!b&&a.kind===b.kind&&(a.projectId||null)===(b.projectId||null)&&(a.sectionId||null)===(b.sectionId||null); }
function selectNode(kind,projectId,sectionId){ SEL.node={kind:kind,projectId:projectId||null,sectionId:sectionId||null}; SEL.page=null; TAGFILTER=null; renderAll(); }
function selectPage(id){ SEL.page=id; renderAll(); }
function toggleProj(id){ EXPANDED[id]=!EXPANDED[id]; renderSections(); }
function genSecById(id){ return LB.data.generalSections.filter(function(s){return s.id===id;})[0]; }

// ── Tree ──
var NB_ICON='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 3v18M12 8h5M12 12h5"/></svg>';
var PAGE_ICON='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4M9 12h6M9 16h6"/></svg>';
var SEM_ICON='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="9" y="3" width="6" height="10" rx="3"/><path d="M6 11a6 6 0 0012 0M12 17v3M9 21h6"/></svg>';
var AB_ICON='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M6 3v6l-3 9a2 2 0 002 3h14a2 2 0 002-3l-3-9V3M6 3h12M8 15h8"/></svg>';
function secIcon(s){ return s.kind==='seminars'?SEM_ICON:(s.kind==='antibodies'?AB_ICON:PAGE_ICON); }
function secLeaf(node,label,icon,delCall,ctx){
  var active=nodeEq(SEL.node,node)?' active':'', sub=node.kind==='expsec'?' sub':'';
  var onclick="selectNode('"+node.kind+"','"+(node.projectId||'')+"','"+(node.sectionId||'')+"')";
  var del=delCall?'<span class="del" title="Delete" onclick="event.stopPropagation();'+delCall+'">&times;</span>':'';
  var ic = node.kind==='expsec' ? '<span class="dot"></span>' : (icon||'<span class="dot"></span>');
  return '<div class="sec-item'+sub+active+'" onclick="'+onclick+'"'+(ctx?' oncontextmenu="'+ctx+'"':'')+'>'+ic+'<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(label)+'</span>'+del+'</div>';
}
function renderSections(){
  var host=el('pane-sec'); var h='';
  h+='<div class="pane-lbl" style="display:flex;align-items:center;">Journal<button class="collapse-btn" onclick="toggleCollapse(\'sec\')" title="Collapse">&#10094;</button></div>';
  h+=secLeaf({kind:'notebook'},'Notebook',NB_ICON,null);
  h+='<div class="pane-lbl">General</div>';
  LB.data.generalSections.forEach(function(s){ h+=secLeaf({kind:'general',sectionId:s.id}, s.name, secIcon(s), "delGeneral('"+s.id+"')", "ctxGeneral(event,'"+s.id+"')"); });
  h+='<div class="add-row"><input id="new-gen" placeholder="New section…" autocomplete="off" onkeydown="if(event.key===\'Enter\')addGeneral()"><button onclick="addGeneral()">+</button></div>';
  h+='<div class="pane-lbl">Projects</div>';
  LB.data.projects.forEach(function(p){
    var open=!!EXPANDED[p.id];
    h+='<div class="proj-row" onclick="toggleProj(\''+p.id+'\')" oncontextmenu="ctxProject(event,\''+p.id+'\')"><span class="chev'+(open?' open':'')+'">&#9656;</span><span class="pcolor" style="background:'+p.color+'"></span><span class="proj-name">'+esc(p.name)+'</span><span class="del" title="Delete project" onclick="event.stopPropagation();delProject(\''+p.id+'\')">&times;</span></div>';
    if(open){ (p.sections||[]).forEach(function(s){ h+=secLeaf({kind:'expsec',projectId:p.id,sectionId:s.id}, s.name, null, "delSection('"+p.id+"','"+s.id+"')", "ctxFolder(event,'"+p.id+"','"+s.id+"')"); });
      h+='<div class="add-row sub"><input id="new-sec-'+p.id+'" placeholder="New folder…" autocomplete="off" onkeydown="if(event.key===\'Enter\')addSection(\''+p.id+'\')"><button onclick="addSection(\''+p.id+'\')">+</button></div>'; }
  });
  h+='<div class="add-row"><input id="new-proj" placeholder="New project…" autocomplete="off" onkeydown="if(event.key===\'Enter\')addProject()"><button onclick="addProject()">+</button></div>';
  host.innerHTML=h;
}
function addProject(){ var i=el('new-proj'); var n=(i.value||'').trim(); if(!n) return; var p={id:uid(),name:n,created:Date.now(),color:PROJ_COLORS[LB.data.projects.length%PROJ_COLORS.length],sections:[]}; LB.data.projects.push(p); EXPANDED[p.id]=true; save(); renderSections(); }
function delProject(id){ var exps=Object.keys(LB.data.experiments).filter(function(k){return LB.data.experiments[k].projectId===id;});
  lbConfirm('Delete this project'+(exps.length?(' and its '+exps.length+' item(s)'):'')+'?',{danger:true,title:'Delete project'}).then(function(ok){ if(!ok) return;
    exps.forEach(function(k){ delete LB.data.experiments[k]; });
    LB.data.projects=LB.data.projects.filter(function(p){return p.id!==id;});
    if(SEL.node.projectId===id){ SEL.node={kind:'notebook'}; SEL.page=null; } save(); renderAll(); }); }
function addSection(pid){ var i=el('new-sec-'+pid); var n=(i.value||'').trim(); if(!n) return; var p=projById(pid); if(!p) return; p.sections=p.sections||[]; var s={id:uid(),name:n,created:Date.now()}; p.sections.push(s); EXPANDED[pid]=true; save(); selectNode('expsec',pid,s.id); }
function delSection(pid,sid){ var exps=Object.keys(LB.data.experiments).filter(function(k){return LB.data.experiments[k].projectId===pid&&LB.data.experiments[k].sectionId===sid;});
  lbConfirm('Delete this folder'+(exps.length?(' and its '+exps.length+' item(s)'):'')+'?',{danger:true,title:'Delete folder'}).then(function(ok){ if(!ok) return;
    exps.forEach(function(k){ delete LB.data.experiments[k]; });

function renameGeneral(id){ var s=genSecById(id); if(!s) return; lbPrompt('Section name',s.name).then(function(n){ if(n==null) return; s.name=n.trim()||s.name; save(); renderAll(); }); }

// ── Pages ──
function isCoded(e){ return e.kind!=='note'; }
function allBlockDates(){ var set={}; Object.keys(LB.data.experiments).forEach(function(k){ (LB.data.experiments[k].blocks||[]).forEach(function(b){ if(b.date) set[b.date]=1; }); }); return set; }
function blocksForDate(D){ var out=[]; Object.keys(LB.data.experiments).forEach(function(k){ var e=LB.data.experiments[k]; (e.blocks||[]).forEach(function(b){ if(b.date===D) out.push({exp:e,block:b}); }); }); return out; }
function entryMatchesTag(html,tag){ return (html||'').indexOf('data-tag="'+tag+'"')>=0; }
function typeName(id){ var t=EXP_TYPES.filter(function(x){return x.id===id;})[0]; return t?t.name:id; }
function pageItemExp(e){ var code=isCoded(e)?('<div class="page-code">'+esc(e.code||'')+'</div>'):('<div class="page-kind">'+esc(e.noteType||'note')+'</div>');
  var meta=isCoded(e)?('<span class="pg-status '+(e.status||'planned')+'">'+esc(e.status||'planned')+'</span><span>'+esc(fmtDate(e.startDate||''))+'</span>'):('<span>'+esc(fmtDate(e.date||e.startDate||''))+'</span>');
  return '<div class="page-item'+(SEL.page===e.id?' active':'')+'" onclick="selectPage(\''+e.id+'\')" oncontextmenu="ctxExp(event,\''+e.id+'\')">'+code+'<div class="page-title">'+esc(e.title||(isCoded(e)?e.code:'Untitled'))+'</div><div class="page-meta">'+meta+'</div></div>'; }
function renderPages(){
  var host=el('pane-pages'); var node=SEL.node;
  var ppw=el('pane-pages-wrap'), spg=el('split-pages'); if(ppw) ppw.style.display=''; if(spg) spg.style.display='';
  if(node.kind==='notebook'){
    var dset=allBlockDates(); Object.keys(LB.data.notebook).forEach(function(k){dset[k]=1;});
    var days=Object.keys(dset).sort(); if(LAYOUT.daysDesc) days.reverse();
    var items=days.map(function(k){ var pg=LB.data.notebook[k]; var nblk=blocksForDate(k).length;
      var preview=pg?(pg.html||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().slice(0,46):'';
      var meta=(nblk?(nblk+' block'+(nblk>1?'s':'')):'')+(preview?(nblk?' · ':'')+preview:'');
      return '<div class="page-item'+(SEL.page===k?' active':'')+'" onclick="selectPage(\''+k+'\')" oncontextmenu="ctxDay(event,\''+k+'\')"><div class="page-title">'+esc(fmtDate(k))+'</div><div class="page-meta">'+esc(meta||'empty')+'</div></div>'; }).join('');
    host.innerHTML='<div class="pages-hd"><span class="t">Notebook</span><button class="icon-btn" title="Sort days" onclick="toggleDaySort()">'+(LAYOUT.daysDesc?'&#8595;':'&#8593;')+'</button><button class="pages-new" onclick="newNotebookDay()">+ Day</button></div>'
      +'<div class="page-item'+(SEL.page==='__ongoing__'?' active':'')+'" onclick="selectPage(\'__ongoing__\')" style="border-bottom:2px solid var(--border);"><div class="page-title">&#9733; Ongoing experiments</div><div class="page-meta">by project</div></div>'
      +(days.length?items:'<div class="pages-empty">No days yet. Use <b>+ Day</b> or open <b>Ongoing</b>.</div>');
    return;
  }
  if(node.kind==='general'){
    var sec=genSecById(node.sectionId); if(!sec){ host.innerHTML='<div class="pages-empty">Pick a section.</div>'; return; }
    if(sec.kind==='antibodies'){ if(ppw) ppw.style.display='none'; if(spg) spg.style.display='none'; host.innerHTML=''; return; }
    var pgs=Object.keys(LB.data.pages).map(function(k){return LB.data.pages[k];}).filter(function(pg){return pg.sectionId===node.sectionId;});
    if(TAGFILTER) pgs=pgs.filter(function(pg){return entryMatchesTag(pg.html,TAGFILTER);});
    pgs.sort(function(a,b){ return (b.date||'').localeCompare(a.date||'')||(b.created||0)-(a.created||0); });
    var fbar=TAGFILTER?'<div class="pages-filter on"><span class="filter-chip">#'+esc(TAGFILTER)+'<span class="x" onclick="TAGFILTER=null;renderAll()">&times;</span></span></div>':'';
    var addLbl=sec.kind==='seminars'?'+ Seminar':'+ Page';
    var items=pgs.map(function(pg){ if(sec.kind==='seminars') return '<div class="page-item'+(SEL.page===pg.id?' active':'')+'" onclick="selectPage(\''+pg.id+'\')"><div class="page-title">'+esc(pg.title||'Untitled seminar')+'</div><div class="page-meta">'+(pg.speaker?('<span>'+esc(pg.speaker)+'</span>'):'')+'<span>'+esc(fmtDate(pg.date||''))+'</span></div></div>';
      var preview=(pg.html||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().slice(0,60);
      return '<div class="page-item'+(SEL.page===pg.id?' active':'')+'" onclick="selectPage(\''+pg.id+'\')"><div class="page-title">'+esc(pg.title||'Untitled')+'</div><div class="page-meta">'+esc(preview||'empty')+'</div></div>'; }).join('');
    host.innerHTML='<div class="pages-hd"><span class="t">'+esc(sec.name)+'</span><button class="pages-new" onclick="'+(sec.kind==='seminars'?'newSeminar()':'newPage()')+'">'+addLbl+'</button></div>'+fbar+(pgs.length?items:'<div class="pages-empty">Nothing yet.</div>');
    return;
  }
  if(node.kind==='expsec'){
    var p=projById(node.projectId);
    var sec2=p?(p.sections||[]).filter(function(s){return s.id===node.sectionId;})[0]:null;
    if(!sec2){ host.innerHTML='<div class="pages-empty">Pick a folder inside a project.</div>'; return; }
    var exps=Object.keys(LB.data.experiments).map(function(k){return LB.data.experiments[k];}).filter(function(e){return e.projectId===node.projectId&&e.sectionId===node.sectionId;});
    if(TAGFILTER) exps=exps.filter(function(e){return (e.blocks||[]).some(function(b){return entryMatchesTag(b.html,TAGFILTER);})||entryMatchesTag(e.html,TAGFILTER);});
    exps.sort(function(a,b){return (b.startDate||b.date||'').localeCompare(a.startDate||a.date||'')||(b.created||0)-(a.created||0);});
    var fbar2=TAGFILTER?'<div class="pages-filter on"><span class="filter-chip">#'+esc(TAGFILTER)+'<span class="x" onclick="TAGFILTER=null;renderAll()">&times;</span></span></div>':'';
    // auto-classify by type when >1 distinct type among coded experiments
    var coded=exps.filter(isCoded), notes=exps.filter(function(e){return !isCoded(e);});
    var types={}; coded.forEach(function(e){ types[e.type||'EXP']=1; });
    var body='';
    if(Object.keys(types).length>1){
      var order=EXP_TYPES.map(function(t){return t.id;});
      order.filter(function(tid){return types[tid];}).forEach(function(tid){
        body+='<div class="grp-lbl">'+esc(typeName(tid))+'</div>'+coded.filter(function(e){return (e.type||'EXP')===tid;}).map(pageItemExp).join('');
      });
    } else { body+=coded.map(pageItemExp).join(''); }
    if(notes.length){ body+='<div class="grp-lbl">Notes &amp; meetings</div>'+notes.map(pageItemExp).join(''); }
    host.innerHTML='<div class="pages-hd"><span class="t">'+esc(sec2.name)+'</span><button class="pages-new" onclick="openAddMenu(event)">+ Add</button></div>'+fbar2+(exps.length?body:'<div class="pages-empty">Nothing yet.<br>Use <b>+ Add</b>.</div>');
    return;
  }
  host.innerHTML='<div class="pages-empty">Pick something on the left.</div>';
}

  card.innerHTML='<div class="modal-t">'+esc(title)+'</div><input id="lb-pick-q" class="dlg-search" placeholder="Search…" autocomplete="off"><div id="lb-pick-list" class="dlg-list"></div><div class="modal-act"><span class="grow"></span><button class="btn ghost" id="lb-dlg-cancel">Cancel</button></div>';
  d.classList.add('open'); d._onCancel=function(){ _lbDlgClose(); }; el('lb-dlg-cancel').onclick=function(){ _lbDlgClose(); };
  var q=el('lb-pick-q');
  function draw(){ var s=(q.value||'').toLowerCase();
    var f=items.filter(function(it){ return !s || ((it.label||'')+' '+(it.sub||'')).toLowerCase().indexOf(s)>=0; });
    el('lb-pick-list').innerHTML=f.length? f.map(function(it){ return '<div class="dlg-item" data-id="'+esc(String(it.id))+'">'+(it.ic?'<span class="ic" style="background:'+(it.c||'#4f9d8f')+'">'+esc(it.ic)+'</span>':'')+'<span class="l">'+esc(it.label)+'</span>'+(it.sub?'<span class="s">'+esc(it.sub)+'</span>':'')+'</div>'; }).join('') : '<div class="dlg-empty">No matches.</div>';
    Array.prototype.forEach.call(el('lb-pick-list').querySelectorAll('.dlg-item'),function(node){ node.onclick=function(){ var it=items.filter(function(x){return String(x.id)===node.dataset.id;})[0]; _lbDlgClose(); if(it) onPick(it); }; });
  }
  q.oninput=draw; draw(); setTimeout(function(){ q.focus(); },30);
}

// ── Autocomplete: @ # / + antibody + protocol ──
var AC={open:false};
function acClose(){ AC.open=false; el('acpop').classList.remove('open'); }
function caretToken(){ var s=window.getSelection(); if(!s||!s.rangeCount) return null; var r=s.getRangeAt(0); if(!r.collapsed) return null; var node=r.startContainer; if(node.nodeType!==3) return null; var text=node.textContent.slice(0,r.startOffset); var m=text.match(/(^|\s)([@#\/])([\w\-α]*)$/); if(!m) return null; return {trigger:m[2],query:m[3],len:m[2].length+m[3].length,range:r}; }
function archiveIndex(){ try{ if(window.parent && window.parent.ARCHIVE_INDEX) return window.parent.ARCHIVE_INDEX; }catch(e){} return []; }
function acScan(){ if(!_activeEd) return; var t=caretToken(); if(!t){ if(AC.open) acClose(); return; }
  AC.trigger=t.trigger; AC.query=t.query; AC.tokenLen=t.len; AC.node=t.range.startContainer; AC.offset=t.range.startOffset;
  var items=[], q=t.query.toLowerCase();
  if(t.trigger==='@'){
    Object.keys(LB.data.experiments).forEach(function(k){ var e=LB.data.experiments[k]; if(!isCoded(e)) return; var lbl=(e.code||'')+' '+(e.title||''); if(!q||lbl.toLowerCase().indexOf(q)>=0) items.push({t:'exp',id:e.id,label:e.code||e.title||'exp',sub:e.title||'',ic:'E',c:'#4f9d8f'}); });
    Object.keys(LB.data.pages).forEach(function(k){ var p=LB.data.pages[k]; if(!p.title) return; if(!q||p.title.toLowerCase().indexOf(q)>=0) items.push({t:'page',id:p.id,label:p.title,sub:'page',ic:'P',c:'#5e72c4'}); });
    Object.keys(LB.data.antibodies).forEach(function(k){ var a=LB.data.antibodies[k]; if(!a.name) return; if(!q||a.name.toLowerCase().indexOf(q)>=0) items.push({t:'ab',id:a.id,label:'α-'+a.name,sub:a.catalog||'antibody',ic:'α',c:'#c47818'}); });
    archiveIndex().forEach(function(p){ if(!q||p.name.toLowerCase().indexOf(q)>=0) items.push({t:'proto',id:p.id,label:p.name,sub:'protocol',ic:'A',c:'#a56983'}); });
    try{ var pd=JSON.parse(localStorage.getItem('hub_plasmids')||'null'); if(pd&&pd.plasmids){ Object.keys(pd.plasmids).forEach(function(k){ var pl=pd.plasmids[k]; if(!pl.code&&!pl.name) return; var lbl=((pl.code||'')+' '+(pl.name||'')).toLowerCase(); if(!q||lbl.indexOf(q)>=0) items.push({t:'plasmid',id:pl.code||pl.id,label:pl.code||pl.name,sub:pl.name||'plasmid',ic:'p',c:'#6d7bd0'}); }); } }catch(e){}
    items=items.slice(0,16);
  } else if(t.trigger==='#'){
    LB.data.tags.filter(function(tg){return !q||tg.toLowerCase().indexOf(q)>=0;}).slice(0,10).forEach(function(tg){ items.push({t:'tag',id:tg,label:'#'+tg,sub:'tag',ic:'#',c:'#5e72c4'}); });
    if(t.query) items.unshift({t:'newtag',id:t.query,label:'Create #'+t.query,sub:'new',ic:'+',c:'#4f9d8f'});
  } else if(t.trigger==='/'){
    [['Heading','slHeading'],['Checklist','slTodo'],['Bullet list','slBullet'],['Numbered list','slNumber'],['Table','slTable'],['Image','openImageIns'],['Divider','slDivider'],['Antibody','openAntibodyIns'],['Protocol link','openProtocolIns'],['Protocol steps','openProtocolSteps']].filter(function(o){return !q||o[0].toLowerCase().indexOf(q)>=0;}).forEach(function(o){ items.push({t:'slash',id:o[1],label:o[0],sub:'',ic:'/',c:'#7c6fd4'}); });
  }
  if(!items.length){ acClose(); return; }
  AC.open=true; AC.items=items; AC.sel=0; acRender();
  var rect=t.range.getBoundingClientRect(); var pop=el('acpop'); pop.style.left=Math.min(rect.left,window.innerWidth-260)+'px'; pop.style.top=(rect.bottom+6)+'px';
}
function acRender(){ var pop=el('acpop'); pop.innerHTML=AC.items.map(function(it,i){ return '<div class="pop-item'+(i===AC.sel?' sel':'')+'" onmousedown="event.preventDefault();acPick('+i+')"><span class="ic" style="background:'+it.c+'">'+esc(it.ic)+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(it.label)+'</span>'+(it.sub?'<span class="sub">'+esc(it.sub)+'</span>':'')+'</div>'; }).join(''); pop.classList.add('open'); }
function acDeleteToken(){ try{ var r=document.createRange(); r.setStart(AC.node, Math.max(0,AC.offset-AC.tokenLen)); r.setEnd(AC.node, AC.offset); var s=window.getSelection(); s.removeAllRanges(); s.addRange(r); document.execCommand('delete'); }catch(e){} }
function acPick(i){ var it=AC.items[i]; if(!it) return; acDeleteToken();
  if(it.t==='exp'){ var ex=LB.data.experiments[it.id]; var pr=ex?projById(ex.projectId):null; var pfx=pr?(esc(pr.name)+' · '):''; insertHtmlAtCaret('<a class="lb-link" data-exp="'+it.id+'" contenteditable="false">'+pfx+esc(it.label)+' &#8599;</a>&nbsp;'); }
  else if(it.t==='page'){ insertHtmlAtCaret('<a class="lb-link" data-page="'+it.id+'" contenteditable="false">'+esc(it.label)+' &#8599;</a>&nbsp;'); }
  else if(it.t==='ab'){ abRecordUse(it.id); save(); insertHtmlAtCaret('<span class="lb-ab" data-ab="'+it.id+'" contenteditable="false">'+esc(it.label)+'</span>&nbsp;'); }
  else if(it.t==='proto'){ insertHtmlAtCaret('<a class="lb-link proto" data-app="protocols" data-pid="'+esc(it.id)+'" contenteditable="false">'+esc(it.label)+' &#8599;</a>&nbsp;'); }
  else if(it.t==='plasmid'){ insertHtmlAtCaret('<a class="lb-link plasmid" data-app="plasmids" data-pid="'+esc(String(it.id))+'" contenteditable="false">'+esc(it.label)+' &#8599;</a>&nbsp;'); }
  else if(it.t==='tag'||it.t==='newtag'){ var name=it.id; if(LB.data.tags.indexOf(name)<0){ LB.data.tags.push(name); save(); } insertHtmlAtCaret('<span class="lb-tag" data-tag="'+esc(name)+'" contenteditable="false">#'+esc(name)+'</span>&nbsp;'); renderDockPanels(); }
  else if(it.t==='slash'){ window[it.id](); }
  acClose();
}

  var items=Object.keys(LB.data.antibodies).map(function(k){ var a=LB.data.antibodies[k]; return {id:a.id,label:'α-'+(a.name||''),sub:a.catalog||'antibody',ic:'α',c:'#c47818'}; }).sort(function(a,b){return a.label.localeCompare(b.label);});
  items.unshift({id:'__new__',label:'＋ Create new antibody…',sub:'',ic:'+',c:'#4f9d8f'});

    var a=LB.data.antibodies[it.id]; if(!a) return; abRecordUse(a.id); save(); insertHtmlAtCaret('<span class="lb-ab" data-ab="'+a.id+'" contenteditable="false">α-'+esc(a.name)+'</span>&nbsp;',r);
  });

function openProtocolIns(){ if(!_activeEd) return; var r=_saveSel(); toast('Loading protocols…'); ensureArchive(function(ok){ var idx=archiveIndex(); if(!idx.length){ toast('Could not load Archive protocols — try again in a moment.'); return; }
  var items=idx.map(function(p){ return {id:p.id,label:p.name,sub:'protocol',ic:'A',c:'#a56983'}; });
  lbPicker('Insert Archive protocol (link)',items,function(it){ insertHtmlAtCaret('<a class="lb-link proto" data-app="protocols" data-pid="'+esc(String(it.id))+'" contenteditable="false">'+esc(it.label)+' &#8599;</a>&nbsp;',r); });
  }); }
function archiveSteps(pid){ try{ if(window.parent && window.parent.ARCHIVE_STEPS) return window.parent.ARCHIVE_STEPS(pid); }catch(e){} return null; }
// Ensure Archive is loaded (populates window.parent.ARCHIVE_INDEX/STEPS), then run cb when ready.
function ensureArchive(cb){
  try{ if(window.parent && (window.parent.ARCHIVE_INDEX||[]).length){ cb(true); return; } }catch(e){}
  try{ if(window.parent && window.parent.hubEnsureApp) window.parent.hubEnsureApp('protocols'); }catch(e2){}
  var tries=0; (function poll(){ tries++; var ok=false; try{ ok=(window.parent.ARCHIVE_INDEX||[]).length>0; }catch(e){} if(ok) return cb(true); if(tries>20) return cb(false); setTimeout(poll,150); })();
}
function protocolStepsHtml(it,steps){
  var h='<div class="lb-proto-hd"><a class="lb-link proto" data-app="protocols" data-pid="'+esc(String(it.id))+'" contenteditable="false">'+esc(it.label)+' &#8599;</a></div>';
  steps.forEach(function(seg){ if(seg.type==='section'){ h+='<p><strong>'+esc(seg.text)+'</strong></p>'; } else { var tag=seg.ordered?'ol':'ul'; h+='<'+tag+'>'+seg.items.map(function(x){return '<li>'+x+'</li>';}).join('')+'</'+tag+'>'; } });
  return h+'<p><br></p>';
}
function openProtocolSteps(){ if(!_activeEd) return; var r=_saveSel(); toast('Loading protocols…'); ensureArchive(function(ok){ var idx=archiveIndex(); if(!idx.length){ toast('Could not load Archive protocols — try again in a moment.'); return; }
  var items=idx.map(function(p){ return {id:p.id,label:p.name,sub:'insert full steps',ic:'A',c:'#a56983'}; });
  lbPicker('Insert protocol steps',items,function(it){ var steps=archiveSteps(it.id); if(!steps||!steps.length){ toast('Could not read steps — try again in a moment.'); return; } insertHtmlAtCaret(protocolStepsHtml(it,steps),r); });
  }); }
document.addEventListener('input',function(e){ if(e.target && e.target.classList && e.target.classList.contains('rt')) acScan(); });
document.addEventListener('keydown',function(e){ if(!AC.open) return;
  if(e.key==='ArrowDown'){ e.preventDefault(); AC.sel=(AC.sel+1)%AC.items.length; acRender(); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); AC.sel=(AC.sel-1+AC.items.length)%AC.items.length; acRender(); }
  else if(e.key==='Enter'){ e.preventDefault(); acPick(AC.sel); }
  else if(e.key==='Escape'){ acClose(); }
});
// ── Word-like editor keys (Tab as tabulator, Cmd/Ctrl+B/I/U) ──
document.addEventListener('keydown',function(e){
  if(AC.open) return; // autocomplete owns keys while open
  var ed=e.target && e.target.closest && e.target.closest('.rt'); if(!ed) return;
  _activeEd=ed;
  if((e.metaKey||e.ctrlKey) && !e.altKey){
    var k=(e.key||'').toLowerCase();
    if(k==='b'||k==='i'||k==='u'){ e.preventDefault(); document.execCommand(k==='b'?'bold':(k==='i'?'italic':'underline')); ed.dispatchEvent(new Event('input')); }
    return; // leave z/y (undo/redo), k (spotlight), a/c/v/x to native
  }
  if(e.key==='Tab'){ e.preventDefault(); try{ document.execCommand('styleWithCSS',false,true); }catch(_e){} document.execCommand(e.shiftKey?'outdent':'indent'); ed.dispatchEvent(new Event('input')); }
});

// ── Cmd+K spotlight ──
var SPOT={open:false,items:[],sel:0};
function openSpot(){ SPOT.open=true; el('spot-back').classList.add('open'); el('spot-in').value=''; spotRender(); setTimeout(function(){el('spot-in').focus();},30); }
function closeSpot(){ SPOT.open=false; el('spot-back').classList.remove('open'); }
function spotAll(){ var out=[];
  Object.keys(LB.data.experiments).forEach(function(k){ var e=LB.data.experiments[k]; out.push({a:(isCoded(e)?(e.code||e.title):(e.title||e.noteType||'note')),b:(isCoded(e)?(e.title||''):(e.noteType||'')),k:'exp',ic:'E',c:'#4f9d8f',fn:function(){openExp(e.id);}}); });
  LB.data.generalSections.forEach(function(s){ out.push({a:s.name,b:'section',k:'sec',ic:'§',c:'#5e72c4',fn:function(){selectNode('general','',s.id);}}); });
  LB.data.projects.forEach(function(p){ out.push({a:p.name,b:'project',k:'proj',ic:'▸',c:p.color,fn:function(){EXPANDED[p.id]=true;renderSections();}}); (p.sections||[]).forEach(function(s){ out.push({a:s.name,b:p.name,k:'folder',ic:'•',c:p.color,fn:function(){selectNode('expsec',p.id,s.id);}}); }); });
  Object.keys(LB.data.pages).forEach(function(k){ var pg=LB.data.pages[k]; if(pg.title) out.push({a:pg.title,b:'page',k:'page',ic:'P',c:'#5e72c4',fn:function(){selectNode('general','',pg.sectionId);SEL.page=pg.id;renderAll();}}); });
  Object.keys(LB.data.antibodies).forEach(function(k){ var a=LB.data.antibodies[k]; if(a.name) out.push({a:'α-'+a.name,b:a.catalog||'antibody',k:'ab',ic:'α',c:'#c47818',fn:function(){var s=LB.data.generalSections.filter(function(x){return x.kind==='antibodies';})[0]; if(s){window._abQ=a.name;selectNode('general','',s.id);}}}); });
  LB.data.tags.forEach(function(t){ out.push({a:'#'+t,b:'tag',k:'tag',ic:'#',c:'#5e72c4',fn:function(){TAGFILTER=t;/*stay*/ }}); });
  return out;
}
function spotRender(){ var q=(el('spot-in').value||'').toLowerCase().trim();
  var items=spotAll().filter(function(x){return !q||((x.a||'')+' '+(x.b||'')).toLowerCase().indexOf(q)>=0;}).slice(0,40);
  SPOT.items=items; SPOT.sel=0;
  el('spot-res').innerHTML=items.length? items.map(function(x,i){ return '<div class="spot-item'+(i===0?' sel':'')+'" data-i="'+i+'" onmousedown="event.preventDefault();spotPick('+i+')"><span class="ic" style="background:'+x.c+'">'+esc(x.ic)+'</span><span class="m"><span class="a">'+esc(x.a)+'</span><span class="b">'+esc(x.b)+'</span></span><span class="k">'+esc(x.k)+'</span></div>'; }).join('') : '<div class="spot-empty">No matches</div>';
}
function spotPick(i){ var x=SPOT.items[i]; closeSpot(); if(x&&x.fn) x.fn(); }
document.addEventListener('keydown',function(e){
  if((e.metaKey||e.ctrlKey) && (e.key==='k'||e.key==='K')){ e.preventDefault(); if(SPOT.open) closeSpot(); else openSpot(); return; }
  if(!SPOT.open) return;
  if(e.key==='Escape'){ closeSpot(); }
  else if(e.key==='ArrowDown'){ e.preventDefault(); SPOT.sel=Math.min(SPOT.items.length-1,SPOT.sel+1); spotHi(); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); SPOT.sel=Math.max(0,SPOT.sel-1); spotHi(); }
  else if(e.key==='Enter'){ e.preventDefault(); spotPick(SPOT.sel); }
});
function spotHi(){ var nodes=el('spot-res').querySelectorAll('.spot-item'); nodes.forEach(function(n,i){ n.classList.toggle('sel',i===SPOT.sel); if(i===SPOT.sel) n.scrollIntoView({block:'nearest'}); }); }

}
function peSync(){ var t=el('pe-title'); if(t&&PE.work) PE.work.title=t.value; }
function peAddBlock(){ peSync(); PE.work.blocks.push({dayOffset:(PE.work.blocks.length?(PE.work.blocks[PE.work.blocks.length-1].dayOffset||0):0),title:'',html:'<p></p>'}); peDraw(); }
function peDelBlock(i){ PE.work.blocks.splice(i,1); peDraw(); }
function peMove(i,dir){ var j=i+dir; if(j<0||j>=PE.work.blocks.length) return; var t=PE.work.blocks[i]; PE.work.blocks[i]=PE.work.blocks[j]; PE.work.blocks[j]=t; peDraw(); }
