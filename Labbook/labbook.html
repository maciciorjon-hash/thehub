 +'.pd-day{font:700 9px/1 sans-serif;color:#fff;background:#4f9d8f;border-radius:4px;padding:2px 6px;text-transform:uppercase}.pd-bdate{font:600 12px/1 monospace;color:#777}.pd-btitle{font:700 13px/1.3 sans-serif}'
 +'.pd-body{font:400 13px/1.65 sans-serif;color:#222}.pd-body ul,.pd-body ol{margin:0 0 6px 20px}.pd-body h1,.pd-body h2,.pd-body h3{margin:8px 0 4px}.pd-body table{border-collapse:collapse;margin:6px 0}.pd-body td,.pd-body th{border:1px solid #bbb;padding:4px 8px}.pd-body hr{border:none;border-top:1px solid #ccc;margin:10px 0}.pd-body .lb-tag{color:#5e72c4;font-weight:600}.pd-body .lb-ab{color:#c47818;font-weight:600}.pd-body a.lb-link{color:#4f9d8f;text-decoration:none}'
 +'.lb-todo{list-style:none}.lb-box{display:inline-block;width:11px;height:11px;border:1px solid #888;border-radius:2px;margin-right:6px;vertical-align:middle}.lb-todo.done .lb-box{background:#4f9d8f;border-color:#4f9d8f}'
 +'ul.lb-check{list-style:none;margin-left:4px;padding-left:0}ul.lb-check li{position:relative;list-style:none;padding-left:20px;margin:2px 0}ul.lb-check li::before{content:"";position:absolute;left:0;top:2px;width:11px;height:11px;border:1px solid #888;border-radius:2px}ul.lb-check li.done::before{background:#4f9d8f;border-color:#4f9d8f}ul.lb-check li.done{color:#888;text-decoration:line-through}'
 +'img.lb-att{max-width:100%;height:auto;border-radius:6px;margin:6px 0;display:block;page-break-inside:avoid}'
 +'.pd-foot{margin-top:26px;padding-top:10px;border-top:1px solid #e2e2e2;font:400 10px/1.4 sans-serif;color:#999}</style>';
function projCrumb(e){ var p=projById(e.projectId); var s=p?(p.sections||[]).filter(function(x){return x.id===e.sectionId;})[0]:null; return (p?p.name:'')+(s?' › '+s.name:''); }
function printBlocks(blocks){ return blocks.map(function(b){ var hd=(b.dayOffset!=null?'<span class="pd-day">Day '+b.dayOffset+'</span>':'')+(b.date?'<span class="pd-bdate">'+fmtDate(b.date)+'</span>':'')+(b.title?'<span class="pd-btitle">'+esc(b.title)+'</span>':''); return '<div class="pd-block">'+(hd?'<div class="pd-bhd">'+hd+'</div>':'')+'<div class="pd-body">'+(b.html||'')+'</div></div>'; }).join(''); }
function foot(){ return '<div class="pd-foot">dHUB Labbook · exported '+fmtDate(todayStr())+'</div>'; }
function buildPrintDoc(){
  var node=SEL.node, h=PRINT_CSS;
  if(node.kind==='notebook' && SEL.page && SEL.page!=='__ongoing__'){ var D=SEL.page; var pg=LB.data.notebook[D]||{html:''};
    h+='<div class="pd-head"><div class="pd-kicker">Daily notebook</div><div class="pd-title">'+esc(fmtDate(D))+'</div></div><div class="pd-body">'+(pg.html||'')+'</div>';
    var fb=blocksForDate(D); if(fb.length){ h+=fb.map(function(x){ return '<div class="pd-block"><div class="pd-bhd"><span class="pd-bdate">'+esc(x.exp.code||'')+'</span><span class="pd-btitle">'+esc(x.block.title||'')+'</span></div><div class="pd-body">'+(x.block.html||'')+'</div></div>'; }).join(''); }
    return h+foot();
  }
  if(node.kind==='general' && LB.data.pages[SEL.page]){ var p2=LB.data.pages[SEL.page];
    if(p2.kind==='seminars'){ var m=[]; if(p2.speaker)m.push('Speaker: '+p2.speaker); if(p2.date)m.push(fmtDate(p2.date)); h+='<div class="pd-head"><div class="pd-kicker">Seminar</div><div class="pd-title">'+esc(p2.title||'')+'</div><div class="pd-chips">'+m.map(function(x){return '<span class="pd-chip">'+esc(x)+'</span>';}).join('')+'</div></div>'; }
    else h+='<div class="pd-head"><div class="pd-kicker">Note</div><div class="pd-title">'+esc(p2.title||'')+'</div></div>';
    return h+'<div class="pd-body">'+(p2.html||'')+'</div>'+foot();
  }
  var e=_curExp(); if(!e) return h;
  if(e.kind==='note'){ h+='<div class="pd-head"><div class="pd-kicker">'+esc(e.noteType||'note')+'</div><div class="pd-title">'+esc(e.title||'')+'</div><div class="pd-crumb">'+esc(fmtDate(e.date||''))+'</div></div>'; return h+'<div class="pd-body">'+(e.html||'')+'</div>'+foot(); }
  var chips=[]; if(e.startDate)chips.push('Start '+fmtDate(e.startDate)); if(e.status)chips.push(e.status); if(e.plasmids)chips.push(e.plasmids); if(e.cellLines)chips.push(e.cellLines);
  h+='<div class="pd-head"><div class="pd-code">'+esc(e.code||'')+'</div><div class="pd-title">'+esc(e.title||e.code||'')+'</div><div class="pd-crumb">'+esc(projCrumb(e))+'</div><div class="pd-chips">'+chips.map(function(x){return '<span class="pd-chip">'+esc(x)+'</span>';}).join('')+'</div></div>';
  var free=(e.html&&e.html.replace(/<[^>]+>/g,'').trim())?('<div class="pd-body">'+e.html+'</div>'):'';
  return h+free+printBlocks(e.blocks||[])+foot();
}
function exportPDF(){ var pr=el('print-root'); pr.innerHTML=buildPrintDoc(); hydrateAtt(pr).then(function(){ setTimeout(function(){ try{ window.print(); }catch(e){} }, 80); }); }

// ── Backups + offline ──
function _download(name,text){ try{ var b=new Blob([text],{type:'application/json'}); var u=URL.createObjectURL(b); var a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); setTimeout(function(){ URL.revokeObjectURL(u); a.remove(); },500); }catch(e){} }
function _parentBackup(){ try{ if(window.parent && window.parent!==window && window.parent.lbBackup) return window.parent.lbBackup; }catch(e){} return null; }
var _selfDir=null;
function _idb(){ return new Promise(function(res,rej){ var r=indexedDB.open('lb_backup',1); r.onupgradeneeded=function(){ r.result.createObjectStore('h'); }; r.onsuccess=function(){res(r.result);}; r.onerror=function(){rej(r.error);}; }); }
function _idbGet(){ return _idb().then(function(db){ return new Promise(function(res){ var t=db.transaction('h','readonly').objectStore('h').get('dir'); t.onsuccess=function(){res(t.result||null);}; t.onerror=function(){res(null);}; }); }); }
function _idbSet(v){ return _idb().then(function(db){ return new Promise(function(res){ var t=db.transaction('h','readwrite').objectStore('h').put(v,'dir'); t.onsuccess=function(){res();}; t.onerror=function(){res();}; }); }); }
function _verify(hn){ if(!hn||!hn.queryPermission) return Promise.resolve(false); return hn.queryPermission({mode:'readwrite'}).then(function(p){ if(p==='granted') return true; return hn.requestPermission({mode:'readwrite'}).then(function(p2){return p2==='granted';}); }); }
function chooseBackupDir(){ var pb=_parentBackup(); if(pb&&pb.pickDir){ return pb.pickDir().then(function(n){ toast('Backup folder: '+n); }).catch(function(){ toast('Could not open folder picker — backups will download.'); }); }
  if(typeof window.showDirectoryPicker==='function'){ return window.showDirectoryPicker({mode:'readwrite'}).then(function(h){ _selfDir=h; return _idbSet(h).then(function(){ toast('Backup folder: '+h.name); }); }).catch(function(){ toast('Folder picker unavailable — backups will download.'); }); }
  toast('No folder access — backups will download.'); return Promise.resolve(); }
function doBackup(manual){ var name='labbook-'+todayStr()+'.json'; var text=JSON.stringify(LB.data,null,2); var pb=_parentBackup();
  var chain = pb&&pb.writeFile ? pb.writeFile(name,text).then(function(){return 'fs';})
    : (function(){ if(typeof window.showDirectoryPicker!=='function') return Promise.reject(); return (_selfDir?Promise.resolve(_selfDir):_idbGet()).then(function(h){ if(!h) return Promise.reject(); _selfDir=h; return _verify(h).then(function(v){ if(!v) return Promise.reject(); return h.getFileHandle(name,{create:true}).then(function(fh){ return fh.createWritable().then(function(w){ return w.write(text).then(function(){ return w.close(); }); }); }).then(function(){return 'fs';}); }); }); })();
  chain.then(function(){ try{ localStorage.setItem('lb_last_backup',todayStr()); }catch(e){} if(manual) toast('Backup saved to folder ✓'); })
    .catch(function(){ _download(name,text); try{ localStorage.setItem('lb_last_backup',todayStr()); }catch(e){} if(manual) toast('Backup downloaded ✓ (right-click Backup to choose a folder)'); });
}
function maybeAutoBackup(){ var last=''; try{ last=localStorage.getItem('lb_last_backup')||''; }catch(e){} if(last===todayStr()) return; var pb=_parentBackup(); var hasFs=(pb&&pb.writeFile)||typeof window.showDirectoryPicker==='function'; if(hasFs) doBackup(false); }
var _toastT=null; function toast(msg){ var t=el('lb-toast'); if(!t){ t=document.createElement('div'); t.id='lb-toast'; t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);color:var(--text);border:1px solid var(--border2);box-shadow:var(--shadow-md);border-radius:10px;padding:10px 16px;font-size:13px;z-index:400;opacity:0;transition:opacity .2s'; document.body.appendChild(t); } t.textContent=msg; t.style.opacity='1'; clearTimeout(_toastT); _toastT=setTimeout(function(){t.style.opacity='0';},2600); }
function updateNet(){ updateStatus(); }
window.addEventListener('online',updateNet); window.addEventListener('offline',updateNet);

// ── Init ──
function renderAll(){ renderSections(); renderPages(); renderEditor(); }
if(maybeSeed()) save();
applyLayout(); renderPanels(); renderAll();
lbInitSync();
setTimeout(maybeAutoBackup,1500);
setTimeout(gcAttachments,4000);
window.addEventListener('message', function(e){ if(e.data && e.data.type==='switchTab'){} });
