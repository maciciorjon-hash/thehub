<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Labbook</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f4f5f8;--surface:#ffffff;--surface2:#f0f1f5;--surface3:#e4e6ee;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);
  --text:#1a1d2e;--text2:#5a5f7a;--text3:#9ca0b8;
  --accent:#4f9d8f;--accent-dim:rgba(79,157,143,0.13);
  --warn:#c47818;--danger:#c04040;--good:#2d9462;
  --sans:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
  --shadow-xs:0 1px 4px rgba(0,0,0,.04);--shadow-sm:0 2px 8px rgba(0,0,0,.06);
  --shadow-md:0 6px 24px rgba(0,0,0,.09);--shadow-lg:0 16px 48px rgba(0,0,0,.14);
}
[data-theme="dark"]{
  --bg:#0d0f14;--surface:#13161e;--surface2:#1c2030;--surface3:#252a3a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8eaf2;--text2:#8b90a8;--text3:#4e5368;
  --accent:#5cb3a3;--accent-dim:rgba(92,179,163,0.16);
  --warn:#f0b060;--danger:#f08a84;--good:#6ddca8;
  --shadow-xs:0 1px 4px rgba(0,0,0,.30);--shadow-sm:0 2px 8px rgba(0,0,0,.40);
  --shadow-md:0 6px 24px rgba(0,0,0,.50);--shadow-lg:0 16px 48px rgba(0,0,0,.55);
}
input::placeholder,textarea::placeholder{color:var(--text3);opacity:1;}
html,body{height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;}

header{border-bottom:1px solid var(--border);padding:0 18px;display:flex;align-items:center;gap:12px;background:var(--surface);min-height:54px;flex-shrink:0;}
.logo{width:30px;height:30px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo svg{width:18px;height:18px;}
.app-name{font-size:15px;font-weight:600;letter-spacing:-0.2px;}
.app-sub{font-size:11px;color:var(--text2);}
@media(max-width:640px){.app-sub{display:none;}}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:7px;}
.hdr-btn{background:none;border:1px solid var(--border2);color:var(--text2);border-radius:8px;padding:6px 11px;font-family:var(--sans);font-size:12px;cursor:pointer;transition:background .15s,color .15s;display:inline-flex;align-items:center;gap:6px;}
.hdr-btn:hover{background:var(--surface2);color:var(--text);}
.hdr-btn svg{width:14px;height:14px;}
.net{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);padding:4px 9px;border-radius:20px;background:var(--surface2);}
.net .dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .3s;}
.net.online .dot{background:var(--good);}
.net.offline .dot{background:var(--warn);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .3s;}
.sync-dot.ok{background:var(--good);}

/* ── Ribbon (Word-like) ────────────────────────────────────────────────── */
#ribbon{display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;min-height:44px;}
.rb-core,.rb-move-zone{display:flex;align-items:center;gap:2px;flex-wrap:nowrap;}
.rb-move-zone{gap:6px;min-width:20px;min-height:30px;border-radius:8px;padding:0 2px;}
.rb-move-zone.drop{outline:2px dashed var(--accent);outline-offset:2px;}
.rb-spacer{flex:1;}
.tb{width:29px;height:29px;border:none;background:none;border-radius:7px;color:var(--text2);cursor:pointer;font-size:13.5px;display:inline-flex;align-items:center;justify-content:center;transition:background .12s,color .12s;font-family:var(--sans);flex-shrink:0;}
.tb:hover{background:var(--surface2);color:var(--text);}
.tb.active{background:var(--accent-dim);color:var(--accent);}
.tb b,.tb i,.tb u,.tb s{pointer-events:none;}
.tb svg{width:15px;height:15px;pointer-events:none;}
.tb-sep{width:1px;height:20px;background:var(--border2);margin:0 4px;flex-shrink:0;}
.tb-sel{height:29px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);border-radius:7px;font-family:var(--sans);font-size:12px;padding:0 6px;cursor:pointer;outline:none;flex-shrink:0;}
.tb-sel:focus{border-color:var(--accent);}
.tb-color{position:relative;}
.tb-swatch{position:absolute;left:0;top:32px;z-index:60;background:var(--surface);border:1px solid var(--border2);border-radius:9px;box-shadow:var(--shadow-md);padding:7px;display:none;grid-template-columns:repeat(6,1fr);gap:5px;width:172px;}
.tb-color.open .tb-swatch{display:grid;}
.tb-swatch .sw{width:20px;height:20px;border-radius:5px;cursor:pointer;border:1px solid var(--border2);}

/* ── Movable panels (ribbon or right dock) ─────────────────────────────── */
.panel{background:var(--surface2);border:1px solid var(--border);border-radius:9px;flex-shrink:0;}
.panel-h{display:flex;align-items:center;gap:5px;padding:3px 6px;font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text3);cursor:grab;}
.panel-h .pdrag{color:var(--text3);cursor:grab;font-size:11px;letter-spacing:-2px;}
.panel-h .ptitle{flex:1;}
.panel-swap{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:1px 4px;border-radius:5px;}
.panel-swap:hover{color:var(--accent);background:var(--surface3);}
.panel-body{display:flex;align-items:center;gap:2px;padding:2px 5px 5px;flex-wrap:wrap;}
#rightdock .panel{width:100%;margin-bottom:10px;background:var(--surface);}
#rightdock .panel-body{flex-direction:column;align-items:stretch;gap:5px;}
#rightdock .panel-body.rowwrap{flex-direction:row;flex-wrap:wrap;}

.body{flex:1;display:flex;min-height:0;position:relative;}
/* Pane 1: sections */
.pane-sec{width:210px;flex-shrink:0;background:var(--surface);overflow-y:auto;padding:12px 10px;}
.pane-lbl{font-size:9.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--text3);margin:10px 8px 6px;}
.sec-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;cursor:pointer;font-size:13px;color:var(--text2);transition:background .12s;position:relative;}
.sec-item:hover{background:var(--surface2);color:var(--text);}
.sec-item.active{background:var(--accent-dim);color:var(--accent);font-weight:600;}
.sec-item .dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;background:var(--accent);}
.sec-item .del{margin-left:auto;opacity:0;color:var(--text3);font-size:15px;line-height:1;padding:2px;}
.sec-item:hover .del{opacity:1;}
.sec-item .del:hover{color:var(--danger);}
.add-row{display:flex;gap:6px;margin:8px 8px 4px;}
.add-row input{flex:1;min-width:0;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:6px 9px;font-family:var(--sans);font-size:12px;color:var(--text);outline:none;}
.add-row input:focus{border-color:var(--accent);}
.add-row button{background:var(--accent);border:none;color:#fff;border-radius:8px;width:30px;font-size:15px;cursor:pointer;flex-shrink:0;}
.proj-row{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:9px;cursor:pointer;font-size:13px;color:var(--text);font-weight:600;transition:background .12s;}
.proj-row:hover{background:var(--surface2);}
.proj-row .chev{font-size:10px;color:var(--text3);transition:transform .15s;display:inline-block;width:10px;text-align:center;flex-shrink:0;}
.proj-row .chev.open{transform:rotate(90deg);}
.proj-row .proj-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.proj-row .del{opacity:0;color:var(--text3);font-size:15px;line-height:1;padding:2px;}
.proj-row:hover .del{opacity:1;}
.proj-row .del:hover{color:var(--danger);}
.sec-item.sub{margin-left:15px;padding-left:12px;font-size:12.5px;border-left:1px solid var(--border);border-radius:0 9px 9px 0;}
.sec-item.sub .dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
.sec-item.sub.active .dot{background:var(--accent);}
.add-row.sub{margin-left:19px;}

/* Splitters + collapse */
.splitter{width:6px;flex-shrink:0;cursor:col-resize;background:var(--border);opacity:.5;transition:opacity .15s,background .15s;position:relative;}
.splitter:hover,.splitter.drag{opacity:1;background:var(--accent);}
.pane-sec,.pane-pages{border-right:1px solid var(--border);}
.pane.collapsed{width:34px!important;padding:0;overflow:hidden;}
.rail{display:none;flex-direction:column;align-items:center;padding-top:12px;gap:10px;height:100%;}
.pane.collapsed .rail{display:flex;}
.pane.collapsed .pane-inner{display:none;}
.rail-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:5px;border-radius:6px;writing-mode:vertical-rl;font-size:11px;letter-spacing:.5px;}
.rail-btn:hover{color:var(--accent);background:var(--surface2);}
.collapse-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:5px;margin-left:auto;}
.collapse-btn:hover{color:var(--accent);background:var(--surface2);}

/* Pane 2: pages list */
.pane-pages{width:280px;flex-shrink:0;background:var(--surface);overflow-y:auto;display:flex;flex-direction:column;}
.pages-hd{padding:13px 14px 9px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:2;}
.pages-hd .t{font-size:13px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pages-new{background:var(--accent);border:none;color:#fff;border-radius:8px;padding:6px 11px;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.pages-filter{padding:8px 14px;border-bottom:1px solid var(--border);display:none;}
.pages-filter.on{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.filter-chip{font-size:11px;padding:2px 9px;border-radius:20px;background:var(--accent-dim);color:var(--accent);font-weight:600;display:inline-flex;gap:5px;align-items:center;}
.filter-chip .x{cursor:pointer;}
.page-item{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.page-item:hover{background:var(--surface2);}
.page-item.active{background:var(--accent-dim);}
.page-code{font-family:var(--mono);font-size:11px;color:var(--accent);font-weight:500;}
.page-title{font-size:13px;font-weight:600;margin-top:3px;color:var(--text);line-height:1.35;}
.page-meta{font-size:10.5px;color:var(--text3);margin-top:4px;font-family:var(--mono);display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.pg-status{padding:1px 7px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;font-size:8.5px;}
.pg-status.planned{background:var(--surface3);color:var(--text2);}
.pg-status.ongoing{background:rgba(94,135,197,.16);color:#5075b5;}
.pg-status.done{background:rgba(45,148,98,.15);color:var(--good);}
.pages-empty{padding:36px 20px;text-align:center;color:var(--text3);font-size:12.5px;line-height:1.6;}

/* Pane 3: editor */
.pane-ed{flex:1;overflow-y:auto;min-width:0;background:var(--bg);}
.ed-wrap{max-width:840px;margin:0 auto;padding:22px 30px 90px;}
.ed-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);text-align:center;padding:40px;}
.ed-empty svg{width:44px;height:44px;opacity:.5;margin-bottom:14px;}
.ed-empty .t{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px;}

/* Right dock */
#rightdock{width:250px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface2);overflow-y:auto;padding:12px;}
#rightdock.hidden{display:none;}
.dock-empty{color:var(--text3);font-size:11.5px;text-align:center;padding:16px 8px;line-height:1.5;}
.outline-item{font-size:12px;color:var(--text2);padding:5px 8px;border-radius:6px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.outline-item:hover{background:var(--surface2);color:var(--text);}
.tagchip-btn{font-size:11.5px;padding:3px 9px;border-radius:20px;background:var(--accent-dim);color:var(--accent);font-weight:600;cursor:pointer;border:none;}
.tagchip-btn:hover{filter:brightness(1.05);}
.meta-line{font-size:11.5px;color:var(--text2);display:flex;justify-content:space-between;gap:8px;padding:3px 0;}
.meta-line b{color:var(--text);font-weight:600;}

/* Experiment header card */
.exh{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow-xs);}
.exh-code{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--accent);background:none;border:none;outline:none;width:100%;padding:0;letter-spacing:.5px;}
.exh-title{font-size:22px;font-weight:700;letter-spacing:-.4px;color:var(--text);border:none;background:none;outline:none;width:100%;padding:4px 0 2px;font-family:var(--sans);}
.exh-fields{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px 16px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.exh-fld{display:flex;flex-direction:column;gap:4px;}
.exh-fld label{font-size:9.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);}
.exh-fld input,.exh-fld select{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:6px 9px;font-family:var(--sans);font-size:12.5px;color:var(--text);outline:none;}
.exh-fld input:focus,.exh-fld select:focus{border-color:var(--accent);}

/* Day blocks */
.blk{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;box-shadow:var(--shadow-xs);overflow:hidden;}
.blk-hd{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);}
.blk-day{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);border-radius:5px;padding:2px 6px;flex-shrink:0;}
.blk-date{font-family:var(--mono);font-size:12px;color:var(--text);background:none;border:1px solid var(--border2);border-radius:6px;padding:3px 8px;outline:none;}
.blk-date:focus{border-color:var(--accent);}
.blk-title{font-size:12.5px;font-weight:600;color:var(--text2);border:none;background:none;outline:none;flex:1;font-family:var(--sans);}
.blk-del{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:3px 6px;border-radius:6px;}
.blk-del:hover{color:var(--danger);background:var(--surface3);}
.rt{padding:12px 16px;font-size:13.5px;line-height:1.7;color:var(--text);outline:none;min-height:40px;}
.rt:focus{background:var(--surface);}
.rt p{margin:0 0 6px;}
.rt ul,.rt ol{margin:0 0 6px 22px;}
.rt li{margin:2px 0;}
.rt h1{font-size:20px;font-weight:700;margin:10px 0 6px;}
.rt h2{font-size:17px;font-weight:700;margin:9px 0 5px;}
.rt h3{font-size:15px;font-weight:700;margin:8px 0 5px;}
.rt blockquote{border-left:3px solid var(--border2);margin:6px 0;padding:2px 12px;color:var(--text2);}
.rt pre{background:var(--surface2);border-radius:8px;padding:10px 12px;font-family:var(--mono);font-size:12.5px;overflow-x:auto;margin:6px 0;}
.rt table{border-collapse:collapse;margin:8px 0;width:auto;}
.rt td,.rt th{border:1px solid var(--border2);padding:5px 9px;min-width:48px;}
.rt hr{border:none;border-top:1px solid var(--border2);margin:12px 0;}
.rt a.lb-link{color:var(--accent);font-weight:600;cursor:pointer;text-decoration:none;border-bottom:1px dashed var(--accent);}
.rt .lb-tag{color:#5e72c4;background:rgba(94,114,196,.14);border-radius:5px;padding:0 5px;font-weight:600;font-size:12.5px;}
.rt .lb-todo{display:flex;align-items:flex-start;gap:8px;margin:3px 0;}
.rt .lb-box{width:15px;height:15px;border:1.6px solid var(--border2);border-radius:4px;flex-shrink:0;margin-top:2px;cursor:pointer;}
.rt .lb-todo.done .lb-box{background:var(--accent);border-color:var(--accent);}
.rt .lb-todo.done{opacity:.6;text-decoration:line-through;}
.add-blk{width:100%;border:1.5px dashed var(--border2);background:none;color:var(--text3);border-radius:11px;padding:11px;font-family:var(--sans);font-size:12.5px;cursor:pointer;transition:color .15s,border-color .15s;}
.add-blk:hover{color:var(--accent);border-color:var(--accent);}

/* Notebook / page / seminar bodies */
.nb-body,.pg-body{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow-xs);min-height:220px;}
.nb-free{margin-bottom:14px;}
.day-from{margin-top:14px;}
.day-from-lbl{font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin:0 4px 8px;}
.dfx{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;box-shadow:var(--shadow-xs);overflow:hidden;}
.dfx-hd{display:flex;align-items:center;gap:9px;padding:9px 13px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:12px;}
.dfx-code{font-family:var(--mono);color:var(--accent);font-weight:600;}
.dfx-title{color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dfx-open{background:none;border:1px solid var(--border2);color:var(--text2);border-radius:6px;font-size:11px;padding:3px 8px;cursor:pointer;}
.dfx-open:hover{color:var(--accent);border-color:var(--accent);}

/* Modal */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-back.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:460px;padding:22px;box-shadow:var(--shadow-lg);max-height:88vh;overflow-y:auto;}
.modal.wide{max-width:640px;}
.modal-t{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.mrow{display:flex;flex-direction:column;gap:5px;margin-bottom:13px;}
.mrow label{font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--text3);}
.mrow input,.mrow select,.mrow textarea{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 11px;font-family:var(--sans);font-size:13px;color:var(--text);outline:none;}
.mrow textarea{min-height:60px;resize:vertical;font-family:var(--mono);font-size:12px;}
.mrow input:focus,.mrow select:focus,.mrow textarea:focus{border-color:var(--accent);}
.mcode{font-family:var(--mono);font-size:13px;color:var(--accent);background:var(--accent-dim);border-radius:8px;padding:8px 11px;letter-spacing:.5px;}
.modal-act{display:flex;gap:9px;margin-top:18px;}
.btn{background:var(--accent);border:none;color:#fff;border-radius:9px;padding:9px 18px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;}
.btn:hover{filter:brightness(1.06);}
.btn.ghost{background:none;border:1px solid var(--border2);color:var(--text2);font-weight:500;}
.btn.ghost:hover{background:var(--surface2);color:var(--text);}
.btn.sm{padding:6px 11px;font-size:12px;border-radius:8px;}
.grow{flex:1;}
.ps-blk{border:1px solid var(--border2);border-radius:10px;padding:11px;margin-bottom:10px;background:var(--surface2);}
.ps-blk-hd{display:flex;gap:8px;align-items:center;margin-bottom:7px;}
.ps-blk-hd input{flex:1;}
.ps-day{width:96px!important;}

/* Popups: autocomplete + swatches */
#acpop{position:fixed;z-index:200;background:var(--surface);border:1px solid var(--border2);border-radius:10px;box-shadow:var(--shadow-md);padding:5px;max-height:280px;overflow:auto;width:250px;display:none;}
#acpop.open{display:block;}
.ac-item{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:12.5px;color:var(--text2);}
.ac-item.sel,.ac-item:hover{background:var(--surface2);color:var(--text);}
.ac-item .ac-ic{width:18px;height:18px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;}
.ac-item .ac-sub{font-size:10.5px;color:var(--text3);margin-left:auto;font-family:var(--mono);}

#print-root{display:none;color:#111;background:#fff;font-family:'IBM Plex Sans',sans-serif;}
</style>
</head>
<body>

<header>
  <div class="logo"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 4.5A2.5 2.5 0 017.5 2H19v16H7.5A2.5 2.5 0 005 20.5v-16z" stroke="white" stroke-width="1.7" stroke-linejoin="round"/><path d="M5 20.5A2.5 2.5 0 017.5 18H19v4H7.5A2.5 2.5 0 015 19.5" stroke="white" stroke-width="1.7"/><path d="M9 7h7M9 10.5h7" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg></div>
  <div>
    <div class="app-name">Labbook</div>
    <div class="app-sub">Your electronic lab notebook</div>
  </div>
  <div class="hdr-right">
    <span class="net" id="net" title="Connection"><span class="dot"></span><span id="net-txt">online</span></span>
    <span class="sync-dot" id="sync-dot" title="Cloud sync status"></span>
    <button class="hdr-btn" id="backup-btn" onclick="doBackup(true)" title="Save a dated backup file"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M7 10l5 5 5-5M12 15V3"/></svg>Backup</button>
    <button class="hdr-btn" id="dock-toggle" onclick="toggleDock()" title="Toggle right panel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M15 4v16"/></svg></button>
    <button class="hdr-btn" id="export-btn" onclick="exportPDF()" style="display:none;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8" rx="1"/></svg>Export</button>
  </div>
</header>

<div id="ribbon"></div>

<div class="body">
  <div class="pane pane-sec" id="pane-sec-wrap"><div class="rail"><button class="rail-btn" onclick="toggleCollapse('sec')">SECTIONS ⟩</button></div><div class="pane-inner" id="pane-sec"></div></div>
  <div class="splitter" id="split-sec" onmousedown="startResize(event,'sec')" ondblclick="resetPane('sec')"></div>
  <div class="pane pane-pages" id="pane-pages-wrap"><div class="rail"><button class="rail-btn" onclick="toggleCollapse('pages')">PAGES ⟩</button></div><div class="pane-inner" id="pane-pages" style="flex:1;display:flex;flex-direction:column;min-height:0;"></div></div>
  <div class="splitter" id="split-pages" onmousedown="startResize(event,'pages')" ondblclick="resetPane('pages')"></div>
  <div class="pane-ed" id="pane-ed"></div>
  <div id="rightdock"></div>
</div>

<!-- New experiment modal -->
<div class="modal-back" id="new-modal">
  <div class="modal">
    <div class="modal-t">New experiment</div>
    <div class="mrow"><label>Preset / type</label><select id="nm-type" onchange="nmUpdateCode()"></select></div>
    <div class="mrow"><label>POI / prefix (optional)</label><input id="nm-poi" placeholder="e.g. SM" autocomplete="off" oninput="nmUpdateCode()"></div>
    <div class="mrow"><label>Start date</label><input id="nm-date" type="date" oninput="nmUpdateCode()"></div>
    <div class="mrow"><label>Title / plan</label><input id="nm-title" placeholder="Short description" autocomplete="off"></div>
    <div class="mrow"><label>Code (auto — editable)</label><input id="nm-code" class="mcode" autocomplete="off" spellcheck="false"></div>
    <div class="modal-act"><button class="btn ghost sm" onclick="openPresetEditor()">Edit presets…</button><span class="grow"></span><button class="btn ghost" onclick="closeNew()">Cancel</button><button class="btn" onclick="createExperiment()">Create</button></div>
  </div>
</div>

<!-- Preset editor modal -->
<div class="modal-back" id="preset-modal">
  <div class="modal wide">
    <div class="modal-t">Experiment presets<span class="grow"></span><select id="pe-type" class="tb-sel" onchange="peRender()"></select></div>
    <div id="pe-body"></div>
    <div class="modal-act"><button class="btn ghost sm" onclick="peAddBlock()">+ Add day-block</button><span class="grow"></span><button class="btn ghost" onclick="closePresetEditor()">Close</button><button class="btn" onclick="peSave()">Save preset</button></div>
  </div>
</div>

<div id="acpop"></div>
<div id="print-root"></div>

<script>
// ── Theme ──────────────────────────────────────────────────────────────────
(function(){ var t='light'; try{ t=localStorage.getItem('hub_theme')||'light'; }catch(e){} document.documentElement.setAttribute('data-theme',t); })();
window.addEventListener('message', function(e){
  if(e.data==='setTheme:dark') document.documentElement.setAttribute('data-theme','dark');
  if(e.data==='setTheme:light') document.documentElement.setAttribute('data-theme','light');
});

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function el(id){ return document.getElementById(id); }
function uid(){ return 'lb'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayStr(){ var d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function dateCompact(s){ return s? s.replace(/-/g,'') : ''; }
function fmtDate(s){ if(!s) return ''; var p=s.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function addDays(s,n){ if(!s) return s; var d=new Date(s+'T00:00:00'); d.setDate(d.getDate()+(n||0)); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }

// ── Preset seed (from Jon's OneNote protocols; dayOffset per block) ──────────
var EXP_TYPES=[
  {id:'WB',name:'Western blot'},{id:'HB',name:'HiBiT'},{id:'CTG',name:'Cell viability (CTG)'},
  {id:'NB',name:'NanoBRET'},{id:'KD',name:'Kinetic degradation'},{id:'D2B',name:'Direct-to-Biology'},
  {id:'PR',name:'Proteomics'},{id:'CLONE',name:'Cloning / plasmid'},{id:'EXP',name:'Custom / blank'}
];
var PRESET_SEED={
  WB:{title:'Western blot',blocks:[
    {d:0,title:'Sample prep',html:'<p><b>Lysis &amp; sample prep</b></p><ul><li>Lyse in RIPA + protease/phosphatase inhibitors</li><li>BCA quantification (see BCA app)</li><li>Normalize, add 4× LDS + reducing agent, denature 95 °C × 5 min</li></ul>'},
    {d:0,title:'Run + transfer',html:'<p><b>Gel</b>: MOPS, 165 V, 100 min</p><p><b>Transfer</b>: wet transfer, 90 V, 90 min</p><p><b>Blocking</b>: 1 h, RT</p>'},
    {d:1,title:'Antibodies + imaging',html:'<p><b>Primary</b>: 4 °C, overnight</p><ul><li>A-HT Ms (1:1000)</li><li>A-NL Ms (1:1000)</li><li>A-HA Rat (1:1000)</li></ul><p><b>Secondary</b>: 1 h RT · <b>Image</b></p>'},
    {d:1,title:'Results',html:'<p><b>Results</b></p><p></p>'}]},
  HB:{title:'HiBiT: seed → overnight → compound → lytic read',blocks:[
    {d:0,title:'Seeding',html:'<p><b>Seeding</b></p><ul><li>Seed <b>N</b> × 384-well plate / cell line</li><li>30 µL/well · 0.10 M/mL · 3000 cells/well</li></ul><p>Incubate overnight.</p>'},
    {d:1,title:'Compound addition + HiBiT Lytic',html:'<p><b>Compound addition (Echo)</b></p><p><b>HiBiT Lytic</b>: 15 µL/well (1:2 reagent:cell) · shake 300 rpm × 1 min · RT 10 min</p><p><b>Read</b>: PHERAstar · 0.2 s/well</p>'},
    {d:1,title:'Results',html:'<p><b>Results</b></p><p></p>'}]},
  CTG:{title:'Cell viability (CellTiter-Glo)',blocks:[
    {d:0,title:'Plan + seeding',html:'<p><b>Plan</b>: viability in 96-well plates.</p><p><b>Seed</b>: 90 µL/well · 30 000 cells/well (0.3 M/mL). Incubate.</p>'},
    {d:3,title:'CTG readout',html:'<p><b>CTG — 72 h</b>: add 50 µL/well · equilibrate 10–20 min · read luminescence</p>'},
    {d:3,title:'Data analysis',html:'<p><b>Data analysis</b></p><p></p>'}]},
  NB:{title:'NanoBRET biosensor',blocks:[
    {d:0,title:'Seed + transfection',html:'<p><b>Seed HEK293</b>: 6-well, 0.8 M/well.</p><p><b>Transfect</b>: 0.02 µg plasmid + 2 µg carrier + FuGENE HD. ~20 h.</p>'},
    {d:1,title:'Harvest + plate',html:'<p><b>Harvest</b>: trypsinize, resuspend in phenol-red-free OptiMEM + 4% FBS, 2.2×10⁵ cells/mL.</p>'},
    {d:1,title:'Treat + read',html:'<p><b>MG132</b> 10 µM, 1 h · <b>Test compounds</b> 3 h · <b>NanoBRET substrate</b>, read.</p>'}]},
  KD:{title:'Kinetic degradation',blocks:[
    {d:0,title:'Seeding',html:'<p><b>Seed</b> HiBiT reporter line · 384-well · overnight</p>'},
    {d:1,title:'Compound + kinetic read',html:'<p><b>Degrader series</b> (Echo) · <b>Endurazine</b> live reagent · <b>Kinetic read</b>: 0,1,2,4,6,8,24 h</p>'},
    {d:2,title:'Analysis',html:'<p><b>Analysis</b>: kinetic Dmax / rate</p><p></p>'}]},
  D2B:{title:'Direct-to-Biology',blocks:[
    {d:0,title:'Reaction setup',html:'<p><b>Reaction</b>: Cherry Pick + Plate Reformat · react overnight</p>'},
    {d:1,title:'Compound addition + seed',html:'<p><b>Echo gradient (D2B)</b> · <b>Seed</b> 20 µL/well · 0.15 M/mL · ~20 h</p>'},
    {d:2,title:'HiBiT Lytic + read',html:'<p><b>HiBiT Lytic</b> 10 µL/well · <b>Read</b> PHERAstar</p>'}]},
  PR:{title:'Proteomics sample prep',blocks:[
    {d:0,title:'Lysis + digestion (S-Trap)',html:'<p><b>Lyse</b> · <b>BCA</b> · normalize · <b>S-Trap</b>: reduce, alkylate, trap, trypsin, elute</p>'},
    {d:1,title:'LC-MS + analysis',html:'<p><b>Desalt</b> · LC-MS (DIA) · <b>DIA-NN → Perseus</b></p>'}]},
  CLONE:{title:'Cloning / plasmid',blocks:[
    {d:0,title:'Design + assembly + transformation',html:'<p><b>Vector</b> linearise (BbsI) · <b>HiFi assembly</b> (NEB E2621, 50 °C 60 min) · <b>Transform</b> NEB Stable · plate LB+amp overnight</p>'},
    {d:1,title:'Colony pick',html:'<p><b>Pick</b> 3 colonies → 5 mL LB+amp · overnight 37 °C</p>'},
    {d:2,title:'Miniprep + sequencing',html:'<p><b>Miniprep</b> · <b>Sanger</b> · <b>Plasmidsaurus</b> full-plasmid seq</p>'}]},
  EXP:{title:'',blocks:[{d:0,title:'',html:'<p></p>'}]}
};

// ── Store ────────────────────────────────────────────────────────────────
var LB={ data:null };
function lbBlank(){ return {projects:[],generalSections:[],experiments:{},pages:{},notebook:{},tags:[],presets:{},_seeded:false,updated:0}; }
try{ LB.data=JSON.parse(localStorage.getItem('hub_labbook')||'null'); }catch(e){}
if(!LB.data||typeof LB.data!=='object') LB.data=lbBlank();
['projects','generalSections','experiments','pages','notebook','tags','presets'].forEach(function(k){ if(!LB.data[k]) LB.data[k]=(k==='projects'||k==='generalSections'||k==='tags')?[]:{}; });
LB.data.projects.forEach(function(p){ p.sections=p.sections||[]; });
Object.keys(LB.data.experiments).forEach(function(k){ var e=LB.data.experiments[k];
  if(e.projectId && !e.sectionId){ var p=LB.data.projects.filter(function(x){return x.id===e.projectId;})[0];
    if(p){ var u=(p.sections||[]).filter(function(s){return s.name==='Unclassified';})[0];
      if(!u){ u={id:uid(),name:'Unclassified',created:Date.now()}; p.sections.push(u); } e.sectionId=u.id; } } });
// seed presets from PRESET_SEED (once), keep user edits
if(!LB.data.presets || !Object.keys(LB.data.presets).length){
  LB.data.presets={}; EXP_TYPES.forEach(function(t){ var s=PRESET_SEED[t.id]||PRESET_SEED.EXP;
    LB.data.presets[t.id]={name:t.name,title:s.title,blocks:s.blocks.map(function(b){return {dayOffset:b.d,title:b.title,html:b.html};})}; }); }

var SEED_GENERAL=[{name:'Notes',kind:'notes'},{name:'Papers I read',kind:'notes'},{name:'Bio Safety Committee',kind:'notes'},{name:'Seminars',kind:'seminars'}];
var SEED_PROJECTS=[
  {name:'Multivalent Chemistry',sections:['Meetings','TCIPs','Degradation','Kinetic Degradation','RIPTACs','CRISPR','NanoBRET Biosensor']},
  {name:'LRRC58',sections:['Information','TurboID']},{name:'RTag',sections:['Meetings','Information','Cloning']},
  {name:'SPARK NS',sections:['Meetings','Information','NanoBRET']},{name:'SMARCA Glues',sections:['HiBiT Degradation Screens']},
  {name:'Eisai',sections:['Degradation','Viability','Kinetic Degradation','Proteomics','Cell Lines']},
  {name:'EXTRA',sections:['Meetings','EUROPIN Summer School','Silvia Stay']},{name:'USC Projects',sections:['Marie Curie','USC PROTAC evaluation']}
];
function maybeSeed(){
  if(LB.data._seeded) return false;
  if(LB.data.projects.length||Object.keys(LB.data.experiments).length||LB.data.generalSections.length||Object.keys(LB.data.pages).length){ LB.data._seeded=true; return false; }
  SEED_GENERAL.forEach(function(g){ LB.data.generalSections.push({id:uid(),name:g.name,kind:g.kind,created:Date.now()}); });
  SEED_PROJECTS.forEach(function(sp){ var p={id:uid(),name:sp.name,created:Date.now(),sections:[]};
    sp.sections.forEach(function(sn){ p.sections.push({id:uid(),name:sn,created:Date.now()}); }); LB.data.projects.push(p); });
  LB.data._seeded=true; return true;
}

var _lbFbRef=null;
function lbFb(){ if(_lbFbRef!==null) return _lbFbRef; try{ if(window.parent && window.parent.firebase){ _lbFbRef=window.parent.firebase.database().ref('journal/labbook'); } else _lbFbRef=undefined; }catch(e){ _lbFbRef=undefined; } return _lbFbRef; }
var _syncT=null,_adopting=false;
function setSync(ok){ var d=el('sync-dot'); if(d) d.classList.toggle('ok',ok); }
function save(){
  LB.data.updated=Date.now();
  try{ localStorage.setItem('hub_labbook', JSON.stringify(LB.data)); }catch(e){}
  if(_adopting) return;
  setSync(false); clearTimeout(_syncT);
  _syncT=setTimeout(function(){ var r=lbFb(); if(r){ try{ r.set(LB.data).then(function(){setSync(true);}).catch(function(){}); }catch(e){} } }, 1200);
}
function lbInitSync(){
  var r=lbFb(); if(!r) return;
  try{ r.once('value').then(function(s){
    var v=s.val();
    var remoteHas = v && ((v.projects||[]).length || Object.keys(v.experiments||{}).length || (v.generalSections||[]).length || Object.keys(v.pages||{}).length || Object.keys(v.notebook||{}).length);
    if(v && typeof v==='object' && remoteHas && (v.updated||0) > (LB.data.updated||0)){
      _adopting=true;
      LB.data={projects:v.projects||[],generalSections:v.generalSections||[],experiments:v.experiments||{},pages:v.pages||{},notebook:v.notebook||{},tags:v.tags||[],presets:v.presets||LB.data.presets,_seeded:(v._seeded===undefined?true:v._seeded),updated:v.updated||Date.now()};
      LB.data.projects.forEach(function(p){ p.sections=p.sections||[]; });
      try{ localStorage.setItem('hub_labbook',JSON.stringify(LB.data)); }catch(e){}
      _adopting=false; renderAll();
    }
    setSync(true);
  }).catch(function(){}); }catch(e){}
}

// ── Layout state ────────────────────────────────────────────────────────
var LAYOUT;
(function(){ var d={wSec:210,wPages:280,colSec:false,colPages:false,dockOpen:true,panels:{insert:'ribbon',outline:'dock',tags:'dock',meta:'dock'}};
  try{ var s=JSON.parse(localStorage.getItem('lb_layout')||'null'); if(s&&typeof s==='object'){ d.wSec=s.wSec||d.wSec; d.wPages=s.wPages||d.wPages; d.colSec=!!s.colSec; d.colPages=!!s.colPages; d.dockOpen=s.dockOpen!==false; if(s.panels) d.panels=Object.assign(d.panels,s.panels); } }catch(e){}
  LAYOUT=d; })();
function saveLayout(){ try{ localStorage.setItem('lb_layout',JSON.stringify(LAYOUT)); }catch(e){} }
function applyLayout(){
  var sw=el('pane-sec-wrap'), pw=el('pane-pages-wrap');
  sw.classList.toggle('collapsed',LAYOUT.colSec); pw.classList.toggle('collapsed',LAYOUT.colPages);
  if(!LAYOUT.colSec) sw.style.width=LAYOUT.wSec+'px';
  if(!LAYOUT.colPages) pw.style.width=LAYOUT.wPages+'px';
  el('split-sec').style.display=LAYOUT.colSec?'none':''; el('split-pages').style.display=LAYOUT.colPages?'none':'';
  el('rightdock').classList.toggle('hidden',!LAYOUT.dockOpen);
}
function toggleCollapse(which){ if(which==='sec') LAYOUT.colSec=!LAYOUT.colSec; else LAYOUT.colPages=!LAYOUT.colPages; saveLayout(); applyLayout(); }
function resetPane(which){ if(which==='sec') LAYOUT.wSec=210; else LAYOUT.wPages=280; saveLayout(); applyLayout(); }
var _rz=null;
function startResize(ev,which){ ev.preventDefault(); _rz={which:which,x:ev.clientX,w:(which==='sec'?LAYOUT.wSec:LAYOUT.wPages)}; el('split-'+which).classList.add('drag'); document.body.style.cursor='col-resize'; document.body.style.userSelect='none'; }
document.addEventListener('mousemove',function(ev){ if(!_rz) return; var dx=ev.clientX-_rz.x; var nw=Math.max(120,Math.min(520,_rz.w+dx)); if(_rz.which==='sec') LAYOUT.wSec=nw; else LAYOUT.wPages=nw; applyLayout(); });
document.addEventListener('mouseup',function(){ if(!_rz) return; el('split-'+_rz.which).classList.remove('drag'); document.body.style.cursor=''; document.body.style.userSelect=''; _rz=null; saveLayout(); });
function toggleDock(){ LAYOUT.dockOpen=!LAYOUT.dockOpen; saveLayout(); applyLayout(); renderPanels(); }

// ── Selection ────────────────────────────────────────────────────────────
var SEL={ node:{kind:'notebook'}, page:null };
var EXPANDED={}, TAGFILTER=null;
function nodeEq(a,b){ return !!a&&!!b&&a.kind===b.kind&&(a.projectId||null)===(b.projectId||null)&&(a.sectionId||null)===(b.sectionId||null); }
function selectNode(kind,projectId,sectionId){ SEL.node={kind:kind,projectId:projectId||null,sectionId:sectionId||null}; SEL.page=null; TAGFILTER=null; renderAll(); }
function selectPage(id){ SEL.page=id; renderAll(); }
function toggleProj(id){ EXPANDED[id]=!EXPANDED[id]; renderSections(); }
function genSecById(id){ return LB.data.generalSections.filter(function(s){return s.id===id;})[0]; }

// ── Tree (pane 1) ─────────────────────────────────────────────────────────
var NB_ICON='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 3v18M12 8h5M12 12h5"/></svg>';
var PAGE_ICON='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4M9 12h6M9 16h6"/></svg>';
var SEM_ICON='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="9" y="3" width="6" height="10" rx="3"/><path d="M6 11a6 6 0 0012 0M12 17v3M9 21h6"/></svg>';
function secLeaf(node,label,icon,delCall){
  var active=nodeEq(SEL.node,node)?' active':'', sub=node.kind==='expsec'?' sub':'';
  var onclick="selectNode('"+node.kind+"','"+(node.projectId||'')+"','"+(node.sectionId||'')+"')";
  var del=delCall?'<span class="del" title="Delete" onclick="event.stopPropagation();'+delCall+'">&times;</span>':'';
  var ic = node.kind==='expsec' ? '<span class="dot"></span>' : (icon||'<span class="dot"></span>');
  return '<div class="sec-item'+sub+active+'" onclick="'+onclick+'">'+ic+'<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(label)+'</span>'+del+'</div>';
}
function renderSections(){
  var host=el('pane-sec'); var h='';
  h+='<div class="pane-lbl" style="display:flex;align-items:center;">Journal<button class="collapse-btn" onclick="toggleCollapse(\'sec\')" title="Collapse">&#10094;</button></div>';
  h+=secLeaf({kind:'notebook'},'Notebook',NB_ICON,null);
  h+='<div class="pane-lbl">General</div>';
  LB.data.generalSections.forEach(function(s){ h+=secLeaf({kind:'general',sectionId:s.id}, s.name, (s.kind==='seminars'?SEM_ICON:PAGE_ICON), "delGeneral('"+s.id+"')"); });
  h+='<div class="add-row"><input id="new-gen" placeholder="New section…" autocomplete="off" onkeydown="if(event.key===\'Enter\')addGeneral()"><button onclick="addGeneral()">+</button></div>';
  h+='<div class="pane-lbl">Projects</div>';
  LB.data.projects.forEach(function(p){
    var open=!!EXPANDED[p.id];
    h+='<div class="proj-row" onclick="toggleProj(\''+p.id+'\')"><span class="chev'+(open?' open':'')+'">&#9656;</span><span class="proj-name">'+esc(p.name)+'</span><span class="del" title="Delete project" onclick="event.stopPropagation();delProject(\''+p.id+'\')">&times;</span></div>';
    if(open){ (p.sections||[]).forEach(function(s){ h+=secLeaf({kind:'expsec',projectId:p.id,sectionId:s.id}, s.name, null, "delSection('"+p.id+"','"+s.id+"')"); });
      h+='<div class="add-row sub"><input id="new-sec-'+p.id+'" placeholder="New folder…" autocomplete="off" onkeydown="if(event.key===\'Enter\')addSection(\''+p.id+'\')"><button onclick="addSection(\''+p.id+'\')">+</button></div>'; }
  });
  h+='<div class="add-row"><input id="new-proj" placeholder="New project…" autocomplete="off" onkeydown="if(event.key===\'Enter\')addProject()"><button onclick="addProject()">+</button></div>';
  host.innerHTML=h;
}
function addProject(){ var i=el('new-proj'); var n=(i.value||'').trim(); if(!n) return; var p={id:uid(),name:n,created:Date.now(),sections:[]}; LB.data.projects.push(p); EXPANDED[p.id]=true; save(); renderSections(); }
function delProject(id){ var exps=Object.keys(LB.data.experiments).filter(function(k){return LB.data.experiments[k].projectId===id;});
  if(!confirm('Delete this project'+(exps.length?(' and its '+exps.length+' experiment(s)'):'')+'?')) return;
  exps.forEach(function(k){ delete LB.data.experiments[k]; });

function allBlockDates(){ var set={}; Object.keys(LB.data.experiments).forEach(function(k){ (LB.data.experiments[k].blocks||[]).forEach(function(b){ if(b.date) set[b.date]=1; }); }); return set; }
function blocksForDate(D){ var out=[]; Object.keys(LB.data.experiments).forEach(function(k){ var e=LB.data.experiments[k]; (e.blocks||[]).forEach(function(b){ if(b.date===D) out.push({exp:e,block:b}); }); }); return out; }
function htmlHasTag(html,tag){ return (html||'').indexOf('data-tag="'+tag+'"')>=0; }
function entryMatchesTag(html,tag){ return htmlHasTag(html,tag); }
function renderPages(){
  var host=el('pane-pages'); var node=SEL.node;
  if(node.kind==='notebook'){
    var dset=allBlockDates(); Object.keys(LB.data.notebook).forEach(function(k){dset[k]=1;});
    var days=Object.keys(dset).sort().reverse();
    var items=days.map(function(k){ var pg=LB.data.notebook[k]; var nblk=blocksForDate(k).length;
      var preview=pg?(pg.html||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().slice(0,50):'';
      var meta=(nblk?(nblk+' exp block'+(nblk>1?'s':'')):'')+(preview?(nblk?' · ':'')+preview:'');
      return '<div class="page-item'+(SEL.page===k?' active':'')+'" onclick="selectPage(\''+k+'\')"><div class="page-title">'+esc(fmtDate(k))+'</div><div class="page-meta">'+esc(meta||'empty')+'</div></div>'; }).join('');
    host.innerHTML='<div class="pages-hd"><span class="t">Notebook</span><button class="pages-new" onclick="newNotebookDay()">+ Day</button></div>'+(days.length?items:'<div class="pages-empty">No entries yet.<br>Start today\'s log with <b>+ Day</b>.</div>');
    return;
  }
  if(node.kind==='general'){
    var sec=genSecById(node.sectionId); if(!sec){ host.innerHTML='<div class="pages-empty">Pick a section.</div>'; return; }
    var pgs=Object.keys(LB.data.pages).map(function(k){return LB.data.pages[k];}).filter(function(pg){return pg.sectionId===node.sectionId;});
    if(TAGFILTER) pgs=pgs.filter(function(pg){return entryMatchesTag(pg.html,TAGFILTER);});
    pgs.sort(function(a,b){ return (b.date||'').localeCompare(a.date||'')||(b.created||0)-(a.created||0); });
    var fbar=TAGFILTER?'<div class="pages-filter on"><span class="filter-chip">#'+esc(TAGFILTER)+'<span class="x" onclick="TAGFILTER=null;renderAll()">&times;</span></span></div>':'';
    if(sec.kind==='seminars'){
      var si=pgs.map(function(pg){ return '<div class="page-item'+(SEL.page===pg.id?' active':'')+'" onclick="selectPage(\''+pg.id+'\')"><div class="page-title">'+esc(pg.title||'Untitled seminar')+'</div><div class="page-meta">'+(pg.speaker?('<span>'+esc(pg.speaker)+'</span>'):'')+'<span>'+esc(fmtDate(pg.date||''))+'</span></div></div>'; }).join('');
      host.innerHTML='<div class="pages-hd"><span class="t">'+esc(sec.name)+'</span><button class="pages-new" onclick="newSeminar()">+ Seminar</button></div>'+fbar+(pgs.length?si:'<div class="pages-empty">No seminars yet.</div>'); return;
    }
    var pi=pgs.map(function(pg){ var preview=(pg.html||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().slice(0,60);
      return '<div class="page-item'+(SEL.page===pg.id?' active':'')+'" onclick="selectPage(\''+pg.id+'\')"><div class="page-title">'+esc(pg.title||'Untitled')+'</div><div class="page-meta">'+esc(preview||'empty')+'</div></div>'; }).join('');
    host.innerHTML='<div class="pages-hd"><span class="t">'+esc(sec.name)+'</span><button class="pages-new" onclick="newPage()">+ Page</button></div>'+fbar+(pgs.length?pi:'<div class="pages-empty">No pages yet.</div>'); return;
  }
  if(node.kind==='expsec'){
    var p=LB.data.projects.filter(function(x){return x.id===node.projectId;})[0];
    var sec2=p?(p.sections||[]).filter(function(s){return s.id===node.sectionId;})[0]:null;
    if(!sec2){ host.innerHTML='<div class="pages-empty">Pick a folder inside a project.</div>'; return; }
    var exps=Object.keys(LB.data.experiments).map(function(k){return LB.data.experiments[k];}).filter(function(e){return e.projectId===node.projectId&&e.sectionId===node.sectionId;});
    if(TAGFILTER) exps=exps.filter(function(e){return (e.blocks||[]).some(function(b){return entryMatchesTag(b.html,TAGFILTER);});});
    exps.sort(function(a,b){return (b.startDate||'').localeCompare(a.startDate||'')||(b.created||0)-(a.created||0);});
    var fbar2=TAGFILTER?'<div class="pages-filter on"><span class="filter-chip">#'+esc(TAGFILTER)+'<span class="x" onclick="TAGFILTER=null;renderAll()">&times;</span></span></div>':'';
    var ei=exps.map(function(e){ return '<div class="page-item'+(SEL.page===e.id?' active':'')+'" onclick="selectPage(\''+e.id+'\')"><div class="page-code">'+esc(e.code||'')+'</div><div class="page-title">'+esc(e.title||'Untitled')+'</div><div class="page-meta"><span class="pg-status '+(e.status||'planned')+'">'+esc(e.status||'planned')+'</span><span>'+esc(fmtDate(e.startDate||''))+'</span></div></div>'; }).join('');
    host.innerHTML='<div class="pages-hd"><span class="t">'+esc(sec2.name)+'</span><button class="pages-new" onclick="openNew()">+ Experiment</button></div>'+fbar2+(exps.length?ei:'<div class="pages-empty">No experiments yet.</div>'); return;
  }
  host.innerHTML='<div class="pages-empty">Pick something on the left.</div>';
}

var PANEL_DEFS={
  insert:{name:'Insert',build:function(dock){ return btns([
    ['Link / mention (@)','openMention',tbSvg('<path d="M10 13a5 5 0 007 0l2-2a5 5 0 00-7-7l-1 1"/><path d="M14 11a5 5 0 00-7 0l-2 2a5 5 0 007 7l1-1"/>')],
    ['Tag (#)','openTag','<b>#</b>'],
    ['Table','insertTable',tbSvg('<rect x="3" y="4" width="18" height="16" rx="1"/><path d="M3 10h18M3 15h18M9 4v16M15 4v16"/>')],
    ['Divider','insertDivider',tbSvg('<path d="M3 12h18"/>')],
    ['Insert block (/)','openSlash',tbSvg('<path d="M12 5v14M5 12h14"/>')]
  ],dock); }},
  outline:{name:'Outline',dockOnly:true,build:function(){ return outlineHtml(); }},
  tags:{name:'Tags',dockOnly:true,build:function(){ return tagsHtml(); }},
  meta:{name:'Info',dockOnly:true,build:function(){ return metaHtml(); }}
};
function btns(list,dock){ return list.map(function(x){ return '<button class="tb'+(dock?'':'')+'" title="'+x[0]+'" onmousedown="event.preventDefault();'+x[1]+'()" style="'+(dock?'width:auto;justify-content:flex-start;gap:8px;padding:6px 8px;font-size:12px':'')+'">'+x[2]+(dock?'<span>'+esc(x[0])+'</span>':'')+'</button>'; }).join(''); }
function panelDom(id,zone){
  var def=PANEL_DEFS[id]; if(!def) return '';
  var swap=def.dockOnly?'':'<button class="panel-swap" title="Move to '+(zone==='ribbon'?'right dock':'ribbon')+'" onmousedown="event.preventDefault();movePanel(\''+id+'\')">&#8646;</button>';
  return '<div class="panel" data-panel="'+id+'" draggable="true" ondragstart="panelDrag(event,\''+id+'\')">'
    +'<div class="panel-h"><span class="pdrag">&#8942;&#8942;</span><span class="ptitle">'+esc(def.name)+'</span>'+swap+'</div>'
    +'<div class="panel-body'+(id==='insert'&&zone==='ribbon'?'':' rowwrap')+'">'+def.build(zone==='dock')+'</div></div>';
}
function renderPanels(){
  var rib=el('ribbon'); rib.innerHTML=coreRibbon()+'<div class="rb-move-zone" id="rb-move" ondragover="event.preventDefault();this.classList.add(\'drop\')" ondragleave="this.classList.remove(\'drop\')" ondrop="panelDrop(event,\'ribbon\')"></div><div class="rb-spacer"></div>';
  var dock=el('rightdock');
  var ribHtml='', dockHtml='';
  Object.keys(PANEL_DEFS).forEach(function(id){ var def=PANEL_DEFS[id]; var zone=def.dockOnly?'dock':(LAYOUT.panels[id]||'ribbon'); if(zone==='ribbon') ribHtml+=panelDom(id,'ribbon'); else dockHtml+=panelDom(id,'dock'); });
  el('rb-move').innerHTML=ribHtml;
  dock.setAttribute('ondragover',"event.preventDefault();this.style.outline='2px dashed var(--accent)'");
  dock.setAttribute('ondragleave',"this.style.outline=''");
  dock.setAttribute('ondrop',"panelDrop(event,'dock')");
  dock.innerHTML=dockHtml||'<div class="dock-empty">Drag panels here, or use ⇄ on a ribbon panel.</div>';
  renderDockPanels();
}
function renderDockPanels(){ // refresh dynamic dock panels (outline/tags/meta) contents in place
  ['outline','tags','meta'].forEach(function(id){ var node=document.querySelector('#rightdock [data-panel="'+id+'"] .panel-body'); if(node) node.innerHTML=PANEL_DEFS[id].build(true); }); }
var _dragPanel=null;
function panelDrag(ev,id){ _dragPanel=id; ev.dataTransfer.setData('text/plain',id); ev.dataTransfer.effectAllowed='move'; }
function panelDrop(ev,zone){ ev.preventDefault(); var id=_dragPanel||ev.dataTransfer.getData('text/plain'); el('rb-move').classList.remove('drop'); el('rightdock').style.outline=''; if(!id||PANEL_DEFS[id].dockOnly) return; if(zone==='dock' && !LAYOUT.dockOpen){ LAYOUT.dockOpen=true; applyLayout(); } LAYOUT.panels[id]=zone; saveLayout(); renderPanels(); _dragPanel=null; }
function movePanel(id){ if(PANEL_DEFS[id].dockOnly) return; var z=(LAYOUT.panels[id]||'ribbon')==='ribbon'?'dock':'ribbon'; if(z==='dock' && !LAYOUT.dockOpen){ LAYOUT.dockOpen=true; applyLayout(); } LAYOUT.panels[id]=z; saveLayout(); renderPanels(); }
function outlineHtml(){ var e=(SEL.node.kind==='expsec'&&SEL.page)?LB.data.experiments[SEL.page]:null;
  if(e){ return e.blocks.map(function(b){ return '<div class="outline-item" onclick="scrollBlk(\''+b.id+'\')">'+(b.dayOffset!=null?('D'+b.dayOffset+' · '):'')+esc(b.title||'(untitled)')+'</div>'; }).join('')||'<div class="dock-empty">No blocks.</div>'; }
  if(_activeEd){ var hs=_activeEd.querySelectorAll('h1,h2,h3'); if(hs.length){ var o=''; hs.forEach(function(h,i){ o+='<div class="outline-item">'+esc(h.textContent.slice(0,40))+'</div>'; }); return o; } }
  return '<div class="dock-empty">Open an experiment or add headings to see an outline.</div>'; }
function scrollBlk(id){ var n=el('blk-'+id); if(n) n.scrollIntoView({behavior:'smooth',block:'start'}); }
function tagsHtml(){ if(!LB.data.tags.length) return '<div class="dock-empty">No tags yet. Type <b>#</b> in any note.</div>';
  return '<div style="display:flex;flex-wrap:wrap;gap:6px">'+LB.data.tags.slice().sort().map(function(t){ return '<button class="tagchip-btn" onclick="TAGFILTER=\''+esc(t)+'\';renderAll()">#'+esc(t)+'</button>'; }).join('')+'</div>'+(TAGFILTER?'<div style="margin-top:8px"><button class="btn ghost sm" onclick="TAGFILTER=null;renderAll()">Clear filter</button></div>':''); }
function metaHtml(){ var e=(SEL.node.kind==='expsec'&&SEL.page)?LB.data.experiments[SEL.page]:null;
  if(!e) return '<div class="dock-empty">Open an experiment to see its info.</div>';
  var L=function(k,v){ return v?('<div class="meta-line"><span>'+k+'</span><b>'+esc(v)+'</b></div>'):''; };
  return L('Code',e.code)+L('Type',(EXP_TYPES.filter(function(t){return t.id===e.type;})[0]||{}).name)+L('Status',e.status)+L('Start',fmtDate(e.startDate))+L('POI',e.poi)+L('Plasmids',e.plasmids)+L('Cell lines',e.cellLines)+L('Blocks',(e.blocks||[]).length); }

// ── Formatting ─────────────────────────────────────────────────────────────
var _activeEd=null;
function fmt(ev,cmd,val){ if(ev&&ev.preventDefault) ev.preventDefault(); if(_activeEd) _activeEd.focus(); try{ document.execCommand(cmd,false,val||null); }catch(e){} if(_activeEd) _activeEd.dispatchEvent(new Event('input')); }
function doFormatBlock(tag){ if(!tag) return; if(_activeEd) _activeEd.focus(); try{ document.execCommand('formatBlock',false,tag); }catch(e){} if(_activeEd) _activeEd.dispatchEvent(new Event('input')); }
function insertTodo(ev){ if(ev)ev.preventDefault(); if(!_activeEd) return; _activeEd.focus(); try{ document.execCommand('insertHTML',false,'<div class="lb-todo"><span class="lb-box" contenteditable="false"></span>&nbsp;</div>'); }catch(e){} _activeEd.dispatchEvent(new Event('input')); }
function insertTable(){ if(!_activeEd) return; _activeEd.focus(); var r='<table><tr><td>&nbsp;</td><td>&nbsp;</td></tr><tr><td>&nbsp;</td><td>&nbsp;</td></tr></table><p></p>'; try{ document.execCommand('insertHTML',false,r); }catch(e){} _activeEd.dispatchEvent(new Event('input')); }
function insertDivider(){ if(!_activeEd) return; _activeEd.focus(); try{ document.execCommand('insertHTML',false,'<hr><p></p>'); }catch(e){} _activeEd.dispatchEvent(new Event('input')); }
function insertHtmlAtCaret(html){ if(!_activeEd) return; _activeEd.focus(); try{ document.execCommand('insertHTML',false,html); }catch(e){} _activeEd.dispatchEvent(new Event('input')); }

document.addEventListener('click',function(e){
  if(e.target.classList && e.target.classList.contains('lb-box')){ var td=e.target.closest('.lb-todo'); if(td){ td.classList.toggle('done'); var ed=e.target.closest('.rt'); if(ed) ed.dispatchEvent(new Event('input')); } }
  var a=e.target.closest && e.target.closest('a.lb-link');
  if(a){ e.preventDefault(); if(a.dataset.exp){ openExp(a.dataset.exp); } else if(a.dataset.page){ var pg=LB.data.pages[a.dataset.page]; if(pg){ selectNode('general','',pg.sectionId); SEL.page=a.dataset.page; renderAll(); } } else if(a.dataset.app){ try{ if(window.parent && window.parent.openApp) window.parent.openApp(a.dataset.app); }catch(err){} } }
});

// ── Field / block / page setters ────────────────────────────────────────────
function _curExp(){ return (SEL.node.kind==='expsec'&&SEL.page)?LB.data.experiments[SEL.page]:null; }
function _curPage(){ return (SEL.node.kind==='general'&&SEL.page)?LB.data.pages[SEL.page]:null; }
function setField(f,v){ var e=_curExp(); if(!e) return; e[f]=v; e.updated=Date.now(); save(); if(f==='status'||f==='title'||f==='code'||f==='startDate') renderPages(); if(f==='code'||f==='status'||f==='poi'||f==='startDate') renderDockPanels(); }
function setBlock(id,f,v){ var e=_curExp(); if(!e) return; var b=e.blocks.filter(function(x){return x.id===id;})[0]; if(!b) return; b[f]=v; e.updated=Date.now(); if(f==='html') queueSave(); else { save(); if(f==='date') renderPages(); } }
function setExpBlockHtml(expId,blkId,html){ var e=LB.data.experiments[expId]; if(!e) return; var b=(e.blocks||[]).filter(function(x){return x.id===blkId;})[0]; if(!b) return; b.html=html; e.updated=Date.now(); queueSave(); }
function addBlock(){ var e=_curExp(); if(!e) return; e.blocks.push({id:uid(),date:'',title:'',html:'<p></p>'}); save(); renderEditor(); }
function delBlock(id){ var e=_curExp(); if(!e) return; e.blocks=e.blocks.filter(function(b){return b.id!==id;}); save(); renderEditor(); }
function setNotebook(html){ var pg=LB.data.notebook[SEL.page]; if(!pg) return; pg.html=html; queueSave(); }
function setPage(f,v){ var pg=_curPage(); if(!pg) return; pg[f]=v; pg.updated=Date.now(); if(f==='html') queueSave(); else { save(); renderPages(); } }

// ── Autocomplete: @ mentions, # tags, / blocks ───────────────────────────────
var AC={open:false,kind:null,items:[],sel:0,range:null,token:''};
function acClose(){ AC.open=false; el('acpop').classList.remove('open'); }
function caretToken(){ var s=window.getSelection(); if(!s||!s.rangeCount) return null; var r=s.getRangeAt(0); if(!r.collapsed) return null; var node=r.startContainer; if(node.nodeType!==3) return null; var text=node.textContent.slice(0,r.startOffset); var m=text.match(/(^|\s)([@#\/])([\w-]*)$/); if(!m) return null; return {trigger:m[2],query:m[3],len:m[2].length+m[3].length,range:r}; }
function acScan(){ if(!_activeEd) return; var t=caretToken(); if(!t){ if(AC.open) acClose(); return; }
  AC.trigger=t.trigger; AC.query=t.query; AC.tokenLen=t.len; AC.node=t.range.startContainer; AC.offset=t.range.startOffset;
  var items=[];
  if(t.trigger==='@'){
    var q=t.query.toLowerCase();
    Object.keys(LB.data.experiments).forEach(function(k){ var e=LB.data.experiments[k]; var lbl=(e.code||'')+' '+(e.title||''); if(!q||lbl.toLowerCase().indexOf(q)>=0) items.push({t:'exp',id:e.id,label:e.code||e.title||'exp',sub:e.title||'',ic:'E',c:'#4f9d8f'}); });
    Object.keys(LB.data.pages).forEach(function(k){ var p=LB.data.pages[k]; if(!p.title) return; if(!q||p.title.toLowerCase().indexOf(q)>=0) items.push({t:'page',id:p.id,label:p.title,sub:p.kind==='seminars'?'seminar':'page',ic:'P',c:'#5e72c4'}); });
    try{ var pl=JSON.parse(localStorage.getItem('hub_plasmids')||'null'); if(pl){ var arr=Array.isArray(pl)?pl:(pl.plasmids?Object.keys(pl.plasmids).map(function(k){return pl.plasmids[k];}):[]); arr.forEach(function(pm){ var lb=(pm.code||'')+' '+(pm.name||''); if(!q||lb.toLowerCase().indexOf(q)>=0) items.push({t:'plasmid',id:pm.code||'',label:pm.code||pm.name,sub:pm.name||'',ic:'pJ',c:'#6d7bd0'}); }); } }catch(e){}
    items=items.slice(0,12);
  } else if(t.trigger==='#'){
    var q2=t.query.toLowerCase();
    LB.data.tags.filter(function(tg){return !q2||tg.toLowerCase().indexOf(q2)>=0;}).slice(0,10).forEach(function(tg){ items.push({t:'tag',id:tg,label:'#'+tg,sub:'tag',ic:'#',c:'#5e72c4'}); });
    if(t.query) items.unshift({t:'newtag',id:t.query,label:'Create #'+t.query,sub:'new',ic:'+',c:'#4f9d8f'});
  } else if(t.trigger==='/'){
    var opts=[['Heading','slHeading'],['Checklist','slTodo'],['Bullet list','slBullet'],['Numbered list','slNumber'],['Table','slTable'],['Divider','slDivider']];
    var q3=t.query.toLowerCase();
    opts.filter(function(o){return !q3||o[0].toLowerCase().indexOf(q3)>=0;}).forEach(function(o){ items.push({t:'slash',id:o[1],label:o[0],sub:'',ic:'/',c:'#7c6fd4'}); });
  }
  if(!items.length){ acClose(); return; }
  AC.open=true; AC.items=items; AC.sel=0; acRender();
  var rect=t.range.getBoundingClientRect(); var pop=el('acpop'); pop.style.left=Math.min(rect.left,window.innerWidth-260)+'px'; pop.style.top=(rect.bottom+6)+'px';
}
function acRender(){ var pop=el('acpop'); pop.innerHTML=AC.items.map(function(it,i){ return '<div class="ac-item'+(i===AC.sel?' sel':'')+'" onmousedown="event.preventDefault();acPick('+i+')"><span class="ac-ic" style="background:'+it.c+'">'+esc(it.ic)+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(it.label)+'</span>'+(it.sub?'<span class="ac-sub">'+esc(it.sub)+'</span>':'')+'</div>'; }).join(''); pop.classList.add('open'); }
function acDeleteToken(){ try{ var r=document.createRange(); r.setStart(AC.node, Math.max(0,AC.offset-AC.tokenLen)); r.setEnd(AC.node, AC.offset); var s=window.getSelection(); s.removeAllRanges(); s.addRange(r); document.execCommand('delete'); }catch(e){} }
function acPick(i){ var it=AC.items[i]; if(!it) return; acDeleteToken();
  if(it.t==='exp'){ insertHtmlAtCaret('<a class="lb-link" data-exp="'+it.id+'" contenteditable="false">'+esc(it.label)+' &#8599;</a>&nbsp;'); }
  else if(it.t==='page'){ insertHtmlAtCaret('<a class="lb-link" data-page="'+it.id+'" contenteditable="false">'+esc(it.label)+' &#8599;</a>&nbsp;'); }
  else if(it.t==='plasmid'){ insertHtmlAtCaret('<a class="lb-link" data-app="plasmids" contenteditable="false">'+esc(it.label)+' &#8599;</a>&nbsp;'); }
  else if(it.t==='tag'||it.t==='newtag'){ var name=it.id; if(LB.data.tags.indexOf(name)<0){ LB.data.tags.push(name); save(); } insertHtmlAtCaret('<span class="lb-tag" data-tag="'+esc(name)+'" contenteditable="false">#'+esc(name)+'</span>&nbsp;'); renderDockPanels(); }
  else if(it.t==='slash'){ window[it.id](); }
  acClose();
}
function slHeading(){ doFormatBlock('H2'); } function slTodo(){ insertTodo(); } function slBullet(){ fmt(null,'insertUnorderedList'); } function slNumber(){ fmt(null,'insertOrderedList'); } function slTable(){ insertTable(); } function slDivider(){ insertDivider(); }
function openMention(){ if(!_activeEd) return; _activeEd.focus(); insertHtmlAtCaret('@'); acScan(); }
function openTag(){ if(!_activeEd) return; _activeEd.focus(); insertHtmlAtCaret('#'); acScan(); }
function openSlash(){ if(!_activeEd) return; _activeEd.focus(); insertHtmlAtCaret('/'); acScan(); }
document.addEventListener('input',function(e){ if(e.target && e.target.classList && e.target.classList.contains('rt')) acScan(); });
document.addEventListener('keydown',function(e){ if(!AC.open) return;
  if(e.key==='ArrowDown'){ e.preventDefault(); AC.sel=(AC.sel+1)%AC.items.length; acRender(); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); AC.sel=(AC.sel-1+AC.items.length)%AC.items.length; acRender(); }
  else if(e.key==='Enter'){ e.preventDefault(); acPick(AC.sel); }
  else if(e.key==='Escape'){ acClose(); }
});

// ── Preset editor ──────────────────────────────────────────────────────────
var PE={type:null,work:null};
function openPresetEditor(){ el('pe-type').innerHTML=EXP_TYPES.map(function(t){return '<option value="'+t.id+'">'+esc(t.name)+' ('+t.id+')</option>';}).join(''); PE.type=el('pe-type').value; peLoad(); el('preset-modal').classList.add('open'); }
function closePresetEditor(){ el('preset-modal').classList.remove('open'); }
function peRender(){ peSyncFromDom(); PE.type=el('pe-type').value; peLoad(); }
function peLoad(){ var p=LB.data.presets[PE.type]||{name:PE.type,title:'',blocks:[]}; PE.work=JSON.parse(JSON.stringify(p)); peDraw(); }
function peDraw(){ var w=PE.work; var h='<div class="mrow"><label>Default title</label><input id="pe-title" value="'+esc(w.title||'')+'"></div>';
  h+=w.blocks.map(function(b,i){ return '<div class="ps-blk"><div class="ps-blk-hd"><input class="ps-day" type="number" min="0" value="'+(b.dayOffset||0)+'" title="Day offset" oninput="PE.work.blocks['+i+'].dayOffset=parseInt(this.value)||0"><input placeholder="Block title" value="'+esc(b.title||'')+'" oninput="PE.work.blocks['+i+'].title=this.value"><button class="btn ghost sm" onmousedown="event.preventDefault();peDelBlock('+i+')">&times;</button></div><textarea oninput="PE.work.blocks['+i+'].html=this.value" placeholder="HTML content">'+esc(b.html||'')+'</textarea></div>'; }).join('');
  el('pe-body').innerHTML=h; }
function peSyncFromDom(){ var t=el('pe-title'); if(t&&PE.work) PE.work.title=t.value; }
function peAddBlock(){ peSyncFromDom(); PE.work.blocks.push({dayOffset:(PE.work.blocks.length?(PE.work.blocks[PE.work.blocks.length-1].dayOffset||0):0),title:'',html:'<p></p>'}); peDraw(); }
function peDelBlock(i){ PE.work.blocks.splice(i,1); peDraw(); }
function peSave(){ peSyncFromDom(); LB.data.presets[PE.type]=PE.work; save(); closePresetEditor(); }

// ── Unified PDF export ─────────────────────────────────────────────────────
var PRINT_CSS='<style>#print-root{padding:0;color:#111}#print-root *{box-sizing:border-box}'
 +'.pd-head{border-bottom:2px solid #4f9d8f;padding:0 0 12px;margin-bottom:16px}'
 +'.pd-kicker{font:600 11px/1 monospace;letter-spacing:1px;color:#4f9d8f;text-transform:uppercase}'
 +'.pd-code{font:600 13px/1.4 monospace;color:#4f9d8f;margin-top:8px}'
 +'.pd-title{font:700 24px/1.2 sans-serif;margin:3px 0 8px}'
 +'.pd-crumb{font:500 12px/1.4 sans-serif;color:#666}'
 +'.pd-chips{margin-top:9px;display:flex;flex-wrap:wrap;gap:6px}'
 +'.pd-chip{font:600 10px/1 sans-serif;background:#eef4f2;color:#356;border-radius:20px;padding:5px 10px}'

 +'.pd-bhd{display:flex;gap:10px;align-items:baseline;border-bottom:1px solid #e2e2e2;padding-bottom:4px;margin-bottom:6px}'
 +'.pd-day{font:700 9px/1 sans-serif;color:#fff;background:#4f9d8f;border-radius:4px;padding:2px 6px;text-transform:uppercase}'

 +'.pd-body{font:400 13px/1.65 sans-serif;color:#222}.pd-body ul,.pd-body ol{margin:0 0 6px 20px}'
 +'.pd-body h1,.pd-body h2,.pd-body h3{margin:8px 0 4px}.pd-body table{border-collapse:collapse;margin:6px 0}.pd-body td,.pd-body th{border:1px solid #bbb;padding:4px 8px}'
 +'.pd-body hr{border:none;border-top:1px solid #ccc;margin:10px 0}.pd-body .lb-tag{color:#5e72c4;font-weight:600}.pd-body a.lb-link{color:#4f9d8f;text-decoration:none}'
 +'.lb-todo{list-style:none}.lb-box{display:inline-block;width:11px;height:11px;border:1px solid #888;border-radius:2px;margin-right:6px;vertical-align:middle}.lb-todo.done .lb-box{background:#4f9d8f;border-color:#4f9d8f}'
 +'.pd-foot{margin-top:26px;padding-top:10px;border-top:1px solid #e2e2e2;font:400 10px/1.4 sans-serif;color:#999}</style>';
function projCrumb(e){ var p=LB.data.projects.filter(function(x){return x.id===e.projectId;})[0]; var s=p?(p.sections||[]).filter(function(x){return x.id===e.sectionId;})[0]:null; return (p?p.name:'')+(s?' › '+s.name:''); }
function printBlocks(blocks){ return blocks.map(function(b){ var hd=(b.dayOffset!=null?'<span class="pd-day">Day '+b.dayOffset+'</span>':'')+(b.date?'<span class="pd-bdate">'+fmtDate(b.date)+'</span>':'')+(b.title?'<span class="pd-btitle">'+esc(b.title)+'</span>':''); return '<div class="pd-block">'+(hd?'<div class="pd-bhd">'+hd+'</div>':'')+'<div class="pd-body">'+(b.html||'')+'</div></div>'; }).join(''); }
function foot(){ return '<div class="pd-foot">dHUB Labbook · exported '+fmtDate(todayStr())+'</div>'; }
function buildPrintDoc(){
  var node=SEL.node, h=PRINT_CSS;
  if(node.kind==='notebook' && SEL.page){ var D=SEL.page; var pg=LB.data.notebook[D]||{html:''};
    h+='<div class="pd-head"><div class="pd-kicker">Daily notebook</div><div class="pd-title">'+esc(fmtDate(D))+'</div></div>';
    h+='<div class="pd-body">'+(pg.html||'')+'</div>';
    var fb=blocksForDate(D); if(fb.length){ h+='<div class="pd-block"><div class="pd-bhd"><span class="pd-btitle">From experiments</span></div>'+fb.map(function(x){ return '<div class="pd-block"><div class="pd-bhd"><span class="pd-bdate">'+esc(x.exp.code||'')+'</span><span class="pd-btitle">'+esc(x.block.title||'')+'</span></div><div class="pd-body">'+(x.block.html||'')+'</div></div>'; }).join('')+'</div>'; }
    return h+foot();
  }
  if(node.kind==='general' && LB.data.pages[SEL.page]){ var p2=LB.data.pages[SEL.page];
    if(p2.kind==='seminars'){ var m=[]; if(p2.speaker)m.push('Speaker: '+p2.speaker); if(p2.date)m.push(fmtDate(p2.date));
      h+='<div class="pd-head"><div class="pd-kicker">Seminar</div><div class="pd-title">'+esc(p2.title||'')+'</div><div class="pd-chips">'+m.map(function(x){return '<span class="pd-chip">'+esc(x)+'</span>';}).join('')+'</div></div>'; }
    else h+='<div class="pd-head"><div class="pd-kicker">Note</div><div class="pd-title">'+esc(p2.title||'')+'</div></div>';
    return h+'<div class="pd-body">'+(p2.html||'')+'</div>'+foot();
  }
  var e=_curExp(); if(!e) return h;
  var chips=[]; if(e.startDate)chips.push('Start '+fmtDate(e.startDate)); if(e.status)chips.push(e.status); if(e.poi)chips.push('POI '+e.poi); if(e.plasmids)chips.push(e.plasmids); if(e.cellLines)chips.push(e.cellLines);
  h+='<div class="pd-head"><div class="pd-code">'+esc(e.code||'')+'</div><div class="pd-title">'+esc(e.title||'')+'</div><div class="pd-crumb">'+esc(projCrumb(e))+'</div><div class="pd-chips">'+chips.map(function(x){return '<span class="pd-chip">'+esc(x)+'</span>';}).join('')+'</div></div>';
  return h+printBlocks(e.blocks||[])+foot();
}
function exportPDF(){ el('print-root').innerHTML=buildPrintDoc(); setTimeout(function(){ try{ window.print(); }catch(e){} }, 60); }

// ── Backups (File System Access via parent, download fallback) + offline ─────
function _download(name,text){ try{ var b=new Blob([text],{type:'application/json'}); var u=URL.createObjectURL(b); var a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); setTimeout(function(){ URL.revokeObjectURL(u); a.remove(); },500); }catch(e){} }
function _parentBackup(){ try{ if(window.parent && window.parent!==window && window.parent.lbBackup) return window.parent.lbBackup; }catch(e){} return null; }
var _selfDir=null;
function _idb(){ return new Promise(function(res,rej){ var r=indexedDB.open('lb_backup',1); r.onupgradeneeded=function(){ r.result.createObjectStore('h'); }; r.onsuccess=function(){res(r.result);}; r.onerror=function(){rej(r.error);}; }); }
function _idbGet(){ return _idb().then(function(db){ return new Promise(function(res){ var t=db.transaction('h','readonly').objectStore('h').get('dir'); t.onsuccess=function(){res(t.result||null);}; t.onerror=function(){res(null);}; }); }); }
function _idbSet(v){ return _idb().then(function(db){ return new Promise(function(res){ var t=db.transaction('h','readwrite').objectStore('h').put(v,'dir'); t.onsuccess=function(){res();}; t.onerror=function(){res();}; }); }); }
function _verify(hn){ if(!hn||!hn.queryPermission) return Promise.resolve(false); return hn.queryPermission({mode:'readwrite'}).then(function(p){ if(p==='granted') return true; return hn.requestPermission({mode:'readwrite'}).then(function(p2){return p2==='granted';}); }); }
function chooseBackupDir(){ var pb=_parentBackup(); if(pb&&pb.pickDir){ return pb.pickDir().then(function(n){ toast('Backup folder: '+n); }).catch(function(){ toast('Could not open folder picker — backups will download instead.'); }); }
  if(typeof window.showDirectoryPicker==='function'){ return window.showDirectoryPicker({mode:'readwrite'}).then(function(h){ _selfDir=h; return _idbSet(h).then(function(){ toast('Backup folder: '+h.name); }); }).catch(function(){ toast('Folder picker unavailable — backups will download instead.'); }); }
  toast('This browser has no folder access — backups will download.'); return Promise.resolve(); }
function doBackup(manual){ var name='labbook-'+todayStr()+'.json'; var text=JSON.stringify(LB.data,null,2);
  var pb=_parentBackup();
  var chain = pb&&pb.writeFile ? pb.writeFile(name,text).then(function(){return 'fs';})
    : (function(){ if(typeof window.showDirectoryPicker!=='function') return Promise.reject(); return (_selfDir?Promise.resolve(_selfDir):_idbGet()).then(function(h){ if(!h) return Promise.reject(); _selfDir=h; return _verify(h).then(function(v){ if(!v) return Promise.reject(); return h.getFileHandle(name,{create:true}).then(function(fh){ return fh.createWritable().then(function(w){ return w.write(text).then(function(){ return w.close(); }); }); }).then(function(){return 'fs';}); }); }); })();
  chain.then(function(){ try{ localStorage.setItem('lb_last_backup',todayStr()); }catch(e){} if(manual) toast('Backup saved to folder ✓'); })
    .catch(function(){ _download(name,text); try{ localStorage.setItem('lb_last_backup',todayStr()); }catch(e){} if(manual) toast('Backup downloaded ✓ (choose a folder for auto-save)'); });
}
function maybeAutoBackup(){ var last=''; try{ last=localStorage.getItem('lb_last_backup')||''; }catch(e){} if(last===todayStr()) return; var pb=_parentBackup(); var hasFs=(pb&&pb.writeFile)||typeof window.showDirectoryPicker==='function'; if(hasFs) doBackup(false); }
var _toastT=null; function toast(msg){ var t=el('lb-toast'); if(!t){ t=document.createElement('div'); t.id='lb-toast'; t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);color:var(--text);border:1px solid var(--border2);box-shadow:var(--shadow-md);border-radius:10px;padding:10px 16px;font-size:13px;z-index:300;opacity:0;transition:opacity .2s'; document.body.appendChild(t); } t.textContent=msg; t.style.opacity='1'; clearTimeout(_toastT); _toastT=setTimeout(function(){t.style.opacity='0';},2600); }
function updateNet(){ var on=navigator.onLine; var n=el('net'); n.classList.toggle('online',on); n.classList.toggle('offline',!on); el('net-txt').textContent=on?'online':'offline'; }
window.addEventListener('online',updateNet); window.addEventListener('offline',updateNet);
el('backup-btn').addEventListener('contextmenu',function(e){ e.preventDefault(); chooseBackupDir(); });

function renderAll(){ renderSections(); renderPages(); renderEditor(); }
if(maybeSeed()) save();
applyLayout(); renderPanels(); renderAll(); updateNet();
lbInitSync();
setTimeout(maybeAutoBackup,1500);
window.addEventListener('message', function(e){ if(e.data && e.data.type==='switchTab'){} });
</script>
